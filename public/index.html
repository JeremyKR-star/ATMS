          )
        ),
        React.createElement('div', {className:'form-group'}, React.createElement('label', {}, '자격명'), React.createElement('input', {value:certForm.cert_type||'',onChange:function(e) { setCertForm({...certForm,cert_type:e.target.value}); }})),
        React.createElement('div', {className:'form-group'}, React.createElement('label', {}, '만료일'), React.createElement('input', {type:'date',value:certForm.expiry_date||'',onChange:function(e) { setCertForm({...certForm,expiry_date:e.target.value}); }}))
      )
    )
  );
}

// ━━━━━━━━━━━━ PILOT PAGE (API-Driven) ━━━━━━━━━━━━
function PilotPage() {
  const [pilots, setPilots] = useState([]);
  const [courses, setCourses] = useState([]);
  const [trainingRecs, setTrainingRecs] = useState([]);
  const [weekly, setWeekly] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeIdx, setActiveIdx] = useState(0);
  const [subTab, setSubTab] = useState('profiles');
  const [selectedPilot, setSelectedPilot] = useState(null);
  const [showPilotModal, setShowPilotModal] = useState(false);
  const [editingPilot, setEditingPilot] = useState(null);
  const [pilotForm, setPilotForm] = useState({});
  const [editingCell, setEditingCell] = useState(null);
  const [cellDate, setCellDate] = useState('');
  const [cellTime, setCellTime] = useState('1:00');
  const [cellPos, setCellPos] = useState({x:0,y:0});
  const [nationalities, setNationalities] = useState([]);
  const [weeklyUploads, setWeeklyUploads] = useState([]);
  const [uploading, setUploading] = useState(false);
  var _uploadProgressState = useState(null);
  var uploadProgress = _uploadProgressState[0];
  var setUploadProgress = _uploadProgressState[1];
  const weeklyFileRef = useRef(null);
  const [natFilter, setNatFilter] = useState('all');
  const [showNatAdd, setShowNatAdd] = useState(false);
  const [newNatCode, setNewNatCode] = useState('');
  const [newNatLabel, setNewNatLabel] = useState('');
  const [idxMap, setIdxMap] = useState({});
  const [showBulkPilotImport, setShowBulkPilotImport] = useState(false);
  const [pilotImportPreview, setPilotImportPreview] = useState([]);
  const [pilotImportFile, setPilotImportFile] = useState(null);
  const pilotImportFileRef = useRef(null);
  const { user, showToast } = useApp();
  const isAdmin = ['admin','ojt_admin'].includes(user.role);
  const canEditTraining = isAdmin || user.role === 'instructor';

  // Nationality label map: code -> ko label
  var natLabelMap = {'Malaysia':'말레이시아','Poland':'폴란드','Iraq':'이라크'};
  nationalities.forEach(function(n){ natLabelMap[n.code] = n.label_ko; });

  // Compat: also map old 'Malaysian' -> Malaysia
  var normalizeNat = function(val) {
    if (val === 'Malaysian') return 'Malaysia';
    return val || '';
  };

  const loadAll = useCallback(async () => {
    try {
      const [p,c,t,w,n,wu] = await Promise.all([
        api('/pilots'), api('/pilots/courses'), api('/pilots/training'), api('/pilots/weekly'),
        api('/pilots/nationalities'), api('/pilots/weekly-uploads')
      ]);
      setPilots((p.data||[]).filter(x=>x.status==='active'));
      setCourses(c.data||[]);
      setTrainingRecs(t.data||[]);
      setWeekly(w.data||[]);
      setNationalities(n.data||[]);
      setWeeklyUploads(wu.data||[]);
    } catch(e) { showToast(e.message,'error'); }
    setLoading(false);
  }, []);
  useEffect(()=>{loadAll();},[]);

  const simCourses = courses.filter(c=>c.category==='sim');
  const fltCourses = courses.filter(c=>c.category==='flight');
  const totalCourses = courses.length;

  // Build per-pilot training map: { pilotId: { courseId: {date, time} } }
  const tMap = {};
  trainingRecs.forEach(r => {
    if(!tMap[r.pilot_id]) tMap[r.pilot_id]={};
    tMap[r.pilot_id][r.course_id] = { date: r.completed_date, time: r.completed_time||'1:00' };
  });
  // Build weekly data lookup by pilot id
  var weeklyMap = {};
  weekly.forEach(function(w){ if(w.id) weeklyMap[w.id] = w; });

  const getPilotDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return (w.fltDone||0) + (w.simDone||0);
    return Object.keys(tMap[pid]||{}).length;
  };
  const getPilotSimDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.simDone||0;
    return trainingRecs.filter(function(r){return r.pilot_id===pid && simCourses.some(function(c){return c.id===r.course_id;});}).length;
  };
  const getPilotFltDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.fltDone||0;
    return trainingRecs.filter(function(r){return r.pilot_id===pid && fltCourses.some(function(c){return c.id===r.course_id;});}).length;
  };
  const getPilotSimPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.simPlan||0;
    return simCourses.length;
  };
  const getPilotFltPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.fltPlan||0;
    return fltCourses.length;
  };
  const getPilotTotalPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return (w.fltPlan||0) + (w.simPlan||0);
    return totalCourses;
  };

  // Pilot CRUD
  const emptyForm = {name:'',short_name:'',rank:'Major',service_number:'',callsign:'',nationality:'Malaysia',
    squadron:'',date_of_birth:'',course_class:'',training_start_date:'',training_end_date:'',phone:'',email:'',notes:'',sort_order:pilots.length};
  const openCreate = ()=>{setPilotForm(emptyForm);setEditingPilot(null);setShowPilotModal(true);};
  const openEdit = (p)=>{setPilotForm({...p});setEditingPilot(p);setShowPilotModal(true);};
  const savePilot = async ()=>{
    if(!pilotForm.name||!pilotForm.short_name) return showToast('Name and short name required','error');
    try {
      if(editingPilot) { await api(`/pilots/${editingPilot.id}`,{method:'PUT',body:JSON.stringify(pilotForm)}); showToast('Pilot updated','success'); }
      else { await api('/pilots',{method:'POST',body:JSON.stringify(pilotForm)}); showToast('Pilot created','success'); }
      setShowPilotModal(false); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };
  const deactivatePilot = async (p)=>{
    try { await api(`/pilots/${p.id}`,{method:'DELETE'}); showToast(`${p.short_name} deactivated`,'success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Photo upload
  const photoRef = useRef(null);
  const [photoTarget, setPhotoTarget] = useState(null);
  const handlePhotoUpload = async (e)=>{
    const file = e.target.files[0]; if(!file||!photoTarget) return;
    const fd = new FormData(); fd.append('photo', file);
    try {
      const token = localStorage.getItem('atms_token');
      const res = await fetch(`${API}/pilots/${photoTarget}/photo`,{method:'POST',headers:{'Authorization':`Bearer ${token}`},body:fd});
      const data = await res.json(); if(!res.ok) throw new Error(data.error);
      showToast('Photo uploaded','success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
    e.target.value='';
  };

  // Inline training edit
  const handleCellClick = (e,pilotId,courseId,currentDate,currentTime)=>{
    if(!canEditTraining) return;
    const rect = e.target.getBoundingClientRect();
    setCellPos({x:Math.min(rect.left,window.innerWidth-220),y:rect.bottom+4});
    setEditingCell({pilotId,courseId}); setCellDate(currentDate||''); setCellTime(currentTime||'1:00');
  };
  const saveCell = async ()=>{
    if(!editingCell) return;
    try {
      await api('/pilots/training',{method:'POST',body:JSON.stringify({
        pilot_id:editingCell.pilotId, course_id:editingCell.courseId,
        completed_date:cellDate||null, completed_time:cellTime||'1:00'
      })});
      setEditingCell(null); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };
  const deleteCell = async ()=>{
    if(!editingCell) return;
    try {
      await api('/pilots/training',{method:'POST',body:JSON.stringify({
        pilot_id:editingCell.pilotId, course_id:editingCell.courseId,
        completed_date:null
      })});
      setEditingCell(null); setCellDate(''); setCellTime('1:00');
      showToast('Record deleted','success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Filter pilots by nationality
  var filteredPilots = natFilter === 'all' ? pilots : pilots.filter(function(p) {
    return normalizeNat(p.nationality) === natFilter;
  });

  // Reset carousel index when filter changes
  useEffect(function(){setActiveIdx(0);setIdxMap({});},[natFilter]);

  const goTo = function(idx){setActiveIdx(Math.max(0,Math.min(idx,filteredPilots.length-1)));};
  var goToGroup = function(code, idx, max) {
    var clamped = Math.max(0, Math.min(idx, max - 1));
    var newMap = {};
    for (var k in idxMap) { newMap[k] = idxMap[k]; }
    newMap[code] = clamped;
    setIdxMap(newMap);
  };
  var getGroupIdx = function(code) { return idxMap[code] || 0; };

  // Add nationality handler
  var addNationality = async function() {
    if (!newNatCode || !newNatLabel) return showToast('Code and label required','error');
    try {
      await api('/pilots/nationalities',{method:'POST',body:JSON.stringify({code:newNatCode,label_ko:newNatLabel})});
      showToast('Nationality added','success');
      setNewNatCode(''); setNewNatLabel(''); setShowNatAdd(false);
      loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Weekly Excel upload handler
  var handleWeeklyUpload = async function(e) {
    var file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    setUploadProgress({step: 'uploading', filename: file.name, filesize: file.size});
    try {
      var fd = new FormData();
      fd.append('file', file);
      var token = localStorage.getItem('atms_token');
      setUploadProgress({step: 'parsing', filename: file.name, filesize: file.size});
      var res = await fetch(API + '/pilots/weekly-uploads?report_date=' + new Date().toISOString().slice(0,10), {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      var d = data.data || {};
      var rows = d.parsed_rows || [];
      var matched = d.matched || 0;
      var individualSynced = d.individual_synced || 0;
      var coursesCreated = d.courses_created || 0;
      var indDebug = d.ind_debug || {};
      console.log('[ATMS] Upload response ind_debug:', JSON.stringify(indDebug));
      setUploadProgress({step: 'done', filename: file.name, filesize: file.size, rows: rows, matched: matched, total: rows.length, individualSynced: individualSynced, coursesCreated: coursesCreated, indDebug: indDebug});
      await loadAll();
    } catch(err) {
      setUploadProgress({step: 'error', filename: file.name, error: err.message});
    }
    setUploading(false);
    if (weeklyFileRef.current) weeklyFileRef.current.value = '';
  };

  var handleWeeklyDelete = async function(uploadId) {
    if (!confirm('이 업로드를 삭제하시겠습니까?')) return;
    try {
      await api('/pilots/weekly-uploads/' + uploadId, { method: 'DELETE' });
      showToast('삭제 완료', 'success');
      loadAll();
    } catch(err) { showToast(err.message, 'error'); }
  };

  var handleWeeklyDownload = function(uploadId, filename) {
    var token = localStorage.getItem('atms_token');
    window.open(API + '/pilots/weekly-uploads/' + uploadId + '/download?token=' + token, '_blank');
  };

  var formatFileSize = function(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  };

  var handleBulkPilotImportFile = function(e) {
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var data = new Uint8Array(evt.target.result);
        var workbook = XLSX.read(data, {type: 'array'});
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet);
        var preview = rows.slice(0, 5);
        setPilotImportPreview(preview);
        setPilotImportFile(rows);
      } catch(err) {
        showToast('엑셀 파일 읽기 실패: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  var confirmBulkPilotImport = async function() {
    if(!pilotImportFile || pilotImportFile.length === 0) {
      showToast('가져올 데이터가 없습니다', 'error');
      return;
    }
    try {
      var imported = 0;
      var failed = 0;
      for(var i = 0; i < pilotImportFile.length; i++) {
        var row = pilotImportFile[i];
        try {
          await api('/pilots', {method: 'POST', body: JSON.stringify({
            name: row.name || '',
            short_name: row.short_name || '',
            rank: row.rank || 'Major',
            nationality: row.nationality || 'Malaysia',
            callsign: row.callsign || '',
            service_number: row.service_number || ''
          })});
          imported++;
        } catch(err) {
          failed++;
        }
      }
      showToast(`조종사 가져오기 완료: ${imported}명 성공, ${failed}명 실패`, 'success');
      setPilotImportFile(null);
      setPilotImportPreview([]);
      setShowBulkPilotImport(false);
      if(pilotImportFileRef.current) pilotImportFileRef.current.value = '';
      loadAll();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };

  var downloadIndividualTraining = function() {
    var selectedPilots = selectedPilot ? pilots.filter(function(p){return p.id === selectedPilot;}) : pilots;
    var wsData = [];
    selectedPilots.forEach(function(pilot) {
      courses.forEach(function(course) {
        var rec = trainingRecs.find(function(t){return t.pilot_id === pilot.id && t.course_id === course.id;});
        wsData.push({
          조종사: pilot.short_name,
          과정: course.name,
          카테고리: course.category || '-',
          완료일: rec && rec.completed_date ? rec.completed_date : '-',
          시간: rec && rec.completed_time ? rec.completed_time : '-'
        });
      });
    });
    var ws = XLSX.utils.json_to_sheet(wsData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '개인별현황');
    XLSX.writeFile(wb, '개인별현황_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };

  var downloadWeeklyReport = function() {
    var wsData = weekly.map(function(w) {
      return {주차: w.week || '-', 조종사: w.pilot_name || '-', 비행시간: w.flight_hours || 0, 시뮬레이션: w.sim_hours || 0, 총시간: (w.flight_hours || 0) + (w.sim_hours || 0), 메모: w.notes || ''};
    });
    var ws = XLSX.utils.json_to_sheet(wsData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '주간보고');
    XLSX.writeFile(wb, '주간보고_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };

  if(loading) return React.createElement(ATMSLoader, {label: '\uC870\uC885\uC0AC \uB370\uC774\uD130 \uB85C\uB529 \uC911...', sub: 'Pilot Database'});

  // Pilot form modal fields
  const formField = (label,key,type='text')=>(
    <div className="form-group"><label>{label}</label>
      <input type={type} value={pilotForm[key]||''} onChange={e=>setPilotForm({...pilotForm,[key]:e.target.value})}/></div>
  );

  return (
    <div className="page-content">
      <div className="tabs">
        <div className={`tab ${subTab==='profiles'?'active':''}`} onClick={()=>setSubTab('profiles')}>조종사 프로필</div>
        <div className={`tab ${subTab==='individual'?'active':''}`} onClick={()=>setSubTab('individual')}>개인별 현황</div>
        <div className={`tab ${subTab==='weekly'?'active':''}`} onClick={()=>setSubTab('weekly')}>주간 보고</div>
        <div className={`tab ${subTab==='uploads'?'active':''}`} onClick={function(){setSubTab('uploads');}}>업로드 관리</div>
        {isAdmin && <div className={`tab ${subTab==='manage'?'active':''}`} onClick={()=>setSubTab('manage')}>조종사 관리</div>}
      </div>

      {/* ── Nationality Filter + Profiles ── */}
      {subTab==='profiles' && (
        <div>
          <div className="nat-filter-bar">
            <span style={{fontSize:13,fontWeight:600,color:'var(--gray-500)',marginRight:4}}>국적:</span>
            <button className={'nat-chip'+(natFilter==='all'?' active':'')} onClick={function(){setNatFilter('all');}}>전체</button>
            {nationalities.map(function(n){return (
              <button key={n.id} className={'nat-chip'+(natFilter===n.code?' active':'')} onClick={function(){setNatFilter(n.code);}}>
                {n.label_ko}</button>
            );})}
            {!showNatAdd && <button className="nat-add-btn" onClick={function(){setShowNatAdd(true);}}>+ 국적 추가</button>}
            {showNatAdd && (
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input style={{padding:'5px 10px',borderRadius:8,border:'1.5px solid var(--gray-200)',fontSize:13,width:100}}
                  placeholder="Code (English)" value={newNatCode} onChange={function(e){setNewNatCode(e.target.value);}}/>
                <input style={{padding:'5px 10px',borderRadius:8,border:'1.5px solid var(--gray-200)',fontSize:13,width:100}}
                  placeholder="라벨 (한글)" value={newNatLabel} onChange={function(e){setNewNatLabel(e.target.value);}}/>
                <button className="btn btn-primary btn-sm" onClick={addNationality}>추가</button>
                <button className="btn btn-outline btn-sm" onClick={function(){setShowNatAdd(false);setNewNatCode('');setNewNatLabel('');}}>취소</button>
              </div>
            )}
          </div>

          {/* ── "전체" → grouped by nationality ── */}
          {natFilter==='all' && nationalities.map(function(nat){
            var groupPilots = pilots.filter(function(p){ return normalizeNat(p.nationality) === nat.code; });
            if (groupPilots.length === 0) return null;
            var gIdx = getGroupIdx(nat.code);
            return (
              <div className={'nat-section ' + getNatCss(nat.code)} key={nat.code}>
                <NatCanvasBg code={nat.code} />
                <div className="nat-section-title">
                  <h3>{nat.label_ko} Pilots</h3>
                  <span className="badge badge-blue">{groupPilots.length}명</span>
                </div>
                <div className="card" style={{marginBottom:0}}>
                  <div className="card-body">
                    <div className="pilot-carousel">
                      {groupPilots.length > 1 && <button className="carousel-nav carousel-prev" onClick={function(){goToGroup(nat.code, gIdx-1, groupPilots.length);}}>&#8249;</button>}
                      {groupPilots.length > 1 && <button className="carousel-nav carousel-next" onClick={function(){goToGroup(nat.code, gIdx+1, groupPilots.length);}}>&#8250;</button>}
                      <div className="pilot-carousel-track" style={{transform:'translateX(-'+gIdx*100+'%)'}}>
                        {groupPilots.map(function(p){
                          var tp=getPilotTotalPlan(p.id); var done=getPilotDone(p.id); var pct=tp?Math.round((done/tp)*100):0;
                          var sd=getPilotSimDone(p.id); var fd=getPilotFltDone(p.id);
                          var sp=getPilotSimPlan(p.id); var fp=getPilotFltPlan(p.id);
                          return (
                            <div className="pilot-card" key={p.id}>
                              <div className="pilot-profile">
                                <div className="pilot-photo" onClick={function(){if(isAdmin){setPhotoTarget(p.id);if(photoRef.current)photoRef.current.click();}}}>
                                  {p.photo_url ? <img src={p.photo_url} alt={p.short_name}/> :
                                    <>{(p.short_name||'?')[0]}{(p.short_name||'?').slice(-1)}</>}
                                </div>
                                <div className="pilot-name">{p.name}</div>
                                <div className="pilot-rank">{p.rank} &middot; {p.callsign||p.service_number||'N/A'}</div>
                                <div style={{margin:'0 auto',maxWidth:300}}>
                                  <div className="flex-between" style={{fontSize:12,marginBottom:4}}>
                                    <span>훈련 진도</span><span style={{fontWeight:700,color:'var(--primary)'}}>{pct}%</span></div>
                                  <div className="progress-bar" style={{height:10}}>
                                    <div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg,#2563eb,#7c3aed)'}}/></div>
                                </div>
                                <div className="pilot-stats">
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--primary)'}}>{sd}/{sp}</div>
                                    <div className="pilot-stat-lbl">SIM Sorties</div></div>
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--success)'}}>{fd}/{fp}</div>
                                    <div className="pilot-stat-lbl">Flight Sorties</div></div>
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--warning)'}}>{done}/{tp}</div>
                                    <div className="pilot-stat-lbl">Total</div></div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      {groupPilots.length > 1 && (
                        <div className="carousel-dots">
                          {groupPilots.map(function(_,i){return <div key={i} className={'carousel-dot '+(i===gIdx?'active':'')} onClick={function(){goToGroup(nat.code, i, groupPilots.length);}}/> ;})}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* ── Single nationality filter → single carousel with bg ── */}
          {natFilter!=='all' && filteredPilots.length > 0 && (
            <div className={'nat-section ' + getNatCss(natFilter)}>
              <NatCanvasBg code={natFilter} />
              <div className="nat-section-title"><h3>{natLabelMap[natFilter]||natFilter} T-50 Transition Course Pilots</h3>
                <span className="badge badge-blue">{filteredPilots.length}명</span></div>
              <div className="card" style={{marginBottom:0}}>
                <div className="card-body">
                  <div className="pilot-carousel">
                    {filteredPilots.length > 1 && <button className="carousel-nav carousel-prev" onClick={function(){goTo(activeIdx-1);}}>&#8249;</button>}
                    {filteredPilots.length > 1 && <button className="carousel-nav carousel-next" onClick={function(){goTo(activeIdx+1);}}>&#8250;</button>}
                    <div className="pilot-carousel-track" style={{transform:'translateX(-'+activeIdx*100+'%)'}}>
                      {filteredPilots.map(function(p){
                        var tp=getPilotTotalPlan(p.id); var done=getPilotDone(p.id); var pct=tp?Math.round((done/tp)*100):0;
                        var sd=getPilotSimDone(p.id); var fd=getPilotFltDone(p.id);
                        var sp=getPilotSimPlan(p.id); var fp=getPilotFltPlan(p.id);
                        return (
                          <div className="pilot-card" key={p.id}>
                            <div className="pilot-profile">
                              <div className="pilot-photo" onClick={function(){if(isAdmin){setPhotoTarget(p.id);if(photoRef.current)photoRef.current.click();}}}>
                                {p.photo_url ? <img src={p.photo_url} alt={p.short_name}/> :
                                  <>{(p.short_name||'?')[0]}{(p.short_name||'?').slice(-1)}</>}
                              </div>
                              <div className="pilot-name">{p.name}</div>
                              <div className="pilot-rank">{p.rank} &middot; {p.callsign||p.service_number||'N/A'}</div>
                              <div style={{margin:'0 auto',maxWidth:300}}>
                                <div className="flex-between" style={{fontSize:12,marginBottom:4}}>
                                  <span>훈련 진도</span><span style={{fontWeight:700,color:'var(--primary)'}}>{pct}%</span></div>
                                <div className="progress-bar" style={{height:10}}>
                                  <div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg,#2563eb,#7c3aed)'}}/></div>
                              </div>
                              <div className="pilot-stats">
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--primary)'}}>{sd}/{sp}</div>
                                  <div className="pilot-stat-lbl">SIM Sorties</div></div>
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--success)'}}>{fd}/{fp}</div>
                                  <div className="pilot-stat-lbl">Flight Sorties</div></div>
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--warning)'}}>{done}/{tp}</div>
                                  <div className="pilot-stat-lbl">Total</div></div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {filteredPilots.length > 1 && (
                      <div className="carousel-dots">
                        {filteredPilots.map(function(_,i){return <div key={i} className={'carousel-dot '+(i===activeIdx?'active':'')} onClick={function(){goTo(i);}}/> ;})}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Empty state */}
          {natFilter!=='all' && filteredPilots.length === 0 && (
            <div className="card"><div className="card-body">
              <div className="empty-state" style={{padding:'60px 20px'}}>
                <div style={{fontSize:48,marginBottom:12}}>🌍</div>
                <div style={{fontSize:16,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>해당 국적의 조종사가 없습니다</div>
                <div style={{fontSize:13,color:'var(--gray-400)'}}>다른 국적을 선택하거나 조종사 관리 탭에서 조종사를 추가해주세요.</div>
              </div>
            </div></div>
          )}
        </div>
      )}

      {/* ── Individual Training Status ── */}
      {subTab==='individual' && (
        <div>
          <div className="filters">
            <select value={selectedPilot||''} onChange={function(e){setSelectedPilot(e.target.value?Number(e.target.value):null);}}>
              <option value="">전체 조종사</option>
              {pilots.map(function(p){return <option key={p.id} value={p.id}>{p.short_name} ({p.name})</option>;})}
            </select>
            <button className="btn btn-primary btn-sm" onClick={downloadIndividualTraining}>📥 엑셀 다운로드</button>
            {canEditTraining && <span style={{fontSize:12,color:'var(--gray-400)'}}>Click a cell to edit</span>}
          </div>

          {nationalities.map(function(nat){
            var natPilots;
            if (selectedPilot) {
              natPilots = pilots.filter(function(p){ return p.id===selectedPilot && normalizeNat(p.nationality)===nat.code; });
            } else {
              natPilots = pilots.filter(function(p){ return normalizeNat(p.nationality)===nat.code; });
            }
            if (natPilots.length === 0) return null;
            return (
              <div className="card" key={nat.code} style={{marginBottom:16}}>
                <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{nat.label_ko} - Individual Training Status</h3>
                  <span className="badge badge-blue" style={{marginLeft:8}}>{natPilots.length}명</span></div>
                <div className="card-body"><div className="table-wrapper">
                    <table className="training-table">
                      <thead>
                        <tr>
                          <th rowSpan="2">No.</th><th colSpan="2">SIM/CPT</th><th colSpan="2">T-50</th>
                          <th rowSpan="2">Contents</th>
                          {natPilots.map(function(p){return (
                            <th key={p.id} colSpan="2" style={{background:'#1e40af'}}>{p.short_name}</th>
                          );})}
                        </tr>
                        <tr>
                          <th>No.</th><th>Subject</th><th>No.</th><th>Subject</th>
                          {natPilots.map(function(p){return (
                            <React.Fragment key={p.id}><th>Date</th><th>Time</th></React.Fragment>
                          );})}
                        </tr>
                      </thead>
                      <tbody>
                        <tr><td colSpan={6+natPilots.length*2} className="section-header">Simulator Training</td></tr>
                        {simCourses.map(function(c,ci){
                          return (
                            <tr key={c.id}>
                              <td>{c.course_no||('C-'+(ci+1).toString().padStart(2,'0'))}</td>
                              <td>{ci+1}</td><td><strong>{c.subject}</strong></td><td>-</td><td>-</td>
                              <td style={{textAlign:'left',fontSize:11}}>{c.contents||''}</td>
                              {natPilots.map(function(p){
                                var rec=(tMap[p.id]||{})[c.id];
                                return <React.Fragment key={p.id}>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.date.slice(5):'-'}</td>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.time:'-'}</td>
                                </React.Fragment>;
                              })}
                            </tr>
                          );
                        })}
                        <tr><td colSpan={6+natPilots.length*2} className="section-header">Flight Training</td></tr>
                        {fltCourses.map(function(c,ci){
                          return (
                            <tr key={c.id}>
                              <td>{c.course_no||('C-'+(simCourses.length+ci+1).toString().padStart(2,'0'))}</td>
                              <td>-</td><td>-</td><td>{ci+1}</td><td><strong>{c.subject}</strong></td>
                              <td style={{textAlign:'left',fontSize:11}}>{c.contents||''}</td>
                              {natPilots.map(function(p){
                                var rec=(tMap[p.id]||{})[c.id];
                                return <React.Fragment key={p.id}>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.date.slice(5):'-'}</td>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.time:'-'}</td>
                                </React.Fragment>;
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div></div>
              </div>
            );
          })}

          {/* Cell edit popup */}
          {editingCell && <div className="cell-edit-popup" style={{left:cellPos.x,top:cellPos.y}}
            onClick={function(e){e.stopPropagation();}}>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Date</label>
                <input type="date" value={cellDate} onChange={function(e){setCellDate(e.target.value);}} autoFocus/>
              </div>
              <div style={{width:80}}>
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Time</label>
                <input type="text" value={cellTime} placeholder="H:MM" onChange={function(e){setCellTime(e.target.value);}}/>
              </div>
            </div>
            <div className="cell-btns">
              {cellDate && <button className="btn btn-danger btn-sm" onClick={deleteCell}>Delete</button>}
              <button className="btn btn-outline btn-sm" onClick={function(){setEditingCell(null);}}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={saveCell}>Save</button>
            </div>
          </div>}
        </div>
      )}

      {/* ── Weekly Report ── */}
      {subTab==='weekly' && (
        <div>
          <div style={{marginBottom: 16}}><button className="btn btn-primary btn-sm" onClick={downloadWeeklyReport}>📥 엑셀 다운로드</button></div>
          <WeeklyReport weekly={weekly} pilots={pilots} nationalities={nationalities} normalizeNat={normalizeNat} natLabelMap={natLabelMap} />
        </div>
      )}

      {/* ── Upload Progress Modal ── */}
      {uploadProgress && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={function(){if(uploadProgress.step==='done'||uploadProgress.step==='error')setUploadProgress(null);}}>
          <div style={{background:'white',borderRadius:16,padding:32,maxWidth:500,width:'90%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}} onClick={function(e){e.stopPropagation();}}>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:8}}>
                {uploadProgress.step==='uploading' ? '\uD83D\uDCE4' : uploadProgress.step==='parsing' ? '\uD83D\uDD0D' : uploadProgress.step==='done' ? '\u2705' : '\u274C'}
              </div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>
                {uploadProgress.step==='uploading' ? '\uD30C\uC77C \uC5C5\uB85C\uB4DC \uC911...' : uploadProgress.step==='parsing' ? '\uC5D1\uC140 \uB370\uC774\uD130 \uBD84\uC11D \uC911...' : uploadProgress.step==='done' ? '\uC5C5\uB85C\uB4DC \uC644\uB8CC!' : '\uC5C5\uB85C\uB4DC \uC2E4\uD328'}
              </div>
              <div style={{fontSize:13,color:'var(--gray-500)'}}>{uploadProgress.filename}</div>
            </div>

            {(uploadProgress.step==='uploading' || uploadProgress.step==='parsing') && (
              <div style={{marginBottom:16}}>
                <div className="progress-bar" style={{height:8,marginBottom:8}}>
                  <div className="progress-fill" style={{width:uploadProgress.step==='uploading'?'40%':'80%',background:'linear-gradient(90deg,#6366f1,#818cf8)',transition:'width 0.5s ease'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'center',gap:24,fontSize:12,color:'var(--gray-400)'}}>
                  <span style={{color:uploadProgress.step==='uploading'?'var(--primary)':'var(--gray-400)',fontWeight:uploadProgress.step==='uploading'?700:400}}>{'1. 업로드'}</span>
                  <span style={{color:uploadProgress.step==='parsing'?'var(--primary)':'var(--gray-400)',fontWeight:uploadProgress.step==='parsing'?700:400}}>{'2. 파싱'}</span>
                  <span style={{color:'var(--gray-400)'}}>{'3. 완료'}</span>
                </div>
              </div>
            )}

            {uploadProgress.step==='done' && (
              <div>
                <div style={{background:'var(--gray-50)',borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{display:'flex',justifyContent:'space-around',textAlign:'center'}}>
                    <div><div style={{fontSize:24,fontWeight:800,color:'var(--primary)'}}>{uploadProgress.total}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'파싱된 조종사'}</div></div>
                    <div><div style={{fontSize:24,fontWeight:800,color:'var(--success)'}}>{uploadProgress.matched}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'매칭 성공'}</div></div>
                    <div><div style={{fontSize:24,fontWeight:800,color:uploadProgress.total - uploadProgress.matched > 0 ? 'var(--danger)' : 'var(--gray-400)'}}>{uploadProgress.total - uploadProgress.matched}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'미매칭'}</div></div>
                  </div>
                </div>
                {(uploadProgress.individualSynced > 0 || uploadProgress.coursesCreated > 0) ? (
                  <div style={{background:'#f0fdf4',borderRadius:12,padding:12,marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:22}}>{'\u2705'}</span>
                    <div style={{fontSize:13,color:'#15803d'}}>
                      <b>{'개인별 현황 동기화 완료'}</b>
                      <span style={{marginLeft:6}}>{uploadProgress.individualSynced}{'개 훈련기록'}</span>
                      {uploadProgress.coursesCreated > 0 && <span style={{marginLeft:6}}>{'/ '}{uploadProgress.coursesCreated}{'개 신규과목 생성'}</span>}
                    </div>
                  </div>
                ) : uploadProgress.indDebug ? (
                  <div style={{background:'#fef9c3',borderRadius:12,padding:12,marginBottom:16,fontSize:11,color:'#854d0e'}}>
                    <b>{'개인별 현황 동기화 미실행'}</b>
                    <div style={{marginTop:4,wordBreak:'break-all'}}>{JSON.stringify(uploadProgress.indDebug)}</div>
                  </div>
                ) : null}
                {uploadProgress.rows && uploadProgress.rows.length > 0 && (
                  <div style={{maxHeight:200,overflow:'auto',marginBottom:16}}>
                    <table style={{fontSize:12,width:'100%'}}>
                      <thead><tr style={{background:'var(--gray-50)'}}><th>{'조종사'}</th><th className="text-center">Flt</th><th className="text-center">Sim</th><th className="text-center">Total</th></tr></thead>
                      <tbody>{uploadProgress.rows.map(function(r,i){
                        return React.createElement('tr', {key:i},
                          React.createElement('td', null, r.name),
                          React.createElement('td', {className:'text-center'}, r.flt_done + '/' + r.flt_plan),
                          React.createElement('td', {className:'text-center'}, r.sim_done + '/' + r.sim_plan),
                          React.createElement('td', {className:'text-center',style:{fontWeight:700}}, (r.flt_done+r.sim_done) + '/' + (r.flt_plan+r.sim_plan))
                        );
                      })}</tbody>
                    </table>
                  </div>
                )}
                <button className="btn btn-primary btn-block" onClick={function(){setUploadProgress(null);}}>확인</button>
              </div>
            )}

            {uploadProgress.step==='error' && (
              <div>
                <div style={{background:'#fef2f2',borderRadius:12,padding:16,marginBottom:16,color:'#dc2626',fontSize:13}}>{uploadProgress.error}</div>
                <button className="btn btn-primary btn-block" onClick={function(){setUploadProgress(null);}}>닫기</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Upload Management ── */}
      {subTab==='uploads' && (
        <div>
          {/* Upload Area */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header">
              <h3 style={{margin:0,fontSize:16}}>주간보고 엑셀 업로드</h3>
            </div>
            <div className="card-body">
              <div style={{border:'2px dashed var(--gray-300)',borderRadius:12,padding:'32px 20px',textAlign:'center',
                background:'var(--gray-50)',cursor:'pointer',transition:'all 0.2s'}}
                onClick={function(){if(weeklyFileRef.current)weeklyFileRef.current.click();}}>
                <div style={{fontSize:36,marginBottom:8}}>📊</div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--gray-700)',marginBottom:4}}>
                  {uploading ? '업로드 중...' : '클릭하여 엑셀 파일 선택'}
                </div>
                <div style={{fontSize:12,color:'var(--gray-400)'}}>
                  .xlsx / .xlsm 파일 지원 (최대 10MB)
                </div>
                <div style={{fontSize:11,color:'var(--gray-400)',marginTop:8}}>
                  컬럼: Pilot/Name, Flt Plan, Flt Done, Flt Remain, Sim Plan, Sim Done, Sim Remain
                </div>
              </div>
              <input type="file" ref={weeklyFileRef} accept=".xlsx,.xls,.xlsm" style={{display:'none'}}
                onChange={handleWeeklyUpload} />
            </div>
          </div>

          {/* Upload History */}
          <div className="card">
            <div className="card-header">
              <h3 style={{margin:0,fontSize:16}}>업로드 이력</h3>
              <span className="badge badge-blue" style={{marginLeft:8}}>{weeklyUploads.length}건</span>
            </div>
            <div className="card-body">
              {weeklyUploads.length === 0 ? (
                <div className="empty-state" style={{padding:'40px 20px'}}>
                  <div style={{fontSize:36,marginBottom:8}}>📁</div>
                  <div style={{fontSize:14,color:'var(--gray-500)'}}>업로드된 파일이 없습니다</div>
                </div>
              ) : (
                <div className="table-wrapper"><table>
                  <thead><tr>
                    <th>No.</th><th>파일명</th><th>보고일</th><th>업로드자</th>
                    <th>데이터 수</th><th>파일 크기</th><th>업로드일시</th><th>관리</th>
                  </tr></thead>
                  <tbody>{weeklyUploads.map(function(u, idx){
                    return (
                      <tr key={u.id}>
                        <td>{idx + 1}</td>
                        <td><strong>{u.original_filename}</strong></td>
                        <td>{u.report_date || '-'}</td>
                        <td>{u.uploaded_by || '-'}</td>
                        <td className="text-center"><span className="badge badge-blue">{u.row_count}명</span></td>
                        <td className="text-center">{formatFileSize(u.file_size)}</td>
                        <td style={{fontSize:12}}>{u.created_at ? new Date(u.created_at + 'Z').toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) : '-'}</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn btn-outline btn-sm" onClick={function(){handleWeeklyDownload(u.id, u.original_filename);}}>
                              다운로드</button>
                            {isAdmin && <button className="btn btn-danger btn-sm" onClick={function(){handleWeeklyDelete(u.id);}}>
                              삭제</button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}</tbody>
                </table></div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── Pilot Management (Admin) ── */}
      {subTab==='manage' && isAdmin && (
        <div>
          <div className="flex-between mb-4">
            <span style={{fontSize:14,color:'var(--gray-500)'}}>Active Pilots: {pilots.length}</span>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={openCreate}>+ Add Pilot</button>
              <button className="btn btn-primary" onClick={function(){setShowBulkPilotImport(true);}}>📤 일괄등록</button>
            </div>
          </div>
          <div className="card"><div className="card-body">
            <div className="table-wrapper"><table>
              <thead><tr><th style={{width:50}}></th><th>Short Name</th><th>Full Name</th><th>Rank</th>
                <th>Nationality</th><th>Service No.</th><th>Callsign</th><th>Squadron</th><th style={{width:120}}></th></tr></thead>
              <tbody>{pilots.map(function(p){
                var natLabel = natLabelMap[normalizeNat(p.nationality)] || p.nationality || '-';
                return (
                <tr key={p.id}>
                  <td><Avatar src={p.photo_url} name={p.short_name} size="sm"/></td>
                  <td><strong>{p.short_name}</strong></td><td>{p.name}</td><td>{p.rank}</td>
                  <td><span className="badge badge-blue">{natLabel}</span></td>
                  <td>{p.service_number||'-'}</td><td>{p.callsign||'-'}</td><td>{p.squadron||'-'}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-outline btn-sm" onClick={function(){openEdit(p);}}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={function(){deactivatePilot(p);}}>Del</button>
                    </div>
                  </td>
                </tr>
              );})}{pilots.length===0&&<tr><td colSpan="9" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>No pilots</td></tr>}</tbody>
            </table></div>
          </div></div>
        </div>
      )}

      {/* Photo upload hidden input */}
      <input type="file" ref={photoRef} accept="image/*" style={{display:'none'}} onChange={handlePhotoUpload}/>

      {/* Pilot Create/Edit Modal */}
      {showPilotModal && <Modal title={editingPilot?`Edit: ${editingPilot.short_name}`:'Add New Pilot'} onClose={function(){setShowPilotModal(false);}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowPilotModal(false);}}>Cancel</button>
          <button className="btn btn-primary" onClick={savePilot}>{editingPilot?'Update':'Create'}</button></>}>
        <div className="pilot-admin-grid">
          {formField('Full Name *','name')}
          {formField('Short Name *','short_name')}
          <div className="form-group"><label>Rank</label>
            <select value={pilotForm.rank||'Major'} onChange={function(e){setPilotForm({...pilotForm,rank:e.target.value});} }>
              {['Major','Captain','First Lieutenant','Second Lieutenant','Colonel','Lieutenant Colonel'].map(function(r){
                return <option key={r} value={r}>{r}</option>;
              })}
            </select></div>
          {formField('Service Number','service_number')}
          {formField('Callsign','callsign')}
          <div className="form-group"><label>Nationality</label>
            <div style={{display:'flex',gap:6}}>
              <select style={{flex:1}} value={pilotForm.nationality||''} onChange={function(e){setPilotForm({...pilotForm,nationality:e.target.value});}}>
                <option value="">Select</option>
                {nationalities.map(function(n){return <option key={n.id} value={n.code}>{n.label_ko} ({n.code})</option>;})}
              </select>
            </div>
          </div>
          {formField('Squadron','squadron')}
          {formField('Date of Birth','date_of_birth','date')}
          {formField('Course Class','course_class')}
          {formField('Training Start','training_start_date','date')}
          {formField('Training End','training_end_date','date')}
          {formField('Phone','phone','tel')}
          {formField('Email','email','email')}
          {formField('Sort Order','sort_order','number')}
        </div>
        <div className="form-group" style={{marginTop:12}}><label>Notes</label>
          <textarea rows="2" value={pilotForm.notes||''} onChange={function(e){setPilotForm({...pilotForm,notes:e.target.value});}} /></div>
      </Modal>}

      {/* Bulk Pilot Import Modal */}
      {showBulkPilotImport&&<Modal title="조종사 일괄등록" onClose={function(){setShowBulkPilotImport(false);setPilotImportFile(null);setPilotImportPreview([]);}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowBulkPilotImport(false);setPilotImportFile(null);setPilotImportPreview([]);}}>취소</button>
          {pilotImportFile && pilotImportFile.length > 0 && <button className="btn btn-success" onClick={confirmBulkPilotImport}>{pilotImportFile.length}명 가져오기</button>}</>}>
        {!pilotImportFile || pilotImportFile.length === 0 ? (
          <div>
            <div style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 12}}>엑셀 파일에 다음 열이 필요합니다: name, short_name, rank, nationality, callsign, service_number</div>
            <div className="import-area">
              <div style={{fontSize: 40, marginBottom: 8}}>📊</div>
              <div style={{fontWeight: 600, marginBottom: 4}}>엑셀 파일을 선택하세요</div>
              <div style={{fontSize: 12, color: 'var(--gray-400)'}}>(.xlsx / .xlsm 형식)</div>
              <input type="file" ref={pilotImportFileRef} onChange={handleBulkPilotImportFile} accept=".xlsx,.xls,.xlsm" style={{display: 'none'}} />
              <button className="btn btn-primary btn-sm" onClick={function(){pilotImportFileRef.current && pilotImportFileRef.current.click();}} style={{marginTop: 12}}>파일 선택</button>
            </div>
          </div>
        ) : (
          <div>
            <div style={{fontSize: 12, color: 'var(--gray-600)', marginBottom: 12}}>가져올 데이터 미리보기 ({pilotImportFile.length}명):</div>
            <div style={{maxHeight: 300, overflowY: 'auto'}}>
              {pilotImportPreview.map(function(row, idx) {
                return (
                  <div key={idx} className="preview-row" style={{borderBottom: '1px solid var(--gray-100)', padding: '8px 0', fontSize: 12}}>
                    <div><strong>{row.short_name || '-'}</strong></div>
                    <div>{row.name || '-'}</div>
                    <div>{row.rank || '-'}</div>
                    <div>{row.nationality || '-'}</div>
                    <div>{row.callsign || '-'}</div>
                    <div>{row.service_number || '-'}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Modal>}
    </div>
  );
}

// ━━━━━━━━━━━━ ERROR BOUNDARY ━━━━━━━━━━━━
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  componentDidCatch(error, errorInfo) {
    this.setState({ hasError: true, error: error });
    console.error('[ATMS Error]', error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'linear-gradient(135deg,#0f172a,#1e1b4b)',color:'#fff',fontFamily:'Inter,sans-serif'}},
        React.createElement('div', {style:{textAlign:'center',padding:40,maxWidth:480}},
          React.createElement('div', {style:{fontSize:64,marginBottom:16}}, '\u26A0\uFE0F'),
          React.createElement('h2', {style:{fontSize:24,fontWeight:700,marginBottom:12}}, '\uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4'),
          React.createElement('p', {style:{color:'rgba(148,163,184,0.8)',marginBottom:24,lineHeight:1.6}}, '\uC608\uAE30\uCE58 \uC54A\uC740 \uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4. \uD398\uC774\uC9C0\uB97C \uC0C8\uB85C\uACE0\uCE68\uD574 \uC8FC\uC138\uC694.'),
          React.createElement('button', {
            onClick: function() { window.location.reload(); },
            style:{padding:'12px 32px',background:'linear-gradient(135deg,#2563eb,#4f46e5)',color:'#fff',border:'none',borderRadius:10,fontSize:16,fontWeight:600,cursor:'pointer'}
          }, '\uD398\uC774\uC9C0 \uC0C8\uB85C\uACE0\uCE68')
        )
      );
    }
    return this.props.children;
  }
}

// ━━━━━━━━━━━━ MAIN APP ━━━━━━━━━━━━
function App() {
  var [showSplash, setShowSplash] = useState(true);
  var [user, setUser] = useState(function(){try{return JSON.parse(localStorage.getItem('atms_user'));}catch(e){return null;}});
  var [page, setPage] = useState('dashboard');
  var [toast, setToast] = useState(null);
  var [sidebarOpen, setSidebarOpen] = useState(false);
  var [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  var [activeUsers, setActiveUsers] = useState(0);
  var [darkMode, setDarkMode] = useState(function(){return localStorage.getItem('atms_dark_mode')==='true';});
  var [unreadNotifications, setUnreadNotifications] = useState(0);
  var showToast = function(message,type) { if(!type) type='success'; setToast({message:message,type:type}); };
  var logout = function() { localStorage.removeItem('atms_token'); localStorage.removeItem('atms_user'); setUser(null); };
  var refreshUser = function() {
    api('/auth/profile').then(function(d) {
      var u = { id:d.data.id, employee_id:d.data.employee_id, name:d.data.name, role:d.data.role,
        title:d.data.title, department:d.data.department, email:d.data.email, photo_url:d.data.photo_url };
      localStorage.setItem('atms_user', JSON.stringify(u)); setUser(u);
    }).catch(function(){});
  };
  var toggleDarkMode = function() {
    var newMode = !darkMode;
    setDarkMode(newMode);
    localStorage.setItem('atms_dark_mode', newMode);
    if(newMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
  };
  var navigate = function(p) { setPage(p); setSidebarOpen(false); };
  useEffect(function(){
    if(darkMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
  },[darkMode]);
  useEffect(function(){
    if(!user) return;
    var fetchActive = function() {
      api('/active-users').then(function(d){setActiveUsers((d.data&&d.data.count)||0);}).catch(function(){});
      api('/notifications').then(function(d){
        if(d.data && d.data.unread_count) setUnreadNotifications(d.data.unread_count);
      }).catch(function(){});
    };
    fetchActive();
    var iv = setInterval(fetchActive,60000);
    return function() { clearInterval(iv); };
  },[user]);

  if(!user) return <LoginPage onLogin={setUser}/>;

  const pilotItems = [
    {id:'pilots',label:'조종사 현황',icon:'✈️'},
  ];
  const mechanicItems = [
    {id:'mechanic',label:'정비사 현황',icon:'🔧'},
  ];
  const commonItems = [
    {id:'dashboard',label:'대시보드',icon:'📊'},
    {id:'courses',label:'과정 관리',icon:'📚'},
    {id:'schedule',label:'일정 관리',icon:'📅'},
    {id:'evaluations',label:'평가 관리',icon:'📝'},
    {id:'ojt',label:'OJT 관리',icon:'🛠️'},
    {id:'content',label:'학습 자료',icon:'📖'},
    {id:'users',label:'사용자 관리',icon:'👤',roles:['admin','ojt_admin','manager']},
    {id:'reports',label:'리포트',icon:'📈',roles:['admin','instructor','ojt_admin','manager']},
    {id:'notifications',label:'알림',icon:'🔔'},
    {id:'access-logs',label:'접속 로그',icon:'🌐',roles:['admin']},
  ];
  const pn = {dashboard:'대시보드',courses:'과정 관리',schedule:'일정 관리',evaluations:'평가 관리',
    ojt:'OJT 관리',content:'학습 자료',users:'사용자 관리',reports:'리포트',notifications:'알림',
    profile:'내 프로필',pilots:'조종사 현황',mechanic:'정비사 현황','access-logs':'접속 로그'};

  const renderPage = () => {
    switch(page){
      case 'dashboard': return <Dashboard/>;
      case 'courses': return <CoursesPage/>;
      case 'users': return <UsersPage/>;
      case 'schedule': return <SchedulePage/>;
      case 'evaluations': return <EvaluationsPage/>;
      case 'ojt': return <OJTPage/>;
      case 'content': return <ContentPage/>;
      case 'reports': return <ReportsPage/>;
      case 'notifications': return <NotificationsPage/>;
      case 'profile': return <ProfilePage/>;
      case 'pilots': return <PilotPage/>;
      case 'mechanic': return <MechanicPage/>;
      case 'access-logs': return <AccessLogsPage/>;
      default: return <Dashboard/>;
    }
  };

  var renderNavSection = function(title, items) {
    return React.createElement(React.Fragment, {},
      React.createElement('div', {className:'nav-section'}, title),
      items.filter(function(n){return !n.roles||n.roles.includes(user.role);}).map(function(n){
        return React.createElement('div', {key:n.id, className:'nav-item ' + (page===n.id?'active':''),onClick:function(){navigate(n.id);}},
          React.createElement('span', {}, n.icon),
          React.createElement('span', {}, n.label),
          n.id === 'notifications' && unreadNotifications > 0 && React.createElement('div', {className:'nav-item-badge',style:{marginLeft:'auto'}}, unreadNotifications)
        );
      })
    );
  };

  return (
    <React.Fragment>
      {showSplash && <SplashScreen onDone={function() { setShowSplash(false); }} />}
      <AppContext.Provider value={{user,showToast,refreshUser}}>
        <div className="app-layout">
          <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />
          <div className={`sidebar ${sidebarOpen?'open':''} ${sidebarCollapsed?'collapsed':''}`}>
            <div className="sidebar-header">
            <h2>ATMS</h2>
            <button className="sidebar-toggle" onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}
              title={sidebarCollapsed?'메뉴 펼치기':'메뉴 접기'}>
              {sidebarCollapsed ? '▶' : '◀'}
            </button>
          </div>
          {!sidebarCollapsed && (
            <div style={{padding:'0 20px'}}>
              <div className="sidebar-user" onClick={()=>navigate('profile')}>
                <Avatar src={user.photo_url} name={user.name} size="sm"/>
                <div className="user-detail"><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>{user.name}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>{user.role}</div></div>
              </div>
            </div>
          )}
          {sidebarCollapsed && (
            <div style={{padding:'12px 0',display:'flex',justifyContent:'center'}}>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={()=>navigate('profile')}/>
            </div>
          )}
          <div className="sidebar-nav">
            {renderNavSection('조종사', pilotItems)}
            {renderNavSection('정비사', mechanicItems)}
            {renderNavSection('공통', commonItems)}
          </div>
          <div className="sidebar-footer">
            <div className="nav-item" onClick={()=>navigate('profile')}><span>⚙️</span><span>내 프로필</span></div>
            <div className="nav-item" onClick={logout}><span>🚪</span><span>로그아웃</span></div>
          </div>
        </div>
        <div className={`main-content ${sidebarCollapsed?'sidebar-collapsed':''}`}>
          <AnimatedBackground />
          <div className="top-bar">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button className="hamburger" onClick={function(){setSidebarOpen(!sidebarOpen);}}>☰</button>
              <h1>{pn[page]||'대시보드'}</h1>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div className="active-indicator"><div className="active-dot"/>{activeUsers} online</div>
              <span className="desktop-date" style={{fontSize:14,color:'var(--gray-500)'}}>{new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</span>
              <button className="btn-outline" style={{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:'4px 8px'}} onClick={toggleDarkMode} title="다크모드 토글">
                {darkMode ? '☀️' : '🌙'}
              </button>
              <div style={{position:'relative'}}>
                <button className="btn-outline" style={{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:'4px 8px'}} onClick={function(){navigate('notifications');}} title="알림">
                  🔔
                </button>
                {unreadNotifications > 0 && React.createElement('div', {className:'nav-item-badge'}, unreadNotifications)}
              </div>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={function(){navigate('profile');}}/>
            </div>
          </div>
          <PageTransition pageKey={page}>{renderPage()}</PageTransition>
        </div>
        {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
      </div>
      </AppContext.Provider>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
