// ━━━━━━━━━━━━ 3D COMPONENTS (Three.js r128) ━━━━━━━━━━━━

// ── Military HUD Hero Banner with Radar ──
function Aircraft3D({ completionRate }) {
  var mountRef = useRef(null);
  var frameRef = useRef(null);

  useEffect(function() {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    var el = mountRef.current;
    var w = el.clientWidth, h = el.clientHeight;

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    // Minimal lighting for HUD
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    var pct = completionRate || 0;

    // Grid background lines
    var gridGeo = new THREE.BufferGeometry();
    var gridPoints = [];
    var gridSpacing = 0.5;
    for (var x = -3; x <= 3; x += gridSpacing) {
      gridPoints.push(new THREE.Vector3(x, -2, 0));
      gridPoints.push(new THREE.Vector3(x, 2, 0));
    }
    for (var y = -2; y <= 2; y += gridSpacing) {
      gridPoints.push(new THREE.Vector3(-3, y, 0));
      gridPoints.push(new THREE.Vector3(3, y, 0));
    }
    gridGeo.setFromPoints(gridPoints);
    var gridMat = new THREE.LineBasicMaterial({ color: 0x00aa88, transparent: true, opacity: 0.1, linewidth: 1 });
    var gridLines = new THREE.LineSegments(gridGeo, gridMat);
    scene.add(gridLines);

    // HUD targeting brackets (center)
    var bracketGeo = new THREE.BufferGeometry();
    var bracketSize = 0.3;
    var bracketPts = [
      // Top-left bracket
      new THREE.Vector3(-bracketSize, bracketSize, 0.1), new THREE.Vector3(-bracketSize * 0.5, bracketSize, 0.1),
      new THREE.Vector3(-bracketSize, bracketSize, 0.1), new THREE.Vector3(-bracketSize, bracketSize * 0.5, 0.1),
      // Top-right bracket
      new THREE.Vector3(bracketSize, bracketSize, 0.1), new THREE.Vector3(bracketSize * 0.5, bracketSize, 0.1),
      new THREE.Vector3(bracketSize, bracketSize, 0.1), new THREE.Vector3(bracketSize, bracketSize * 0.5, 0.1),
      // Bottom-left bracket
      new THREE.Vector3(-bracketSize, -bracketSize, 0.1), new THREE.Vector3(-bracketSize * 0.5, -bracketSize, 0.1),
      new THREE.Vector3(-bracketSize, -bracketSize, 0.1), new THREE.Vector3(-bracketSize, -bracketSize * 0.5, 0.1),
      // Bottom-right bracket
      new THREE.Vector3(bracketSize, -bracketSize, 0.1), new THREE.Vector3(bracketSize * 0.5, -bracketSize, 0.1),
      new THREE.Vector3(bracketSize, -bracketSize, 0.1), new THREE.Vector3(bracketSize, -bracketSize * 0.5, 0.1),
      // Center crosshair
      new THREE.Vector3(-0.1, 0, 0.1), new THREE.Vector3(0.1, 0, 0.1),
      new THREE.Vector3(0, -0.1, 0.1), new THREE.Vector3(0, 0.1, 0.1)
    ];
    bracketGeo.setFromPoints(bracketPts);
    var bracketMat = new THREE.LineBasicMaterial({ color: 0x00ff88, linewidth: 2 });
    var brackets = new THREE.LineSegments(bracketGeo, bracketMat);
    scene.add(brackets);

    // HUD frame border
    var frameGeo = new THREE.BufferGeometry();
    var frameBorder = [
      new THREE.Vector3(-3, 2, 0.05), new THREE.Vector3(3, 2, 0.05),
      new THREE.Vector3(3, 2, 0.05), new THREE.Vector3(3, -2, 0.05),
      new THREE.Vector3(3, -2, 0.05), new THREE.Vector3(-3, -2, 0.05),
      new THREE.Vector3(-3, -2, 0.05), new THREE.Vector3(-3, 2, 0.05)
    ];
    frameGeo.setFromPoints(frameBorder);
    var frameMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6, linewidth: 3 });
    var frameLines = new THREE.LineSegments(frameGeo, frameMat);
    scene.add(frameLines);

    // Particle streaks (flying through atmosphere effect)
    var particleGeo = new THREE.BufferGeometry();
    var particlePositions = new Float32Array(100 * 3);
    var particleSpeeds = [];
    for (var i = 0; i < 100; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 6;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 4;
      particlePositions[i * 3 + 2] = Math.random() * 3 - 1;
      particleSpeeds.push(0.03 + Math.random() * 0.05);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    var particleMat = new THREE.PointsMaterial({ color: 0x00ffaa, size: 0.05, transparent: true, opacity: 0.7 });
    var particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Radar in top-right (canvas texture)
    var radarCanvas = document.createElement('canvas');
    radarCanvas.width = 256;
    radarCanvas.height = 256;
    var radarCtx = radarCanvas.getContext('2d');
    radarCtx.fillStyle = 'rgba(10, 20, 40, 0.9)';
    radarCtx.fillRect(0, 0, 256, 256);
    radarCtx.strokeStyle = '#00ff88';
    radarCtx.lineWidth = 1;
    radarCtx.beginPath();
    radarCtx.arc(128, 128, 100, 0, Math.PI * 2);
    radarCtx.stroke();
    for (var r = 1; r <= 3; r++) {
      radarCtx.beginPath();
      radarCtx.arc(128, 128, 100 / 3 * r, 0, Math.PI * 2);
      radarCtx.stroke();
    }
    var radarTex = new THREE.CanvasTexture(radarCanvas);
    var radarGeo = new THREE.PlaneGeometry(2, 2);
    var radarMat = new THREE.MeshBasicMaterial({ map: radarTex, transparent: true });
    var radarMesh = new THREE.Mesh(radarGeo, radarMat);
    radarMesh.position.set(2, 1.3, 0.2);
    scene.add(radarMesh);

    // Data readout (canvas texture for HUD text)
    var dataCanvas = document.createElement('canvas');
    dataCanvas.width = 400;
    dataCanvas.height = 150;
    var dataCtx = dataCanvas.getContext('2d');
    dataCtx.fillStyle = 'rgba(10, 20, 40, 0.8)';
    dataCtx.fillRect(0, 0, 400, 150);
    dataCtx.fillStyle = '#00ffff';
    dataCtx.font = 'bold 24px monospace';
    dataCtx.fillText('ALT 35000', 20, 40);
    dataCtx.fillText('SPD M0.85', 20, 80);
    dataCtx.fillText('HDG 270', 20, 120);
    dataCtx.fillStyle = '#00ff88';
    dataCtx.font = 'bold 32px monospace';
    dataCtx.fillText(pct + '%', 250, 80);
    var dataTex = new THREE.CanvasTexture(dataCanvas);
    var dataGeo = new THREE.PlaneGeometry(3, 1.1);
    var dataMat = new THREE.MeshBasicMaterial({ map: dataTex, transparent: true });
    var dataMesh = new THREE.Mesh(dataGeo, dataMat);
    dataMesh.position.set(0, -1.3, 0.1);
    scene.add(dataMesh);

    // Animation
    var radarAngle = 0;
    var t = 0;
    function animate() {
      frameRef.current = requestAnimationFrame(animate);
      t += 0.016;
      radarAngle += 0.01;

      // Update particle positions (streak effect)
      var pPos = particleGeo.attributes.position.array;
      for (var pi = 0; pi < 100; pi++) {
        pPos[pi * 3] -= particleSpeeds[pi];
        if (pPos[pi * 3] < -3) {
          pPos[pi * 3] = 3;
        }
      }
      particleGeo.attributes.position.needsUpdate = true;

      // Update radar
      radarCanvas.width = radarCanvas.width;
      radarCtx.fillStyle = 'rgba(10, 20, 40, 0.9)';
      radarCtx.fillRect(0, 0, 256, 256);
      radarCtx.strokeStyle = '#00ff88';
      radarCtx.lineWidth = 1;
      radarCtx.beginPath();
      radarCtx.arc(128, 128, 100, 0, Math.PI * 2);
      radarCtx.stroke();
      for (var rr = 1; rr <= 3; rr++) {
        radarCtx.beginPath();
        radarCtx.arc(128, 128, 100 / 3 * rr, 0, Math.PI * 2);
        radarCtx.stroke();
      }
      // Draw sweep line
      radarCtx.strokeStyle = '#00ffaa';
      radarCtx.lineWidth = 2;
      radarCtx.beginPath();
      radarCtx.moveTo(128, 128);
      var sweepX = 128 + Math.cos(radarAngle) * 100;
      var sweepY = 128 + Math.sin(radarAngle) * 100;
      radarCtx.lineTo(sweepX, sweepY);
      radarCtx.stroke();
      // Draw some target dots
      radarCtx.fillStyle = '#ff4488';
      for (var d = 0; d < 3; d++) {
        var dotAngle = (radarAngle + d * Math.PI * 2 / 3 + t * 0.1) % (Math.PI * 2);
        var dotDist = 60 + Math.sin(t + d) * 20;
        var dotX = 128 + Math.cos(dotAngle) * dotDist;
        var dotY = 128 + Math.sin(dotAngle) * dotDist;
        radarCtx.beginPath();
        radarCtx.arc(dotX, dotY, 4, 0, Math.PI * 2);
        radarCtx.fill();
      }
      radarTex.needsUpdate = true;

      brackets.rotation.z = Math.sin(t * 2) * 0.05;

      renderer.render(scene, camera);
    }
    animate();

    var onResize = function() {
      var nw = el.clientWidth, nh = el.clientHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', onResize);

    return function() {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', onResize);
      if (renderer.domElement.parentNode) el.removeChild(renderer.domElement);
      renderer.dispose();
      radarTex.dispose();
      dataTex.dispose();
    };
  }, [completionRate]);

  var pct = completionRate || 0;
  var statusText = pct >= 80 ? 'Excellent' : pct >= 50 ? 'On Track' : 'In Progress';
  var statusColor = pct >= 80 ? '#059669' : pct >= 50 ? '#d97706' : '#2563eb';

  return (
    <div style={{position:'relative',overflow:'hidden',borderRadius:16,
      background:'linear-gradient(135deg, #0f1b3d 0%, #162050 40%, #1e2d6a 70%, #0f1b3d 100%)',
      border:'1px solid rgba(0,255,136,0.2)',marginBottom:20}}>
      <div ref={mountRef} style={{width:'100%',height:250}} />
      <div style={{position:'absolute',top:16,left:20}}>
        <div style={{fontSize:11,color:'rgba(0,255,136,0.7)',textTransform:'uppercase',letterSpacing:2,marginBottom:4}}>
          {'ATMS T-50 TRAINING SYSTEM'}
        </div>
        <div style={{fontSize:28,fontWeight:800,color:'#00ffff',lineHeight:1.1}}>
          {'Military HUD'}
        </div>
        <div style={{fontSize:13,color:statusColor,fontWeight:600,marginTop:6}}>
          {statusText}{' • '}{pct}{'% 완료'}
        </div>
      </div>
      <div style={{position:'absolute',bottom:12,left:20,right:20}}>
        <div style={{height:4,background:'rgba(0,255,136,0.1)',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,'+statusColor+',#00ffaa)',borderRadius:2,
            transition:'width 1s ease',boxShadow:'0 0 8px '+statusColor}} />
        </div>
      </div>
    </div>
  );
}

// ── 3D Globe: Nationality Distribution with Visible Beams ──
function Globe3D({ nationalities, pilots }) {
  var mountRef = useRef(null);
  var frameRef = useRef(null);

  var COORDS = {
    'Malaysia': { lat: 4.2, lon: 101.9, color: 0xff3333 },
    'Malaysian': { lat: 4.2, lon: 101.9, color: 0xff3333 },
    'Poland': { lat: 51.9, lon: 19.1, color: 0xff4466 },
    'Iraq': { lat: 33.2, lon: 43.7, color: 0x33ff88 },
    'Philippines': { lat: 12.8, lon: 121.7, color: 0x0055ff },
    'Indonesia': { lat: -0.7, lon: 113.9, color: 0xff5533 },
    'South Korea': { lat: 35.9, lon: 127.7, color: 0x0088ff },
    'Korea': { lat: 35.9, lon: 127.7, color: 0x0088ff }
  };

  useEffect(function() {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    var el = mountRef.current;
    var w = el.clientWidth, h = el.clientHeight;

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.set(0, 0.5, 3.2);
    camera.lookAt(0, 0, 0);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0x4466aa, 0.7));
    var dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);
    var rimLight = new THREE.DirectionalLight(0x6699ff, 0.5);
    rimLight.position.set(-3, -1, -3);
    scene.add(rimLight);

    // Brighter ocean blue globe
    var globeGeo = new THREE.SphereGeometry(1, 64, 64);
    var globeMat = new THREE.MeshPhongMaterial({
      color: 0x1a3a7a,
      emissive: 0x0a1a40,
      emissiveIntensity: 0.2,
      specular: 0x4488ff,
      shininess: 40,
      transparent: true,
      opacity: 0.95
    });
    var globe = new THREE.Mesh(globeGeo, globeMat);
    scene.add(globe);

    // Wireframe grid overlay
    var wireGeo = new THREE.SphereGeometry(1.01, 32, 32);
    var wireMat = new THREE.MeshBasicMaterial({ wireframe: true, color: 0x4488ff, transparent: true, opacity: 0.2 });
    var wireframe = new THREE.Mesh(wireGeo, wireMat);
    scene.add(wireframe);

    function latLonToVec3(lat, lon, radius) {
      var phi = (90 - lat) * Math.PI / 180;
      var theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // Count pilots
    var natCounts = {};
    (pilots || []).forEach(function(p) {
      var nat = p.nationality || 'Unknown';
      natCounts[nat] = (natCounts[nat] || 0) + 1;
    });

    // Add markers - very bright and visible
    var markers = [];
    Object.keys(natCounts).forEach(function(nat) {
      var coord = COORDS[nat];
      if (!coord) return;
      var count = natCounts[nat];
      var pos = latLonToVec3(coord.lat, coord.lon, 1.02);

      // Bright tapered beam pillar
      var pillarH = 0.2 + count * 0.15;
      var pillarGeo = new THREE.CylinderGeometry(0.01, 0.03, pillarH, 16);
      var pillarMat = new THREE.MeshPhongMaterial({
        color: coord.color,
        emissive: coord.color,
        emissiveIntensity: 1.0,
        specular: 0xffffff,
        shininess: 100
      });
      var pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.copy(pos);
      pillar.lookAt(new THREE.Vector3(0, 0, 0));
      pillar.rotateX(Math.PI / 2);
      pillar.translateY(pillarH / 2);
      scene.add(pillar);

      // Large glowing sphere on top
      var sphereR = 0.08 + count * 0.03;
      var sphereGeo = new THREE.SphereGeometry(sphereR, 20, 20);
      var sphereMat = new THREE.MeshPhongMaterial({
        color: coord.color,
        emissive: coord.color,
        emissiveIntensity: 1.0,
        specular: 0xffffff,
        shininess: 120,
        transparent: true,
        opacity: 0.95
      });
      var sphere = new THREE.Mesh(sphereGeo, sphereMat);
      var topPos = latLonToVec3(coord.lat, coord.lon, 1.02 + pillarH);
      sphere.position.copy(topPos);
      scene.add(sphere);
      markers.push({ sphere: sphere, pillar: pillar, time: Math.random() * Math.PI * 2, count: count });

      // Large pulsing ring base
      var ringGeo = new THREE.RingGeometry(0.05, 0.15, 48);
      var ringMat = new THREE.MeshBasicMaterial({ color: coord.color, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
      var ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(pos);
      ring.lookAt(new THREE.Vector3(0, 0, 0));
      scene.add(ring);
      markers.push({ ring: ring, ringMat: ringMat, time: Math.random() * Math.PI * 2 });

      // Floating label with country name and pilot count
      var labelCanvas = document.createElement('canvas');
      labelCanvas.width = 256;
      labelCanvas.height = 64;
      var labelCtx = labelCanvas.getContext('2d');
      labelCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      labelCtx.fillRect(0, 0, 256, 64);
      labelCtx.fillStyle = '#ffffff';
      labelCtx.font = 'bold 32px Arial';
      labelCtx.textAlign = 'center';
      labelCtx.fillText(nat, 128, 25);
      labelCtx.fillText(count + '명', 128, 50);
      var labelTex = new THREE.CanvasTexture(labelCanvas);
      var labelGeo = new THREE.PlaneGeometry(0.5, 0.15);
      var labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true });
      var labelMesh = new THREE.Mesh(labelGeo, labelMat);
      var labelPos = latLonToVec3(coord.lat, coord.lon, 1.35 + pillarH);
      labelMesh.position.copy(labelPos);
      labelMesh.lookAt(camera.position);
      scene.add(labelMesh);
      markers.push({ label: labelMesh, labelPos: labelPos, labelTex: labelTex });
    });

    // Animation
    var t = 0;
    var isDragging = false;
    var prevMouse = { x: 0, y: 0 };
    var rotVel = { x: 0, y: 0.003 };

    function animate() {
      frameRef.current = requestAnimationFrame(animate);
      t += 0.016;

      if (!isDragging) {
        rotVel.y += (0.003 - rotVel.y) * 0.02;
        rotVel.x *= 0.95;
      }
      globe.rotation.y += rotVel.y;
      wireframe.rotation.y = globe.rotation.y;
      globe.rotation.x += rotVel.x;
      wireframe.rotation.x = globe.rotation.x;

      markers.forEach(function(m) {
        m.time += 0.02;
        if (m.sphere) {
          m.sphere.scale.setScalar(1 + Math.sin(m.time * 2) * 0.25);
        }
        if (m.ring && m.ringMat) {
          var pulse = (Math.sin(m.time * 1.5) + 1) * 0.5;
          m.ringMat.opacity = 0.3 + pulse * 0.5;
          m.ring.scale.setScalar(1 + pulse * 0.3);
        }
        if (m.label && m.labelPos) {
          var rotatedPos = m.labelPos.clone();
          rotatedPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), rotVel.y);
          rotatedPos.applyAxisAngle(new THREE.Vector3(1, 0, 0), rotVel.x);
          m.label.position.copy(rotatedPos);
          m.label.lookAt(camera.position);
        }
      });

      renderer.render(scene, camera);
    }
    animate();

    var onMouseDown = function(e) { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
    var onMouseMove = function(e) {
      if (!isDragging) return;
      var dx = e.clientX - prevMouse.x;
      var dy = e.clientY - prevMouse.y;
      rotVel.y = dx * 0.003;
      rotVel.x = dy * 0.003;
      prevMouse = { x: e.clientX, y: e.clientY };
    };
    var onMouseUp = function() { isDragging = false; };

    el.addEventListener('mousedown', onMouseDown);
    el.addEventListener('mousemove', onMouseMove);
    el.addEventListener('mouseup', onMouseUp);
    el.addEventListener('mouseleave', onMouseUp);

    var onResize = function() {
      var nw = el.clientWidth, nh = el.clientHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', onResize);

    return function() {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', onResize);
      el.removeEventListener('mousedown', onMouseDown);
      el.removeEventListener('mousemove', onMouseMove);
      el.removeEventListener('mouseup', onMouseUp);
      el.removeEventListener('mouseleave', onMouseUp);
      if (renderer.domElement.parentNode) el.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, [pilots]);

  var natCounts = {};
  (pilots || []).forEach(function(p) { var n = p.nationality || 'Unknown'; natCounts[n] = (natCounts[n] || 0) + 1; });

  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{'🌍 국적별 훈련생 분포'}</h3></div>
      <div style={{position:'relative'}}>
        <div ref={mountRef} style={{width:'100%',height:320,cursor:'grab',background:'radial-gradient(ellipse at 30% 30%, #1a2d5e 0%, #0f1b3d 60%, #0a1530 100%)'}} />
        <div style={{position:'absolute',bottom:12,left:12,display:'flex',gap:8,flexWrap:'wrap'}}>
          {Object.keys(natCounts).map(function(nat) {
            var c = COORDS[nat];
            var col = c ? '#' + c.color.toString(16).padStart(6, '0') : '#888';
            return (
              <div key={nat} style={{background:'rgba(0,0,0,0.6)',borderRadius:6,padding:'4px 10px',fontSize:11,color:'#fff',
                borderLeft:'3px solid ' + col,backdropFilter:'blur(4px)'}}>
                <span style={{fontWeight:700}}>{natCounts[nat]}</span>{' '}{nat}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── 3D Progress Gauges with Canvas Arcs ──
function ProgressBars3D({ simDone, simTotal, fltDone, fltTotal }) {
  var mountRef = useRef(null);
  var frameRef = useRef(null);

  useEffect(function() {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    var el = mountRef.current;
    var w = el.clientWidth, h = el.clientHeight;

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
    camera.position.set(0, 1, 4);
    camera.lookAt(0, 0, 0);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x5080b0, 0.6));
    var dLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dLight.position.set(4, 5, 4);
    scene.add(dLight);

    var simPct = simTotal ? simDone / simTotal : 0;
    var fltPct = fltTotal ? fltDone / fltTotal : 0;

    // Create canvas-based gauge for SIM (left side)
    var simCanvas = document.createElement('canvas');
    simCanvas.width = 400;
    simCanvas.height = 300;
    var simCtx = simCanvas.getContext('2d');

    function drawGauge(ctx, pct, color, title, done, total) {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
      ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);

      var cX = ctx.canvas.width / 2;
      var cY = ctx.canvas.height / 2;
      var radius = 80;

      // Background arc (dim)
      ctx.strokeStyle = 'rgba(50, 50, 80, 0.5)';
      ctx.lineWidth = 15;
      ctx.beginPath();
      ctx.arc(cX, cY, radius, Math.PI + Math.PI * 0.25, Math.PI * 0.25);
      ctx.stroke();

      // Progress arc (bright)
      ctx.strokeStyle = color;
      ctx.lineWidth = 15;
      var sweepAngle = (Math.PI + Math.PI * 0.25) + pct * (Math.PI * 1.5);
      ctx.beginPath();
      ctx.arc(cX, cY, radius, Math.PI + Math.PI * 0.25, sweepAngle);
      ctx.stroke();

      // Center text
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(pct * 100) + '%', cX, cY - 20);

      ctx.fillStyle = 'rgba(200, 200, 200, 0.8)';
      ctx.font = '16px Arial';
      ctx.fillText(title, cX, cY + 60);
      ctx.fillText(done + ' / ' + total, cX, cY + 85);
    }

    drawGauge(simCtx, simPct, '#6366f1', 'SIM Training', simDone, simTotal);
    var simTex = new THREE.CanvasTexture(simCanvas);
    var simGeo = new THREE.PlaneGeometry(3, 2.25);
    var simMat = new THREE.MeshBasicMaterial({ map: simTex, transparent: true });
    var simMesh = new THREE.Mesh(simGeo, simMat);
    simMesh.position.set(-2, 0, 0.1);
    scene.add(simMesh);

    // Create canvas-based gauge for FLT (right side)
    var fltCanvas = document.createElement('canvas');
    fltCanvas.width = 400;
    fltCanvas.height = 300;
    var fltCtx = fltCanvas.getContext('2d');
    drawGauge(fltCtx, fltPct, '#10b981', 'Flight Training', fltDone, fltTotal);
    var fltTex = new THREE.CanvasTexture(fltCanvas);
    var fltGeo = new THREE.PlaneGeometry(3, 2.25);
    var fltMat = new THREE.MeshBasicMaterial({ map: fltTex, transparent: true });
    var fltMesh = new THREE.Mesh(fltGeo, fltMat);
    fltMesh.position.set(2, 0, 0.1);
    scene.add(fltMesh);

    // Frame rings behind gauges
    var frameTorusGeo = new THREE.TorusGeometry(1.15, 0.05, 32, 100);
    var frameTorusMat = new THREE.MeshPhongMaterial({ color: 0x6366f1, emissive: 0x6366f1, emissiveIntensity: 0.3 });
    var simFrame = new THREE.Mesh(frameTorusGeo, frameTorusMat);
    simFrame.position.set(-2, 0, 0);
    scene.add(simFrame);
    var fltFrame = new THREE.Mesh(frameTorusGeo, frameTorusMat);
    fltFrame.material = new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.3 });
    fltFrame.position.set(2, 0, 0);
    scene.add(fltFrame);

    var t = 0;
    function animate() {
      frameRef.current = requestAnimationFrame(animate);
      t += 0.016;

      simFrame.rotation.z += 0.005;
      fltFrame.rotation.z -= 0.005;

      drawGauge(simCtx, simPct, '#6366f1', 'SIM Training', simDone, simTotal);
      simTex.needsUpdate = true;
      drawGauge(fltCtx, fltPct, '#10b981', 'Flight Training', fltDone, fltTotal);
      fltTex.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    var onResize = function() {
      var nw = el.clientWidth, nh = el.clientHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', onResize);

    return function() {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', onResize);
      if (renderer.domElement.parentNode) el.removeChild(renderer.domElement);
      renderer.dispose();
      simTex.dispose();
      fltTex.dispose();
    };
  }, [simDone, simTotal, fltDone, fltTotal]);

  var simPct = simTotal ? Math.round(simDone / simTotal * 100) : 0;
  var fltPct = fltTotal ? Math.round(fltDone / fltTotal * 100) : 0;

  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{'📊 훈련 진행률 (3D)'}</h3></div>
      <div ref={mountRef} style={{width:'100%',height:320,background:'linear-gradient(135deg, #0f1b3d 0%, #1a2a55 50%, #0f1b3d 100%)'}} />
      <div style={{display:'flex',justifyContent:'space-around',padding:'12px 16px',borderTop:'1px solid rgba(99,102,241,0.1)'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:'#818cf8'}}>{simDone}{' / '}{simTotal}</div>
          <div style={{fontSize:11,color:'var(--gray-400)'}}>{'시뮬레이터 훈련 ('}{simPct}{'%)'}</div>
        </div>
        <div style={{width:1,background:'var(--gray-200)'}} />
        <div style={{textAlign:'center'}}>

// ── 3D Sidebar Background ──
function Sidebar3DBackground() {
  var mountRef = useRef(null);
  var frameRef = useRef(null);

  useEffect(function() {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    var el = mountRef.current;
    var w = el.clientWidth, h = el.clientHeight;
    if (w < 10 || h < 10) return;

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 50);
    camera.position.set(0, 0, 3);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    // Enhanced particles
    var particleCount = 100;
    var pGeo = new THREE.BufferGeometry();
    var positions = new Float32Array(particleCount * 3);
    var colors = new Float32Array(particleCount * 3);
    var speeds = [];
    for (var i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 4;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 8;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 3;
      var r = 0.4 + Math.random() * 0.2;
      var g = 0.5 + Math.random() * 0.2;
      var b = 0.9 + Math.random() * 0.1;
      colors[i * 3] = r;
      colors[i * 3 + 1] = g;
      colors[i * 3 + 2] = b;
      speeds.push(0.003 + Math.random() * 0.005);
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    var pMat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.8 });
    var particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // Geometric shapes
    var shapes = [];
    var shapeColors = [0x818cf8, 0xa78bfa, 0x6366f1, 0x7c3aed, 0xc4b5fd];
    for (var j = 0; j < 8; j++) {
      var geo;
      var type = j % 3;
      if (type === 0) geo = new THREE.OctahedronGeometry(0.12 + Math.random() * 0.08, 0);
      else if (type === 1) geo = new THREE.TetrahedronGeometry(0.1 + Math.random() * 0.06, 0);
      else geo = new THREE.IcosahedronGeometry(0.08 + Math.random() * 0.05, 0);

      var mat = new THREE.MeshBasicMaterial({
        color: shapeColors[j % shapeColors.length],
        wireframe: true,
        transparent: true,
        opacity: 0.3 + Math.random() * 0.15
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        (Math.random() - 0.5) * 2.5,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 2
      );
      scene.add(mesh);
      shapes.push({
        mesh: mesh,
        rotSpeed: { x: (Math.random() - 0.5) * 0.025, y: (Math.random() - 0.5) * 0.025, z: (Math.random() - 0.5) * 0.015 },
        floatSpeed: 0.0015 + Math.random() * 0.003,
        floatOffset: Math.random() * Math.PI * 2
      });
    }

    // Brighter constellation lines
    var lineGeo = new THREE.BufferGeometry();
    var linePositions = new Float32Array(100 * 6);
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    var lineMat = new THREE.LineBasicMaterial({ color: 0x818cf8, transparent: true, opacity: 0.18 });
    var lines = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines);

    var t = 0;
    function animate() {
      frameRef.current = requestAnimationFrame(animate);
      t += 0.008;

      var posArr = particles.geometry.attributes.position.array;
      for (var k = 0; k < particleCount; k++) {
        posArr[k * 3 + 1] += speeds[k];
        posArr[k * 3] += Math.sin(t + k) * 0.0015;
        if (posArr[k * 3 + 1] > 4.5) {
          posArr[k * 3 + 1] = -4.5;
          posArr[k * 3] = (Math.random() - 0.5) * 4;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;

      shapes.forEach(function(s) {
        s.mesh.rotation.x += s.rotSpeed.x;
        s.mesh.rotation.y += s.rotSpeed.y;
        s.mesh.rotation.z += s.rotSpeed.z;
        s.mesh.position.y += Math.sin(t * 2 + s.floatOffset) * 0.0025;
        s.mesh.material.opacity = 0.25 + Math.sin(t + s.floatOffset) * 0.12;
      });

      var lp = lines.geometry.attributes.position.array;
      var lineIdx = 0;
      var maxLines = 100;
      for (var a = 0; a < Math.min(particleCount, 40) && lineIdx < maxLines; a++) {
        for (var b = a + 1; b < Math.min(particleCount, 40) && lineIdx < maxLines; b++) {
          var dx = posArr[a*3] - posArr[b*3];
          var dy = posArr[a*3+1] - posArr[b*3+1];
          var dz = posArr[a*3+2] - posArr[b*3+2];
          var dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
          if (dist < 1.0) {
            lp[lineIdx*6] = posArr[a*3]; lp[lineIdx*6+1] = posArr[a*3+1]; lp[lineIdx*6+2] = posArr[a*3+2];
            lp[lineIdx*6+3] = posArr[b*3]; lp[lineIdx*6+4] = posArr[b*3+1]; lp[lineIdx*6+5] = posArr[b*3+2];
            lineIdx++;
          }
        }
      }
      for (var c = lineIdx; c < maxLines; c++) {
        lp[c*6] = 0; lp[c*6+1] = 0; lp[c*6+2] = 0;
        lp[c*6+3] = 0; lp[c*6+4] = 0; lp[c*6+5] = 0;
      }
      lines.geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    var onResize = function() {
      var nw = el.clientWidth, nh = el.clientHeight;
      if (nw < 10 || nh < 10) return;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', onResize);

    return function() {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', onResize);
      if (renderer.domElement && renderer.domElement.parentNode) el.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, []);

  return React.createElement('div', { ref: mountRef, className: 'sidebar-3d-bg',
    style: { background: 'linear-gradient(180deg, #0e1a38 0%, #132247 40%, #0e1a38 100%)' } });
}

// ━━━━━━━━━━━━ USERS ━━━━━━━━━━━━
function UsersPage() {
  const [data, setData] = useState({users:[],total:0});
  const [roleFilter, setRoleFilter] = useState('');
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [form, setForm] = useState({employee_id:'',name:'',email:'',role:'trainee',department:'',password:''});
  const [formErrors, setFormErrors] = useState({});
  const [importPreview, setImportPreview] = useState([]);
  const [importFile, setImportFile] = useState(null);
  const importFileRef = useRef(null);
  const { user, showToast } = useApp();
  const load = function() { let q='/users?per_page=100'; if(roleFilter) q+=`&role=${roleFilter}`; if(search) q+=`&search=${search}`;
    api(q).then(function(d){setData(d.data);}).catch(function(e){showToast(e.message,'error');}); };
  useEffect(function(){load();},[roleFilter,search]);
  const handleCreate = async function() {
    var errors = {};
    if(!form.employee_id) errors.employee_id = true;
    if(!form.name) errors.name = true;
    if(!form.password) errors.password = true;
    if(Object.keys(errors).length > 0) {
      setFormErrors(errors);
      return;
    }
    try { await api('/auth/register',{method:'POST',body:JSON.stringify(form)}); showToast('\uC0AC\uC6A9\uC790 \uB4F1\uB85D \uC644\uB8CC','success'); setShowModal(false); setForm({employee_id:'',name:'',email:'',role:'trainee',department:'',password:'',title:'',phone:'',birthday:'',specialty:''}); setFormErrors({}); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleDelete = async function() {
    if(!deleteTarget) return;
    try { await api(`/users/${deleteTarget.id}`,{method:'DELETE'}); showToast(`${deleteTarget.name} 비활성화 완료`,'success'); setDeleteTarget(null); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleBulkImportFile = function(e) {
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var data = new Uint8Array(evt.target.result);
        var workbook = XLSX.read(data, {type: 'array'});
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet);
        var preview = rows.slice(0, 5);
        setImportPreview(preview);
        setImportFile(rows);
      } catch(err) {
        showToast('엑셀 파일 읽기 실패: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  };
  const confirmBulkImport = async function() {
    if(!importFile || importFile.length === 0) {
      showToast('가져올 데이터가 없습니다', 'error');
      return;
    }
    try {
      var imported = 0;
      var failed = 0;
      for(var i = 0; i < importFile.length; i++) {
        var row = importFile[i];
        try {
          await api('/auth/register', {method: 'POST', body: JSON.stringify({
            employee_id: row.employee_id || '',
            name: row.name || '',
            email: row.email || '',
            role: row.role || 'trainee',
            department: row.department || '',
            password: row.password || ''
          })});
          imported++;
        } catch(err) {
          failed++;
        }
      }
      showToast(`가져오기 완료: ${imported}명 성공, ${failed}명 실패`, 'success');
      setImportFile(null);
      setImportPreview([]);
      setShowBulkImport(false);
      if(importFileRef.current) importFileRef.current.value = '';
      load();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const canManage = ['admin','ojt_admin'].includes(user.role);
  const isAdminRole = user && (user.role === 'admin' || user.role === 'ojt_admin');
  return (
    <div className="page-content">
      <div className="filters">
        <input placeholder="이름/사번 검색..." value={search} onChange={function(e){setSearch(e.target.value);}}/>
        <select value={roleFilter} onChange={function(e){setRoleFilter(e.target.value);}}>
          <option value="">전체 역할</option><option value="admin">Admin</option><option value="instructor">Instructor</option>
          <option value="trainee">Trainee</option><option value="ojt_admin">OJT Admin</option><option value="manager">Manager</option>
          <option value="staff">Staff</option><option value="customer">Customer Officer</option>
        </select>
        {canManage&&<button className="btn btn-primary btn-sm" onClick={function(){setShowModal(true);}}>+ 사용자 등록</button>}
        {canManage&&<button className="btn btn-primary btn-sm" onClick={function(){setShowBulkImport(true);}}>📤 일괄등록</button>}
        <span style={{fontSize:13,color:'var(--gray-500)'}}>총 {data.total}명</span>
      </div>
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th style={{width:50}}></th><th>사번</th><th>이름</th><th>이메일</th><th>역할</th><th>부서</th><th>상태</th>{(canManage||user.role==='instructor')&&<th style={{width:70}}></th>}</tr></thead>

            <td><span className="badge badge-blue">{u.role}</span></td><td>{u.department||'-'}</td><td><StatusBadge status={u.status}/></td>

              onClick={()=>setDeleteTarget(u)}>삭제</button>:<button className="btn btn-outline btn-sm" style={{padding:'4px 10px',fontSize:11}}>보기</button>}</td>}</tr>
        ))}</tbody>
      </table></div></div></div>
      {deleteTarget&&<Modal title="사용자 삭제 확인" onClose={function(){setDeleteTarget(null);}}
        footer={<><button className="btn btn-outline" onClick={function(){setDeleteTarget(null);}}>취소</button>
          <button className="btn btn-danger" onClick={handleDelete}>비활성화</button></>}>
        <div style={{textAlign:'center',padding:'20px 0'}}>
          <Avatar src={deleteTarget.photo_url} name={deleteTarget.name} size="lg" />
          <div style={{marginTop:16,fontSize:18,fontWeight:700}}>{deleteTarget.name}</div>
          <div style={{color:'var(--gray-500)',marginTop:4}}>{deleteTarget.employee_id} &middot; {deleteTarget.role}</div>
          <div style={{marginTop:20,padding:16,background:'var(--danger-light)',borderRadius:10,fontSize:14,color:'#991b1b'}}>
            이 사용자를 비활성화하시겠습니까?<br/><span style={{fontSize:12}}>(계정이 비활성 상태로 전환되며, 로그인이 불가합니다)</span>
          </div>
        </div>
      </Modal>}
      {showModal&&<Modal title="사용자 등록" onClose={function(){setShowModal(false);setFormErrors({});}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowModal(false);setFormErrors({});}}>취소</button><button className="btn btn-primary" onClick={handleCreate}>등록</button></>}>
        <div className={'form-group' + (formErrors.employee_id?' form-error':'')}><label className="form-required">사번</label><input value={form.employee_id} onChange={function(e){setForm({...form,employee_id:e.target.value});}} />{formErrors.employee_id&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className={'form-group' + (formErrors.name?' form-error':'')}><label className="form-required">이름</label><input value={form.name} onChange={function(e){setForm({...form,name:e.target.value});}} />{formErrors.name&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className="form-group"><label>이메일</label><input value={form.email} onChange={function(e){setForm({...form,email:e.target.value});}} /></div>
        <div className={'form-group' + (formErrors.password?' form-error':'')}><label className="form-required">비밀번호</label><input type="password" value={form.password} onChange={function(e){setForm({...form,password:e.target.value});}} />
          {form.password && <PasswordStrength password={form.password}/>}{formErrors.password&&<div className="form-error-msg">필수 입력 항목</div>}
        </div>
        <div className="form-group"><label>역할</label><select value={form.role} onChange={function(e){setForm({...form,role:e.target.value});}} >
          <option value="trainee">Trainee</option><option value="instructor">Instructor</option>
          <option value="ojt_admin">OJT Admin</option><option value="admin">Admin</option><option value="manager">Manager</option>
          <option value="staff">Staff</option><option value="customer">Customer Officer</option>
        </select></div>
        <div className="form-group"><label>부서/소속</label><input value={form.department} onChange={function(e){setForm({...form,department:e.target.value});}} /></div>
        <div className="form-group"><label>직급/직함</label><input value={form.title||''} onChange={function(e){setForm({...form,title:e.target.value});}} /></div>

        <div className="form-group"><label>생년월일</label><input type="date" value={form.birthday||''} onChange={function(e){setForm({...form,birthday:e.target.value});}} /></div>
        <div className="form-group"><label>특기/전문분야</label><input value={form.specialty||''} onChange={function(e){setForm({...form,specialty:e.target.value});}} /></div>

                reader.onload = function(ev){setForm(Object.assign({},form,{photo:ev.target.result,photo_preview:ev.target.result}));};
                reader.readAsDataURL(file);
              }} style={{fontSize:12}}/>

        </div>

                    <div style={{color: 'var(--gray-400)'}}>{row.password ? '있음' : '없음'}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Modal>}
    </div>
  );
}

// ━━━━━━━━━━━━ SCHEDULE ━━━━━━━━━━━━
function SchedulePage() {
  const [schedules, setSchedules] = useState([]);
  const [dateFrom, setDateFrom] = useState(''); const [dateTo, setDateTo] = useState('');
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [attendanceTarget, setAttendanceTarget] = useState(null);
  const [enrolledStudents, setEnrolledStudents] = useState([]);
  const [attendanceMap, setAttendanceMap] = useState({});
  const { user, showToast } = useApp();
  const [viewMode, setViewMode] = useState('all');
  const load = function() { let q='/schedules?'; if(dateFrom)q+=`&date_from=${dateFrom}`; if(dateTo)q+=`&date_to=${dateTo}`;
    api(q).then(function(d){setSchedules(d.data);}).catch(function(e){showToast(e.message,'error');}); };
  useEffect(function(){load();},[dateFrom,dateTo]);
  var filteredSchedules = schedules.filter(function(s){
    if(viewMode==='all') return true;
    if(viewMode==='my' && user) return s.instructor_id === user.id;
    if(viewMode==='teaching') return true;
    if(viewMode==='weekly') return true;
    return true;
  });
  var getInstructorSchedules = function() {
    var instructorMap = {};
    schedules.forEach(function(s) {
      var instructorName = s.instructor_name || 'Unknown';
      if(!instructorMap[instructorName]) {
        instructorMap[instructorName] = [];
      }
      instructorMap[instructorName].push(s);
    });
    return instructorMap;
  };
  const handleDelete = async function() {
    if(!deleteTarget) return;
    try { await api(`/schedules/${deleteTarget.id}`,{method:'DELETE'}); showToast('일정 삭제 완료','success'); setDeleteTarget(null); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const loadEnrolledStudents = async function(scheduleId) {
    try {
      const data = await api(`/schedules/${scheduleId}/enrollments`);
      setEnrolledStudents(data.data || []);
      const initialMap = {};
      (data.data || []).forEach(function(student) {
        initialMap[student.id] = 'present';
      });
      setAttendanceMap(initialMap);
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const toggleAttendanceStatus = function(studentId) {
    const statuses = ['present', 'absent', 'late', 'excused'];
    const current = attendanceMap[studentId] || 'present';
    const currentIdx = statuses.indexOf(current);
    const nextIdx = (currentIdx + 1) % statuses.length;
    setAttendanceMap({...attendanceMap, [studentId]: statuses[nextIdx]});
  };
  const markAllPresent = function() {
    const newMap = {};
    enrolledStudents.forEach(function(student) {
      newMap[student.id] = 'present';
    });
    setAttendanceMap(newMap);
  };
  const saveAttendance = async function() {
    if(!attendanceTarget) return;
    try {
      const records = enrolledStudents.map(function(student) {
        return {student_id: student.id, status: attendanceMap[student.id] || 'present'};
      });
      await api(`/schedules/${attendanceTarget.id}/attendance`, {method: 'POST', body: JSON.stringify({records: records})});
      showToast('출석 저장 완료', 'success');
      setAttendanceTarget(null);
      setEnrolledStudents([]);
      setAttendanceMap({});
      load();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const openAttendance = async function(schedule) {
    setAttendanceTarget(schedule);
    await loadEnrolledStudents(schedule.id);
  };
  const canManage = ['admin','ojt_admin'].includes(user.role);
  const tc = {lecture:'#2563eb',practical:'#059669',assessment:'#d97706',ojt:'#7c3aed',meeting:'#6b7280',other:'#9ca3af'};
  const [showOptimize, setShowOptimize] = useState(false);
  const [optimizeForm, setOptimizeForm] = useState({});
  const [suggestions, setSuggestions] = useState([]);
  const [optimizing, setOptimizing] = useState(false);
  const [allCourses, setAllCourses] = useState([]);

  useEffect(function(){
    api('/courses').then(function(d){setAllCourses(d.data);}).catch(function(){});
  }, []);

  const handleOptimize = function() {
    if(!optimizeForm.course_id || !optimizeForm.date_from || !optimizeForm.date_to) {
      showToast('과정, 기간 선택 필수', 'error');
      return;
    }
    setOptimizing(true);
    var payload = {
      course_id: optimizeForm.course_id,
      date_from: optimizeForm.date_from,
      date_to: optimizeForm.date_to,
      preferred_rooms: optimizeForm.preferred_rooms ? optimizeForm.preferred_rooms.split(',').map(function(r){return r.trim();}) : []
    };
    api('/api/schedules/optimize', {method:'POST', body:JSON.stringify(payload)})
      .then(function(d){
        setSuggestions(d.data || []);
        setOptimizing(false);
      })
      .catch(function(e){
        showToast(e.message,'error');
        setOptimizing(false);
      });
  };

  const handleBatchRegister = function() {
    if(!suggestions || suggestions.length === 0) return;
    var promises = suggestions.map(function(s){
      return api('/api/schedules', {
        method:'POST',
        body:JSON.stringify({
          schedule_date: s.date,
          start_time: s.time_start,
          end_time: s.time_end,
          title: s.module_name,
          schedule_type: 'lecture',
          instructor_id: s.instructor_id,
          course_id: optimizeForm.course_id,
          room: s.room
        })
      });
    });
    Promise.all(promises)
      .then(function(){
        showToast('일정 일괄 등록 완료','success');
        setSuggestions([]);
        setShowOptimize(false);
        load();
      })
      .catch(function(e){
        showToast(e.message,'error');

  const downloadSchedules = function() {

        {user && (user.role==='instructor'||user.role==='admin') && <button className={'btn '+(viewMode==='my'?'btn-primary':'btn-outline')+' btn-sm'} style={{borderRadius:20}} onClick={function(){setViewMode('my');}}>나의 강의</button>}
        <button className={'btn '+(viewMode==='teaching'?'btn-primary':'btn-outline')+' btn-sm'} style={{borderRadius:20}} onClick={function(){setViewMode('teaching');}}>교수 스케줄</button>
        <button className={'btn '+(viewMode==='weekly'?'btn-primary':'btn-outline')+' btn-sm'} style={{borderRadius:20}} onClick={function(){setViewMode('weekly');}}>주간 근무표</button>
        <div style={{flex:1}}></div>
        {canManage && <button className="btn btn-outline btn-sm" onClick={function(){setShowOptimize(true);}} style={{marginRight:8}}>🤖 자동 최적화</button>}
        {canManage && <button className="btn btn-outline btn-sm" onClick={downloadSchedules}>📥 엑셀</button>}
      </div>
      <div className="filters"><label style={{fontSize:14}}>기간:</label>
        <input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}}/><span>~</span>
        <input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}}/></div>
      {viewMode==='teaching' && (function(){
        var instructorMap = getInstructorSchedules();
        var instructorNames = Object.keys(instructorMap).sort();
        return React.createElement('div',{className:'card',style:{marginBottom:16}},
          React.createElement('div',{className:'card-header'},React.createElement('h3',{},'📋 교수 스케줄')),
          React.createElement('div',{className:'card-body'},
            instructorNames.length === 0 && React.createElement('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--gray-400)'}},'내용이 없습니다'),
            instructorNames.map(function(instructorName){
              var instructorScheds = instructorMap[instructorName];
              return React.createElement('div',{key:instructorName,style:{marginBottom:24,paddingBottom:16,borderBottom:'1px solid var(--gray-200)'}},
                React.createElement('div',{style:{fontSize:16,fontWeight:700,marginBottom:12,color:'var(--primary)'}},instructorName),
                React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12}},
                  instructorScheds.map(function(s){
                    return React.createElement('div',{key:s.id,style:{padding:12,border:'1px solid var(--gray-200)',borderRadius:8,background:'#fafafa'}},
                      React.createElement('div',{style:{fontWeight:600,fontSize:13,marginBottom:6,display:'flex',alignItems:'center',gap:6}},
                        React.createElement('span',{style:{background:tc[s.schedule_type],color:'white',padding:'2px 8px',borderRadius:4,fontSize:11}},s.schedule_type),
                        React.createElement('span',{},s.title)
                      ),
                      React.createElement('div',{style:{fontSize:12,color:'var(--gray-600)',marginBottom:4}},
                        React.createElement('div',{},'날짜: ',s.schedule_date)
                      ),
                      React.createElement('div',{style:{fontSize:12,color:'var(--gray-600)',marginBottom:4}},
                        React.createElement('div',{},'시간: ',s.start_time,' - ',s.end_time)
                      ),
                      React.createElement('div',{style:{fontSize:12,color:'var(--gray-600)',marginBottom:4}},
                        React.createElement('div',{},'과정: ',s.course_name || '-')
                      ),
                      React.createElement('div',{style:{fontSize:12,color:'var(--gray-600)',marginBottom:8}},
                        React.createElement('div',{},'장소: ',s.room || '-')
                      ),
                      canManage && React.createElement('div',{style:{display:'flex',gap:6}},
                        React.createElement('button',{className:'btn btn-primary btn-sm',style:{padding:'4px 10px',fontSize:11,flex:1},onClick:function(){openAttendance(s);}},'빠른 출석'),
                        React.createElement('button',{className:'btn btn-danger btn-sm',style:{padding:'4px 10px',fontSize:11,flex:1},onClick:function(){setDeleteTarget(s);}},'삭제')
                      )
                    );
                  })
                )
              );
            })
          )
        );
      })()}
      {viewMode==='weekly' && (function(){
        var days=['\uC77C','\uC6D4','\uD654','\uC218','\uBAA9','\uAE08','\uD1A0'];
        var today=new Date();var weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay()+1);
        var weekDays=[];for(var di=0;di<7;di++){var d=new Date(weekStart);d.setDate(weekStart.getDate()+di);weekDays.push(d);}
        return React.createElement('div',{className:'card',style:{marginBottom:16}},
          React.createElement('div',{className:'card-header'},React.createElement('h3',{},'\uD83D\uDCC5 \uC8FC\uAC04 \uADFC\uBB34\uD45C (',weekDays[0].toISOString().slice(0,10),' ~ ',weekDays[6].toISOString().slice(0,10),')')),
          React.createElement('div',{className:'card-body',style:{overflowX:'auto'}},
            React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,minWidth:700}},

                return React.createElement('div',{key:idx,style:{border:isToday?'2px solid var(--primary)':'1px solid var(--gray-200)',borderRadius:10,padding:10,minHeight:120,background:isToday?'var(--primary-light)':'white'}},

                    React.createElement('div',{style:{fontWeight:600}},s.start_time,'-',s.end_time),
                    React.createElement('div',{style:{color:'var(--gray-600)'}},s.title),
                    s.instructor_name && React.createElement('div',{style:{color:'var(--gray-400)',fontSize:10}},s.instructor_name)
                  );})
                );

            )
          )

      })()}
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th>날짜</th><th>시간</th><th>제목</th><th>유형</th><th>과정</th><th>교관</th><th>장소</th>{canManage&&<th style={{width:140}}></th>}</tr></thead>
        <tbody>{filteredSchedules.map(function(s){return (
          <tr key={s.id}><td><strong>{s.schedule_date}</strong></td><td>{s.start_time}-{s.end_time}</td><td>{s.title}</td>

      {showOptimize&&<Modal title="🤖 일정 자동 최적화" onClose={function(){setShowOptimize(false);setSuggestions([]);}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowOptimize(false);setSuggestions([]);}}>{suggestions.length>0?'닫기':'취소'}</button>
          {suggestions.length===0 && <button className="btn btn-primary" onClick={handleOptimize} disabled={optimizing}>{optimizing?'최적화 중...':'최적화 실행'}</button>}
          {suggestions.length>0 && <button className="btn btn-success" onClick={handleBatchRegister}>일괄 등록</button>}
        </>}>
        {suggestions.length===0 ? (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div className="form-group">
              <label className="form-required">과정</label>
              <select value={optimizeForm.course_id||''} onChange={function(e){setOptimizeForm({...optimizeForm,course_id:e.target.value});}}>
                <option value="">선택</option>
                {allCourses.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
            </div>
            <div className="form-group">
              <label className="form-required">선호 강의실 (쉼표로 구분)</label>
              <input type="text" placeholder="예: A101, A102" value={optimizeForm.preferred_rooms||''} onChange={function(e){setOptimizeForm({...optimizeForm,preferred_rooms:e.target.value});}} />
            </div>
            <div className="form-group">
              <label className="form-required">시작일</label>
              <input type="date" value={optimizeForm.date_from||''} onChange={function(e){setOptimizeForm({...optimizeForm,date_from:e.target.value});}} />
            </div>
            <div className="form-group">
              <label className="form-required">종료일</label>
              <input type="date" value={optimizeForm.date_to||''} onChange={function(e){setOptimizeForm({...optimizeForm,date_to:e.target.value});}} />
            </div>
          </div>
        ) : (
          <div style={{marginTop:16}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:12,color:'var(--success)'}}>✅ {suggestions.length}개 최적화 안건</div>
            <div className="table-wrapper" style={{maxHeight:'300px',overflowY:'auto'}}>
              <table>
                <thead>
                  <tr><th>날짜</th><th>시간</th><th>모듈</th><th>교관</th><th>강의실</th></tr>
                </thead>
                <tbody>
                  {suggestions.map(function(s,idx){return (
                    <tr key={idx}>
                      <td>{s.date}</td>
                      <td>{s.time_start}-{s.time_end}</td>
                      <td>{s.module_name}</td>
                      <td>{s.instructor_name||'-'}</td>
                      <td>{s.room}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </Modal>}
    </div>
  );
}

    ]}
  ]);
  const [templateTab, setTemplateTab] = useState('list');
  const { showToast, user } = useApp();
  const isTrainee = user && user.role === 'trainee';
  const isInstructorOrAdmin = user && (user.role === 'admin' || user.role === 'instructor' || user.role === 'ojt_admin');
  const load = function() {
    let q='/evaluations?';
    if(statusFilter)q+=`&status=${statusFilter}`;
    api(q).then(function(d){
      setEvals(d.data);
    }).catch(function(e){showToast(e.message,'error');});
  };
  useEffect(function(){
    api('/courses').then(function(d){setCourses(d.data);}).catch(function(){});
    load();
  },[statusFilter]);
  var getDateRange = function() {
    var today = new Date();
    var start = new Date(today);
    var end = new Date(today);
    if(periodFilter === 'this_week') {
      start.setDate(today.getDate() - today.getDay() + 1);
      end.setDate(today.getDate() + (7 - today.getDay()));
    } else if(periodFilter === 'this_month') {
      start.setDate(1);
      end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    } else if(periodFilter === 'last_week') {
      start.setDate(today.getDate() - today.getDay() - 6);
      end.setDate(today.getDate() - today.getDay());
    } else if(periodFilter === 'last_month') {
      start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0);
    }
    return {start: start.toISOString().slice(0, 10), end: end.toISOString().slice(0, 10)};
  };

  var dateRange = periodFilter === 'custom' ? {start: periodDateFrom, end: periodDateTo} : (periodFilter === 'all' ? null : getDateRange());

  const filteredEvals = evals.filter(function(ev) {
    if(courseFilter && ev.course_name !== courseFilter) return false;
    if(studentSearch && ev.trainee_name && !ev.trainee_name.toLowerCase().includes(studentSearch.toLowerCase())) return false;
    if(dateRange) {
      var evalDate = (ev.created_at || ev.due_date || '').slice(0, 10);
      if(evalDate < dateRange.start || evalDate > dateRange.end) return false;
    }
    return true;
  });

  var calcStats = function() {
    var total = filteredEvals.length;
    var scores = filteredEvals.filter(function(e){return e.score}).map(function(e){return e.score;});
    var avg = scores.length > 0 ? (scores.reduce(function(a,b){return a+b;}, 0) / scores.length).toFixed(1) : 0;
    var pending = filteredEvals.filter(function(e){return e.status==='pending';}).length;
    var graded = filteredEvals.filter(function(e){return e.status==='graded';}).length;
    return {total, avg, pending, graded};
  };
  var stats = calcStats();
  const handleSubmitEval = function(ev) {
    setExamModal(ev);
    setExamAnswers({});
  };
  const confirmSubmitEval = function() {
    if(!examModal) return;
    api('/evaluations/' + examModal.id + '/submit', {method:'POST', body:JSON.stringify({answers: examAnswers, submission_text: examAnswers.text || ''})}).then(function(){
      showToast('\uD3C9\uAC00 \uC81C\uCD9C \uC644\uB8CC','success'); setExamModal(null); setExamAnswers({}); load();
    }).catch(function(e){showToast(e.message,'error');});
  };
  const handleGradeEval = function(ev) {
    setGradeModal(ev);
    setGradeForm({score: ev.score || '', max_score: ev.max_score || 100, grade: ev.grade || '', feedback: ev.feedback || ''});
  };
  const confirmGrade = function() {
    if(!gradeModal) return;
    api('/evaluations/' + gradeModal.id, {method:'PUT', body:JSON.stringify({score: parseInt(gradeForm.score), max_score: parseInt(gradeForm.max_score), grade: gradeForm.grade, feedback: gradeForm.feedback, status:'graded'})}).then(function(){
      showToast('\uCC44\uC810 \uC644\uB8CC','success'); setGradeModal(null); load();
    }).catch(function(e){showToast(e.message,'error');});
  };
  const downloadEvaluations = function() {
    const wsData = filteredEvals.map(function(ev) {
      return {제목: ev.title, 유형: ev.eval_type, 과정: ev.course_name || '-', 훈련생: ev.trainee_name || '-', 점수: ev.score !== null ? ev.score + '/' + ev.max_score : '-', 등급: ev.grade || '-', 상태: ev.status};
    });
    const ws = XLSX.utils.json_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '평가');
    XLSX.writeFile(wb, '평가_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };
  return (
    <div className="page-content">
      <div className="filters">
        <input placeholder="훈련생 검색..." value={studentSearch} onChange={function(e){setStudentSearch(e.target.value);}} />
        <select value={courseFilter} onChange={function(e){setCourseFilter(e.target.value);}}>
          <option value="">전체 과정</option>
          {courses.map(function(c){return <option key={c.id} value={c.name}>{c.name}</option>;})}
        </select>
        <select value={statusFilter} onChange={function(e){setStatusFilter(e.target.value);}}>
          <option value="">전체</option><option value="pending">Pending</option><option value="submitted">Submitted</option>
          <option value="graded">Graded</option></select>
        <select value={periodFilter} onChange={function(e){setPeriodFilter(e.target.value);setPeriodDateFrom('');setPeriodDateTo('');}}>
          <option value="all">전체</option><option value="this_week">이번 주</option><option value="this_month">이번 달</option>
          <option value="last_week">지난 주</option><option value="last_month">지난 달</option><option value="custom">기간 지정</option></select>
        {periodFilter==='custom' && <>
          <input type="date" value={periodDateFrom} onChange={function(e){setPeriodDateFrom(e.target.value);}} />
          <input type="date" value={periodDateTo} onChange={function(e){setPeriodDateTo(e.target.value);}} />
        </>}
        <button className="btn btn-primary btn-sm" onClick={downloadEvaluations}>📥 엑셀 다운로드</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        <div style={{background:'white',padding:16,borderRadius:10,border:'1px solid var(--gray-200)'}}>
          <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:4}}>전체 평가</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--primary)'}}>{stats.total}</div>
        </div>
        <div style={{background:'white',padding:16,borderRadius:10,border:'1px solid var(--gray-200)'}}>
          <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:4}}>평균 점수</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--success)'}}>{stats.avg}</div>
        </div>
        <div style={{background:'white',padding:16,borderRadius:10,border:'1px solid var(--gray-200)'}}>
          <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:4}}>대기중</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--warning)'}}>{stats.pending}</div>
        </div>
        <div style={{background:'white',padding:16,borderRadius:10,border:'1px solid var(--gray-200)'}}>
          <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:4}}>평가 완료</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--info)'}}>{stats.graded}</div>
        </div>
      </div>
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th>제목</th><th>유형</th><th>과정</th><th>훈련생</th><th>점수</th><th>등급</th><th>상태</th><th>액션</th></tr></thead>
        <tbody>{filteredEvals.map(function(ev){
          return (
            <tr key={ev.id}><td><strong>{ev.title}</strong></td><td><span className="badge badge-gray">{ev.eval_type}</span></td>
              <td>{ev.course_name||'-'}</td><td>{ev.trainee_name||'-'}</td>
              <td>{ev.score!==null?`${ev.score}/${ev.max_score}`:'-'}</td><td>{ev.grade||'-'}</td><td><StatusBadge status={ev.status}/></td>
              <td style={{whiteSpace:'nowrap'}}>
                {isTrainee && ev.status==='pending' && <button className="btn btn-primary btn-sm" style={{padding:'4px 10px',fontSize:11}} onClick={function(){handleSubmitEval(ev);}}>응시</button>}
                {isInstructorOrAdmin && ev.status==='submitted' && <button className="btn btn-success btn-sm" style={{padding:'4px 10px',fontSize:11}} onClick={function(){handleGradeEval(ev);}}>채점</button>}
                {isInstructorOrAdmin && ev.status==='graded' && <button className="btn btn-outline btn-sm" style={{padding:'4px 10px',fontSize:11}} onClick={function(){handleGradeEval(ev);}}>수정</button>}
              </td></tr>
          );
        })}{filteredEvals.length===0&&<tr><td colSpan="8" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>{evals.length===0?'평가 내역 없음':'검색 결과 없음'}</td></tr>}</tbody>
      </table></div></div></div>
      {examModal && <Modal title={'평가 응시: ' + examModal.title} onClose={function(){setExamModal(null);}}
        footer={<><button className="btn btn-outline" onClick={function(){setExamModal(null);}}>취소</button>
          <button className="btn btn-primary" onClick={confirmSubmitEval}>제출</button></>}>
        <div style={{marginBottom:16,padding:12,background:'var(--primary-light)',borderRadius:10}}>
          <div style={{fontSize:14,fontWeight:600}}>{examModal.title}</div>
          <div style={{fontSize:12,color:'var(--gray-600)',marginTop:4}}>유형: {examModal.eval_type} | 과정: {examModal.course_name || '-'}</div>
        </div>
        <div className="form-group"><label>주관식 답변</label>
          <textarea rows={6} placeholder="평가에 대한 답변을 작성하세요..." value={examAnswers.text || ''} onChange={function(e){setExamAnswers({...examAnswers, text: e.target.value});}}
            style={{width:'100%',padding:12,border:'1.5px solid var(--gray-200)',borderRadius:10,fontSize:14,lineHeight:1.6,resize:'vertical'}}/>
        </div>
        <div className="form-group"><label>파일 첨부 (선택)</label>
          <div style={{border:'2px dashed var(--gray-200)',borderRadius:10,padding:16,textAlign:'center',cursor:'pointer',background:'var(--gray-50)'}}>
            <input type="file" onChange={function(e){var f=e.target.files&&e.target.files[0];if(f)setExamAnswers({...examAnswers,file_name:f.name});}} style={{fontSize:12}}/>
            <div style={{fontSize:12,color:'var(--gray-400)',marginTop:4}}>{examAnswers.file_name || 'PDF, DOC, XLS 형식'}</div>
          </div>
        </div>
      </Modal>}
      {gradeModal && <Modal title={'채점: ' + gradeModal.title} onClose={function(){setGradeModal(null);}}
        footer={<><button className="btn btn-outline" onClick={function(){setGradeModal(null);}}>취소</button>
          <button className="btn btn-success" onClick={confirmGrade}>채점 완료</button></>}>
        <div style={{marginBottom:16,padding:12,background:'var(--gray-50)',borderRadius:10}}>
          <div style={{fontWeight:600}}>{gradeModal.trainee_name || '-'}</div>
          <div style={{fontSize:12,color:'var(--gray-600)',marginTop:4}}>{gradeModal.title} | {gradeModal.eval_type}</div>
        </div>
        <div className="grid-2">
          <div className="form-group"><label className="form-required">점수</label>
            <input type="number" min="0" max="100" value={gradeForm.score} onChange={function(e){setGradeForm({...gradeForm, score: e.target.value});}} placeholder="0-100"/>
          </div>
          <div className="form-group"><label>만점</label>
            <input type="number" value={gradeForm.max_score} onChange={function(e){setGradeForm({...gradeForm, max_score: e.target.value});}}/>
          </div>
        </div>
        <div className="form-group"><label>등급</label>
          <select value={gradeForm.grade} onChange={function(e){setGradeForm({...gradeForm, grade: e.target.value});}}>
            <option value="">선택</option><option value="A+">A+</option><option value="A">A</option><option value="B+">B+</option>
            <option value="B">B</option><option value="C+">C+</option><option value="C">C</option><option value="D">D</option><option value="F">F</option>
          </select>
        </div>
        <div className="form-group"><label>피드백</label>
          <textarea rows={4} value={gradeForm.feedback} onChange={function(e){setGradeForm({...gradeForm, feedback: e.target.value});}}
            placeholder="학습자에 대한 피드백을 입력하세요..." style={{width:'100%',padding:12,border:'1.5px solid var(--gray-200)',borderRadius:10,fontSize:14,resize:'vertical'}}/>
        </div>
      </Modal>}
      {isInstructorOrAdmin && (
        <div className="card" style={{marginTop: 20}}>
          <div className="card-header">
            <h3>평가 템플릿 관리</h3>
            <button className="btn btn-primary btn-sm" onClick={function(){setShowTemplateModal(true);}}>+ 새 템플릿</button>
          </div>
          <div className="card-body">
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap: 16}}>
              {evalTemplates.map(function(tmpl) {
                return (
                  <div key={tmpl.id} style={{border:'1px solid var(--gray-200)', borderRadius:12, padding:16, background:'var(--gray-50)'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
                      <div>
                        <div style={{fontWeight:600, fontSize:15}}>{tmpl.name}</div>
                        <span className={`badge badge-${tmpl.type === 'weekly' ? 'blue' : 'green'}`}>{tmpl.type === 'weekly' ? '주간' : '월간'}</span>
                      </div>
                    </div>
                    <div style={{fontSize:13, color:'var(--gray-600)'}}>
                      {tmpl.items.map(function(item, idx) {
                        return (
                          <div key={idx} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom: idx < tmpl.items.length - 1 ? '1px solid var(--gray-200)' : 'none'}}>
                            <span>{item.category}</span>
                            <span style={{fontWeight:600, color:'var(--primary)'}}>{item.weight}%</span>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{marginTop:12, display:'flex', gap:8}}>
                      <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={function(){showToast('템플릿 적용: ' + tmpl.name, 'success');}}>적용</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━ OJT ━━━━━━━━━━━━
function OJTPage() {
  var [tab, setTab] = useState('programs');
  var [programs, setPrograms] = useState([]);
  var [selected, setSelected] = useState(null);
  var [detail, setDetail] = useState(null);
  var [ojtEvaluations, setOjtEvaluations] = useState([]);
  var [venues, setVenues] = useState([]);
  var [announcements, setAnnouncements] = useState([]);
  var [surveyTemplates, setSurveyTemplates] = useState([]);
  var [roadmaps, setRoadmaps] = useState([]);
  var [trainingSpecs, setTrainingSpecs] = useState([]);
  var [evalSpecs, setEvalSpecs] = useState([]);
  var [ojtSchedules, setOjtSchedules] = useState([]);
  var [trainingResults, setTrainingResults] = useState([]);
  var [preAssignments, setPreAssignments] = useState([]);
  var [leaders, setLeaders] = useState([]);
  var [programFilter, setProgramFilter] = useState('all');
  var [reportSearch, setReportSearch] = useState('');
  var [loading, setLoading] = useState(false);
  var [showForm, setShowForm] = useState(false);
  var [showModal, setShowModal] = useState(null);
  var [formData, setFormData] = useState({});
  var [selectedProgramMgmt, setSelectedProgramMgmt] = useState(null);
  var [traineesMgmt, setTraineesMgmt] = useState([]);
  var [expandedTrainee, setExpandedTrainee] = useState(null);
  var [editingTrainee, setEditingTrainee] = useState(null);
  var [traineeFormData, setTraineeFormData] = useState({});
  var [activeSurvey, setActiveSurvey] = useState(null);
  var [surveyItems, setSurveyItems] = useState([]);
  var [surveyResponses, setSurveyResponses] = useState({});
  var [submittingSurvey, setSubmittingSurvey] = useState(false);
  var [taskCompleteModal, setTaskCompleteModal] = useState(null);
  var [taskCompleteForm, setTaskCompleteForm] = useState({completion_status:'completed',notes:'',score:''});
  var [evalTemplates, setEvalTemplates] = useState([]);
  var [evalTemplateModal, setEvalTemplateModal] = useState(null);
  var [evalTemplateForm, setEvalTemplateForm] = useState({name:'',description:'',criteria:'',max_score:100,template_data:''});
  var ctx = useApp(); var showToast = ctx.showToast; var user = ctx.user;
  var isOjtTrainee = user && user.role === 'trainee';
  var isOjtAdmin = user && (user.role === 'admin' || user.role === 'ojt_admin' || user.role === 'instructor');
  var canEditTrainees = user && (user.role === 'admin' || user.role === 'ojt_admin');

  var loadAll = function() {
    setLoading(true);
    api('/ojt/programs').then(function(d){setPrograms(d.data);setLoading(false);}).catch(function(e){showToast(e.message,'error');setLoading(false);});
  };

  var loadSurveyItems = function(templateId) {
    api('/ojt/survey-templates/' + templateId).then(function(d) {
      setActiveSurvey(d.data);
      setSurveyItems(d.data.items || []);
      setSurveyResponses({});
    }).catch(function(e) { showToast(e.message, 'error'); });
  };

  var submitSurveyResponses = function() {
    if(!activeSurvey) return;
    setSubmittingSurvey(true);
    var responses = Object.keys(surveyResponses).map(function(itemId) {
      return { item_id: parseInt(itemId), response: surveyResponses[itemId].response || '', rating: surveyResponses[itemId].rating || 0 };
    });
    var promises = responses.map(function(r) {
      var body = Object.assign({}, r, { template_id: activeSurvey.id });
      return api('/ojt/survey-responses', { method: 'POST', body: JSON.stringify(body) });
    });
    Promise.all(promises).then(function() {
      showToast('\uC124\uBB38 \uC81C\uCD9C \uC644\ub8cc', 'success');
      setActiveSurvey(null);
      setSurveyItems([]);
      setSurveyResponses({});
      setSubmittingSurvey(false);
      api('/ojt/survey-templates').then(function(d){setSurveyTemplates(d.data);});
    }).catch(function(e) { showToast(e.message, 'error'); setSubmittingSurvey(false); });
  };

  var handleTaskComplete = function(result) {
    setTaskCompleteModal(result);
    setTaskCompleteForm({completion_status: result.completion_status || 'in_progress', notes: result.notes || '', score: result.score || ''});
  };

  var confirmTaskComplete = function() {
    if(!taskCompleteModal) return;
    api('/ojt/training-results/' + taskCompleteModal.id, {method:'PUT', body:JSON.stringify({
      completion_status: taskCompleteForm.completion_status,
      notes: taskCompleteForm.notes,
      score: taskCompleteForm.score ? parseInt(taskCompleteForm.score) : null
    })}).then(function(){
      showToast('\uD6C8\uB828 \uACB0\uACFC \uC5C5\uB370\uC774\uD2B8 \uC644\uB8CC','success');
      setTaskCompleteModal(null);
      api('/ojt/training-results').then(function(d){setTrainingResults(d.data);});
    }).catch(function(e){showToast(e.message,'error');});
  };

  useEffect(function(){ loadAll(); },[]);
  useEffect(function(){
    setLoading(true);
    if(tab === 'evaluations') { Promise.all([api('/ojt/evaluations'),api('/ojt/eval-templates')]).then(function(res){setOjtEvaluations(res[0].data);setEvalTemplates(res[1].data);setLoading(false);}).catch(function(){setLoading(false);}); }
    else if(tab === 'venues') api('/ojt/venues').then(function(d){setVenues(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'announcements') api('/ojt/announcements').then(function(d){setAnnouncements(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'surveys') api('/ojt/survey-templates').then(function(d){setSurveyTemplates(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'roadmap') api('/career-roadmap').then(function(d){setRoadmaps(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'specs') { Promise.all([api('/ojt/training-specs'),api('/ojt/eval-specs')]).then(function(res){setTrainingSpecs(res[0].data);setEvalSpecs(res[1].data);setLoading(false);}).catch(function(){setLoading(false);}); }
    else if(tab === 'schedules') api('/ojt/schedules').then(function(d){setOjtSchedules(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'results') api('/ojt/training-results').then(function(d){setTrainingResults(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'management') { api('/ojt/training-results').then(function(d){setTrainingResults(d.data);setLoading(false);}).catch(function(){setLoading(false);}); }
    else if(tab === 'preassign') api('/ojt/pre-assignments').then(function(d){setPreAssignments(d.data);setLoading(false);}).catch(function(){setLoading(false);});
    else if(tab === 'leaders') { var promises = programs.map(function(p){return api('/ojt/programs/'+p.id+'/leaders').then(function(d){return {program_id:p.id,program_name:p.name,leaders:d.data};}).catch(function(){return {program_id:p.id,program_name:p.name,leaders:[]};});}); Promise.all(promises).then(function(res){setLeaders(res);setLoading(false);}).catch(function(){setLoading(false);}); }
    else setLoading(false);
  },[tab]);

  var loadDetail = function(id) {
    api('/ojt/programs/' + id).then(function(d){setDetail(d.data);setSelected(id);}).catch(function(e){showToast(e.message,'error');});
  };
  var downloadOJTEvals = function() {
    var wsData = ojtEvaluations.map(function(ev) {
      return {'\uD6C8\uB828\uC0DD': ev.trainee_name||'-', '\uACFC\uC81C': ev.task_name||'-', '\uC810\uC218': ev.score||'-', '\uC0C1\uD0DC': ev.status||'-', '\uD3C9\uAC00\uC790': ev.evaluator_name||'-', '\uB0A0\uC9DC': ev.eval_date||'-', '\uD53C\uB4DC\uBC31': ev.feedback||'-'};
    });
    var ws = XLSX.utils.json_to_sheet(wsData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'OJT\uD3C9\uAC00');
