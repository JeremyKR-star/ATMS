        <tbody>{filteredCourses.map(function(c){
          return <tr key={c.id}><td><strong>{c.code}</strong></td><td>{c.name}</td>
            <td><span className={'badge badge-' + (c.type==='TT'?'blue':'yellow')}>{c.type}</span></td>
            <td>{c.aircraft_type||'-'}</td><td>{c.duration_weeks}주</td>
            <td><StatusBadge status={c.status}/></td><td>{c.start_date||'-'}</td></tr>;
        })}{filteredCourses.length===0&&<tr><td colSpan="7" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>{searchText?'검색 결과 없음':'과정이 없습니다'}</td></tr>}</tbody>
      </table></div></div></div>
      {showModal&&<Modal title="신규 과정 등록" onClose={function(){setShowModal(false);setFormErrors({});}}
        footer={React.createElement(React.Fragment, {}, React.createElement('button', {className:'btn btn-outline',onClick:function(){setShowModal(false);setFormErrors({});}}, '취소'), React.createElement('button', {className:'btn btn-primary',onClick:handleCreate}, '등록'))}>
        <div className={'form-group' + (formErrors.code?' form-error':'')}><label className="form-required">과정 코드</label><input value={form.code} onChange={function(e){setForm({...form,code:e.target.value});}} placeholder="TT-B737-2026-02"/>{formErrors.code&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className={'form-group' + (formErrors.name?' form-error':'')}><label className="form-required">과정명</label><input value={form.name} onChange={function(e){setForm({...form,name:e.target.value});}}/>{formErrors.name&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className="form-group"><label>유형</label><select value={form.type} onChange={function(e){setForm({...form,type:e.target.value});}}>
          <option value="TT">TT</option><option value="OJT">OJT</option></select></div>
        <div className="form-group"><label>기종</label><input value={form.aircraft_type} onChange={function(e){setForm({...form,aircraft_type:e.target.value});}}/></div>
        <div className="form-group"><label>기간(주)</label><input type="number" value={form.duration_weeks} onChange={function(e){setForm({...form,duration_weeks:e.target.value});}}/></div>
        <div className="form-group"><label>최대인원</label><input type="number" value={form.max_trainees} onChange={function(e){setForm({...form,max_trainees:e.target.value});}}/></div>
        <div className="form-group"><label>설명</label><textarea rows="3" value={form.description} onChange={function(e){setForm({...form,description:e.target.value});}}/></div>
      </Modal>}
    </div>
  );
}

// ━━━━━━━━━━━━ USERS ━━━━━━━━━━━━
function UsersPage() {
  const [data, setData] = useState({users:[],total:0});
  const [roleFilter, setRoleFilter] = useState('');
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [form, setForm] = useState({employee_id:'',name:'',email:'',role:'trainee',department:'',password:''});
  const [formErrors, setFormErrors] = useState({});
  const [importPreview, setImportPreview] = useState([]);
  const [importFile, setImportFile] = useState(null);
  const importFileRef = useRef(null);
  const { user, showToast } = useApp();
  const load = function() { let q='/users?per_page=100'; if(roleFilter) q+=`&role=${roleFilter}`; if(search) q+=`&search=${search}`;
    api(q).then(function(d){setData(d.data);}).catch(function(e){showToast(e.message,'error');}); };
  useEffect(function(){load();},[roleFilter,search]);
  const handleCreate = async function() {
    var errors = {};
    if(!form.employee_id) errors.employee_id = true;
    if(!form.name) errors.name = true;
    if(!form.password) errors.password = true;
    if(Object.keys(errors).length > 0) {
      setFormErrors(errors);
      return;
    }
    try { await api('/auth/register',{method:'POST',body:JSON.stringify(form)}); showToast('사용자 등록 완료','success'); setShowModal(false); setForm({employee_id:'',name:'',email:'',role:'trainee',department:'',password:''}); setFormErrors({}); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleDelete = async function() {
    if(!deleteTarget) return;
    try { await api(`/users/${deleteTarget.id}`,{method:'DELETE'}); showToast(`${deleteTarget.name} 비활성화 완료`,'success'); setDeleteTarget(null); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleBulkImportFile = function(e) {
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var data = new Uint8Array(evt.target.result);
        var workbook = XLSX.read(data, {type: 'array'});
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet);
        var preview = rows.slice(0, 5);
        setImportPreview(preview);
        setImportFile(rows);
      } catch(err) {
        showToast('엑셀 파일 읽기 실패: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  };
  const confirmBulkImport = async function() {
    if(!importFile || importFile.length === 0) {
      showToast('가져올 데이터가 없습니다', 'error');
      return;
    }
    try {
      var imported = 0;
      var failed = 0;
      for(var i = 0; i < importFile.length; i++) {
        var row = importFile[i];
        try {
          await api('/auth/register', {method: 'POST', body: JSON.stringify({
            employee_id: row.employee_id || '',
            name: row.name || '',
            email: row.email || '',
            role: row.role || 'trainee',
            department: row.department || '',
            password: row.password || ''
          })});
          imported++;
        } catch(err) {
          failed++;
        }
      }
      showToast(`가져오기 완료: ${imported}명 성공, ${failed}명 실패`, 'success');
      setImportFile(null);
      setImportPreview([]);
      setShowBulkImport(false);
      if(importFileRef.current) importFileRef.current.value = '';
      load();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const canManage = ['admin','ojt_admin'].includes(user.role);
  return (
    <div className="page-content">
      <div className="filters">
        <input placeholder="이름/사번 검색..." value={search} onChange={function(e){setSearch(e.target.value);}}/>

          <option value="">전체 역할</option><option value="admin">Admin</option><option value="instructor">Instructor</option>
          <option value="trainee">Trainee</option><option value="ojt_admin">OJT Admin</option><option value="manager">Manager</option>
        </select>
        {canManage&&<button className="btn btn-primary btn-sm" onClick={function(){setShowModal(true);}}>+ 사용자 등록</button>}
        {canManage&&<button className="btn btn-primary btn-sm" onClick={function(){setShowBulkImport(true);}}>📤 일괄등록</button>}
        <span style={{fontSize:13,color:'var(--gray-500)'}}>총 {data.total}명</span>
      </div>
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th style={{width:50}}></th><th>사번</th><th>이름</th><th>이메일</th><th>역할</th><th>부서</th><th>상태</th>{canManage&&<th style={{width:70}}></th>}</tr></thead>
        <tbody>{data.users.map(u=>(
          <tr key={u.id}>
            <td><Avatar src={u.photo_url} name={u.name} size="sm"/></td>
            <td>{u.employee_id}</td><td><strong>{u.name}</strong></td><td>{u.email||'-'}</td>
            <td><span className="badge badge-blue">{u.role}</span></td><td>{u.department||'-'}</td><td><StatusBadge status={u.status}/></td>
            {canManage&&<td><button className="btn btn-danger btn-sm" style={{padding:'4px 10px',fontSize:11}}
              onClick={()=>setDeleteTarget(u)}>삭제</button></td>}</tr>
        ))}</tbody>
      </table></div></div></div>
      {deleteTarget&&<Modal title="사용자 삭제 확인" onClose={function(){setDeleteTarget(null);}}
        footer={<><button className="btn btn-outline" onClick={function(){setDeleteTarget(null);}}>취소</button>
          <button className="btn btn-danger" onClick={handleDelete}>비활성화</button></>}>
        <div style={{textAlign:'center',padding:'20px 0'}}>
          <Avatar src={deleteTarget.photo_url} name={deleteTarget.name} size="lg" />
          <div style={{marginTop:16,fontSize:18,fontWeight:700}}>{deleteTarget.name}</div>
          <div style={{color:'var(--gray-500)',marginTop:4}}>{deleteTarget.employee_id} &middot; {deleteTarget.role}</div>
          <div style={{marginTop:20,padding:16,background:'var(--danger-light)',borderRadius:10,fontSize:14,color:'#991b1b'}}>
            이 사용자를 비활성화하시겠습니까?<br/><span style={{fontSize:12}}>(계정이 비활성 상태로 전환되며, 로그인이 불가합니다)</span>
          </div>
        </div>
      </Modal>}
      {showModal&&<Modal title="사용자 등록" onClose={function(){setShowModal(false);setFormErrors({});}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowModal(false);setFormErrors({});}}>취소</button><button className="btn btn-primary" onClick={handleCreate}>등록</button></>}>
        <div className={'form-group' + (formErrors.employee_id?' form-error':'')}><label className="form-required">사번</label><input value={form.employee_id} onChange={function(e){setForm({...form,employee_id:e.target.value});}} />{formErrors.employee_id&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className={'form-group' + (formErrors.name?' form-error':'')}><label className="form-required">이름</label><input value={form.name} onChange={function(e){setForm({...form,name:e.target.value});}} />{formErrors.name&&<div className="form-error-msg">필수 입력 항목</div>}</div>
        <div className="form-group"><label>이메일</label><input value={form.email} onChange={function(e){setForm({...form,email:e.target.value});}} /></div>
        <div className={'form-group' + (formErrors.password?' form-error':'')}><label className="form-required">비밀번호</label><input type="password" value={form.password} onChange={function(e){setForm({...form,password:e.target.value});}} />
          {form.password && <PasswordStrength password={form.password}/>}{formErrors.password&&<div className="form-error-msg">필수 입력 항목</div>}
        </div>
        <div className="form-group"><label>역할</label><select value={form.role} onChange={function(e){setForm({...form,role:e.target.value});}} >

// ━━━━━━━━━━━━ SCHEDULE ━━━━━━━━━━━━
function SchedulePage() {
  const [schedules, setSchedules] = useState([]);
  const [dateFrom, setDateFrom] = useState(''); const [dateTo, setDateTo] = useState('');
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [attendanceTarget, setAttendanceTarget] = useState(null);
  const [enrolledStudents, setEnrolledStudents] = useState([]);
  const [attendanceMap, setAttendanceMap] = useState({});
  const { user, showToast } = useApp();
  const load = function() { let q='/schedules?'; if(dateFrom)q+=`&date_from=${dateFrom}`; if(dateTo)q+=`&date_to=${dateTo}`;
    api(q).then(function(d){setSchedules(d.data);}).catch(function(e){showToast(e.message,'error');}); };
  useEffect(function(){load();},[dateFrom,dateTo]);
  const handleDelete = async function() {
    if(!deleteTarget) return;
    try { await api(`/schedules/${deleteTarget.id}`,{method:'DELETE'}); showToast('일정 삭제 완료','success'); setDeleteTarget(null); load();
    } catch(e) { showToast(e.message,'error'); }
  };
  const loadEnrolledStudents = async function(scheduleId) {
    try {
      const data = await api(`/schedules/${scheduleId}/enrollments`);
      setEnrolledStudents(data.data || []);
      const initialMap = {};
      (data.data || []).forEach(function(student) {
        initialMap[student.id] = 'present';
      });
      setAttendanceMap(initialMap);
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const toggleAttendanceStatus = function(studentId) {
    const statuses = ['present', 'absent', 'late', 'excused'];
    const current = attendanceMap[studentId] || 'present';
    const currentIdx = statuses.indexOf(current);
    const nextIdx = (currentIdx + 1) % statuses.length;
    setAttendanceMap({...attendanceMap, [studentId]: statuses[nextIdx]});
  };
  const markAllPresent = function() {
    const newMap = {};
    enrolledStudents.forEach(function(student) {
      newMap[student.id] = 'present';
    });
    setAttendanceMap(newMap);
  };
  const saveAttendance = async function() {
    if(!attendanceTarget) return;
    try {
      const records = enrolledStudents.map(function(student) {
        return {student_id: student.id, status: attendanceMap[student.id] || 'present'};
      });
      await api(`/schedules/${attendanceTarget.id}/attendance`, {method: 'POST', body: JSON.stringify({records: records})});
      showToast('출석 저장 완료', 'success');
      setAttendanceTarget(null);
      setEnrolledStudents([]);
      setAttendanceMap({});
      load();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };
  const openAttendance = async function(schedule) {
    setAttendanceTarget(schedule);
    await loadEnrolledStudents(schedule.id);
  };
  const canManage = ['admin','ojt_admin'].includes(user.role);
  const tc = {lecture:'#2563eb',practical:'#059669',assessment:'#d97706',ojt:'#7c3aed',meeting:'#6b7280',other:'#9ca3af'};
  const downloadSchedules = function() {
    const wsData = schedules.map(function(s) {
      return {날짜: s.schedule_date, 시간: s.start_time + '-' + s.end_time, 제목: s.title, 유형: s.schedule_type, 과정: s.course_name || '-', 교관: s.instructor_name || '-', 장소: s.room || '-'};
    });
    const ws = XLSX.utils.json_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '일정');
    XLSX.writeFile(wb, '일정_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };
  return (
    <div className="page-content">
      <div className="filters"><label style={{fontSize:14}}>기간:</label>
        <input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}}/><span>~</span>
        <input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}}/></div>
      {canManage && <div style={{marginBottom: 16}}><button className="btn btn-primary btn-sm" onClick={downloadSchedules}>📥 엑셀 다운로드</button></div>}
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th>날짜</th><th>시간</th><th>제목</th><th>유형</th><th>과정</th><th>교관</th><th>장소</th>{canManage&&<th style={{width:140}}></th>}</tr></thead>
        <tbody>{schedules.map(function(s){return (
          <tr key={s.id}><td><strong>{s.schedule_date}</strong></td><td>{s.start_time}-{s.end_time}</td><td>{s.title}</td>
            <td><span className="badge" style={{background:tc[s.schedule_type]+'18',color:tc[s.schedule_type]}}>{s.schedule_type}</span></td>
            <td>{s.course_name||'-'}</td><td>{s.instructor_name||'-'}</td><td>{s.room||'-'}</td>
            {canManage&&<td><button className="btn btn-primary btn-sm" style={{padding:'4px 10px',fontSize:11,marginRight:4}}
              onClick={function(){openAttendance(s);}}>빠른 출석</button><button className="btn btn-danger btn-sm" style={{padding:'4px 10px',fontSize:11}}
              onClick={function(){setDeleteTarget(s);}}>삭제</button></td>}</tr>
        );})}{schedules.length===0&&<tr><td colSpan={canManage?8:7} className="text-center" style={{padding:40,color:'var(--gray-400)'}}>일정이 없습니다</td></tr>}</tbody>
      </table></div></div></div>
      {attendanceTarget&&<Modal title={'빠른 출석 - ' + attendanceTarget.title} onClose={function(){setAttendanceTarget(null);setEnrolledStudents([]);setAttendanceMap({});}}
        footer={<><button className="btn btn-outline" onClick={function(){setAttendanceTarget(null);setEnrolledStudents([]);setAttendanceMap({});}}>취소</button>
          <button className="btn btn-primary" onClick={markAllPresent} style={{marginRight: 8}}>전체 출석</button>
          <button className="btn btn-success" onClick={saveAttendance}>저장</button></>}>
        <div style={{marginBottom: 16}}>
          <div style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 12}}>상태를 클릭하여 변경: 출석 → 결석 → 지각 → 공결 → 출석</div>
          <div className="attendance-grid">
            {enrolledStudents.map(function(student) {
              const status = attendanceMap[student.id] || 'present';
              return (
                <div key={student.id} className={'attendance-item ' + (status === 'present' ? 'checked' : '')} onClick={function(){toggleAttendanceStatus(student.id);}}>
                  <div className="attendance-label">
                    <Avatar name={student.trainee_name} size="xs"/>
                    <div><strong style={{fontSize: 12}}>{student.trainee_name}</strong></div>
                  </div>
                  <span className={'attendance-status ' + status}>{status === 'present' ? '출석' : status === 'absent' ? '결석' : status === 'late' ? '지각' : '공결'}</span>
                </div>
              );
            })}
          </div>
        </div>
      </Modal>}
      {deleteTarget&&<Modal title="일정 삭제 확인" onClose={function(){setDeleteTarget(null);}}
        footer={<><button className="btn btn-outline" onClick={function(){setDeleteTarget(null);}}>취소</button>
          <button className="btn btn-danger" onClick={handleDelete}>삭제</button></>}>
        <div style={{textAlign:'center',padding:'20px 0'}}>
          <div style={{fontSize:40,marginBottom:12}}>📅</div>
          <div style={{fontSize:18,fontWeight:700}}>{deleteTarget.title}</div>
          <div style={{color:'var(--gray-500)',marginTop:8}}>{deleteTarget.schedule_date} {deleteTarget.start_time}-{deleteTarget.end_time}</div>
          <div style={{marginTop:20,padding:16,background:'var(--danger-light)',borderRadius:10,fontSize:14,color:'#991b1b'}}>
            이 일정을 삭제하시겠습니까?<br/><span style={{fontSize:12}}>(삭제된 일정은 복구할 수 없습니다)</span></div>
        </div>
      </Modal>}
    </div>
  );
}

// ━━━━━━━━━━━━ EVALUATIONS ━━━━━━━━━━━━
function EvaluationsPage() {
  const [evals, setEvals] = useState([]);
  const [statusFilter, setStatusFilter] = useState('');
  const [courseFilter, setCourseFilter] = useState('');
  const [studentSearch, setStudentSearch] = useState('');
  const [courses, setCourses] = useState([]);
  const { showToast } = useApp();
  const load = function() {
    let q='/evaluations?';
    if(statusFilter)q+=`&status=${statusFilter}`;
    api(q).then(function(d){
      setEvals(d.data);
    }).catch(function(e){showToast(e.message,'error');});
  };
  useEffect(function(){
    api('/courses').then(function(d){setCourses(d.data);}).catch(function(){});
    load();
  },[statusFilter]);
  const filteredEvals = evals.filter(function(ev) {
    if(courseFilter && ev.course_name !== courseFilter) return false;
    if(studentSearch && ev.trainee_name && !ev.trainee_name.toLowerCase().includes(studentSearch.toLowerCase())) return false;
    return true;
  });
  const downloadEvaluations = function() {
    const wsData = filteredEvals.map(function(ev) {
      return {제목: ev.title, 유형: ev.eval_type, 과정: ev.course_name || '-', 훈련생: ev.trainee_name || '-', 점수: ev.score !== null ? ev.score + '/' + ev.max_score : '-', 등급: ev.grade || '-', 상태: ev.status};
    });
    const ws = XLSX.utils.json_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '평가');
    XLSX.writeFile(wb, '평가_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };
  return (
    <div className="page-content">
      <div className="filters">
        <input placeholder="훈련생 검색..." value={studentSearch} onChange={function(e){setStudentSearch(e.target.value);}} />
        <select value={courseFilter} onChange={function(e){setCourseFilter(e.target.value);}}>
          <option value="">전체 과정</option>
          {courses.map(function(c){return <option key={c.id} value={c.name}>{c.name}</option>;})}
        </select>
        <select value={statusFilter} onChange={function(e){setStatusFilter(e.target.value);}}>
          <option value="">전체</option><option value="pending">Pending</option><option value="submitted">Submitted</option>
          <option value="graded">Graded</option></select>
        <button className="btn btn-primary btn-sm" onClick={downloadEvaluations}>📥 엑셀 다운로드</button>
      </div>
      <div className="card"><div className="card-body"><div className="table-wrapper"><table>
        <thead><tr><th>제목</th><th>유형</th><th>과정</th><th>훈련생</th><th>점수</th><th>등급</th><th>상태</th></tr></thead>
        <tbody>{filteredEvals.map(function(ev){
          return (
            <tr key={ev.id}><td><strong>{ev.title}</strong></td><td><span className="badge badge-gray">{ev.eval_type}</span></td>
              <td>{ev.course_name||'-'}</td><td>{ev.trainee_name||'-'}</td>
              <td>{ev.score!==null?`${ev.score}/${ev.max_score}`:'-'}</td><td>{ev.grade||'-'}</td><td><StatusBadge status={ev.status}/></td></tr>
          );
        })}{filteredEvals.length===0&&<tr><td colSpan="7" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>{evals.length===0?'평가 내역 없음':'검색 결과 없음'}</td></tr>}</tbody>
      </table></div></div></div>
    </div>
  );
}

// ━━━━━━━━━━━━ NOTIFICATIONS ━━━━━━━━━━━━

  const tc = {info:'var(--info)',warning:'var(--warning)',success:'var(--success)',danger:'var(--danger)'};
  return (
    <div className="page-content">
      <div className="flex-between mb-4"><span style={{fontSize:14,color:'var(--gray-500)'}}>읽지않음: {data.unread_count}건</span>
        <button className="btn btn-outline btn-sm" onClick={markAllRead}>모두 읽음</button></div>
      <div className="card"><div className="card-body">
        {data.notifications.map(n=>(
          <div key={n.id} onClick={()=>!n.is_read&&markRead(n.id)} style={{cursor:n.is_read?'default':'pointer',padding:'14px 16px',
            borderBottom:'1px solid var(--gray-50)',background:n.is_read?'transparent':'#f0f7ff',borderRadius:8,marginBottom:4,
            display:'flex',gap:12,alignItems:'flex-start',transition:'all 0.2s'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:tc[n.notification_type]||'var(--gray-400)',marginTop:5,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:n.is_read?400:600}}>{n.title}</div>
              <div style={{fontSize:13,color:'var(--gray-500)',marginTop:4}}>{n.message}</div>
              <div style={{fontSize:11,color:'var(--gray-400)',marginTop:4}}>{n.created_at}</div>
            </div>
          </div>
        ))}{data.notifications.length===0&&<div className="empty-state">알림 없음</div>}
      </div></div>
    </div>
  );
}

function ProfilePage() {
  const [profile, setProfile] = useState(null); const [editing, setEditing] = useState(false); const [form, setForm] = useState({});
  const [pwForm, setPwForm] = useState({current_password:'',new_password:'',confirm_password:''});
  const fileRef = useRef(null);
  const { showToast, refreshUser } = useApp();
  const loadProfile = () => api('/auth/profile').then(d=>{setProfile(d.data);setForm(d.data);}).catch(e=>showToast(e.message,'error'));
  useEffect(()=>{loadProfile();},[]);
  const handlePhotoUpload = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const fd = new FormData(); fd.append('photo', file);
    try {
      const token = localStorage.getItem('atms_token');
      const res = await fetch(`${API}/upload/photo?user_id=${profile.id}`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error);
      showToast('사진 업로드 완료','success'); loadProfile(); refreshUser();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleSave = async () => {
    try { await api('/auth/profile',{method:'PUT',body:JSON.stringify({name:form.name,email:form.email,phone:form.phone,bio:form.bio})});
      showToast('프로필 수정 완료','success'); setEditing(false); loadProfile(); refreshUser();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handlePwChange = async () => {
    if(pwForm.new_password!==pwForm.confirm_password) return showToast('비밀번호 불일치','error');
    try { await api('/auth/change-password',{method:'POST',body:JSON.stringify(pwForm)});
      showToast('비밀번호 변경 완료','success'); setPwForm({current_password:'',new_password:'',confirm_password:''});
    } catch(e) { showToast(e.message,'error'); }
  };
  if(!profile) return React.createElement(ATMSLoader, {label: '\uD504\uB85C\uD544 \uB85C\uB529 \uC911...', sub: 'Profile Data'});
  return (
    <div className="page-content"><div className="grid-2">
      <div className="card">
        <div className="card-header"><h3>프로필</h3>{!editing&&<button className="btn btn-outline btn-sm" onClick={()=>setEditing(true)}>수정</button>}</div>
        <div className="card-body">
          <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:24}}>
            <Avatar src={profile.photo_url} name={profile.name} size="xl" onClick={function(){if(fileRef.current) fileRef.current.click();}} />
            <input type="file" ref={fileRef} accept="image/*" style={{display:'none'}} onChange={handlePhotoUpload} />
            <div><div style={{fontSize:22,fontWeight:700}}>{profile.name}</div>
              <div style={{color:'var(--gray-500)',marginTop:4}}>{profile.title||''} &middot; {profile.department||''}</div>
              <span className="badge badge-blue" style={{marginTop:8}}>{profile.role}</span></div>
          </div>
          {editing?(<>
            <div className="form-group"><label>이름</label><input value={form.name||''} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="form-group"><label>이메일</label><input value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            <div className="form-group"><label>전화</label><input value={form.phone||''} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
            <div className="form-group"><label>소개</label><textarea rows="3" value={form.bio||''} onChange={e=>setForm({...form,bio:e.target.value})}/></div>
            <div style={{display:'flex',gap:8}}><button className="btn btn-primary" onClick={handleSave}>저장</button>
              <button className="btn btn-outline" onClick={()=>{setEditing(false);setForm(profile);}}>취소</button></div>
          </>):(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {[['사번',profile.employee_id],['이름',profile.name],['이메일',profile.email],['전화',profile.phone],
              ['부서',profile.department],['직위',profile.title],['전공',profile.specialty],['생년월일',profile.birthday]
            ].map(([l,v])=>(<div key={l}><span style={{fontSize:12,color:'var(--gray-500)'}}>{l}</span>
              <div style={{fontWeight:500,marginTop:2}}>{v||'-'}</div></div>))}
          </div>)}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h3>비밀번호 변경</h3></div>
        <div className="card-body">
          <div className="form-group"><label>현재 비밀번호</label><input type="password" value={pwForm.current_password} onChange={e=>setPwForm({...pwForm,current_password:e.target.value})}/></div>
          <div className="form-group"><label>새 비밀번호</label><input type="password" value={pwForm.new_password} onChange={e=>setPwForm({...pwForm,new_password:e.target.value})}/>
            {pwForm.new_password && <PasswordStrength password={pwForm.new_password}/>}
          </div>
          <div className="form-group"><label>새 비밀번호 확인</label><input type="password" value={pwForm.confirm_password} onChange={e=>setPwForm({...pwForm,confirm_password:e.target.value})}/></div>
          <button className="btn btn-primary" onClick={handlePwChange}>변경</button>
        </div>
      </div>
    </div></div>
  );
}

// ━━━━━━━━━━━━ WEEKLY REPORT SUB-COMPONENT ━━━━━━━━━━━━
function WeeklyReportTable({ rows, title }) {
  var gFltPlan = rows.reduce(function(s,w){return s+w.fltPlan;},0);
  var gFltDone = rows.reduce(function(s,w){return s+w.fltDone;},0);
  var gSimPlan = rows.reduce(function(s,w){return s+w.simPlan;},0);
  var gSimDone = rows.reduce(function(s,w){return s+w.simDone;},0);
  return (
    <div className="card-body">
      <div style={{marginBottom:16}}>
        <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-flight-bg)',color:'var(--wr-flight)'}}>✈</div>
            <div className="stat-value" style={{color:'var(--wr-flight)'}}>{gFltDone} / {gFltPlan}</div><div className="stat-label">Flight Done / Plan (Sortie)</div></div>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-sim-bg)',color:'var(--wr-sim)'}}>🖥</div>
            <div className="stat-value" style={{color:'var(--wr-sim)'}}>{gSimDone} / {gSimPlan}</div><div className="stat-label">SIM Done / Plan</div></div>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-total-bg)',color:'var(--wr-total)'}}>✓</div>
            <div className="stat-value" style={{color:'var(--wr-total)'}}>{gFltDone + gSimDone} / {gFltPlan + gSimPlan}</div><div className="stat-label">Total Done / Plan</div></div>
        </div>
      </div>
      <div className="table-wrapper"><table>
        <thead><tr><th>Pilot</th><th colSpan="3" style={{textAlign:'center',background:'var(--wr-flight-bg)',color:'var(--wr-flight-text)'}}>Flight</th>
          <th colSpan="3" style={{textAlign:'center',background:'var(--wr-sim-bg)',color:'var(--wr-sim-text)'}}>Simulator</th>
          <th colSpan="3" style={{textAlign:'center',background:'var(--wr-total-bg)',color:'var(--wr-total-text)'}}>Total</th><th>Progress</th></tr>
        <tr><th></th><th>Plan</th><th>Done</th><th>Remain</th><th>Plan</th><th>Done</th><th>Remain</th>
          <th>Plan</th><th>Done</th><th>Remain</th><th></th></tr></thead>
        <tbody>{rows.map(function(w){
          var total=w.fltPlan+w.simPlan; var done=w.fltDone+w.simDone;
          var pct=total?Math.round((done/total)*100):0;
          return (
            <tr key={w.id}>
              <td><strong>{w.name}</strong></td>
              <td className="text-center">{w.fltPlan}</td><td className="text-center" style={{color:'var(--wr-flight)',fontWeight:700}}>{w.fltDone}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{w.fltRemain}</td>
              <td className="text-center">{w.simPlan}</td><td className="text-center" style={{color:'var(--wr-sim)',fontWeight:700}}>{w.simDone}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{w.simRemain}</td>
              <td className="text-center">{total}</td><td className="text-center" style={{fontWeight:700,color:'var(--wr-total)'}}>{done}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{total-done}</td>
              <td style={{width:120}}>
                <div className="flex-between" style={{fontSize:11}}><span>{pct}%</span></div>
                <div className="progress-bar"><div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg, var(--wr-flight), var(--wr-sim))'}}/></div>
              </td>
            </tr>
          );
        })}</tbody>
      </table></div>
    </div>
  );
}

function WeeklyReport({ weekly, pilots, nationalities, normalizeNat, natLabelMap }) {
  return (
    <div>
      {nationalities.map(function(nat){
        // Match weekly rows to pilots of this nationality
        var natPilotIds = {};
        pilots.forEach(function(p){ if(normalizeNat(p.nationality)===nat.code) natPilotIds[p.id]=true; });
        var natWeekly = weekly.filter(function(w){ return natPilotIds[w.id]; });
        if (natWeekly.length === 0) return null;
        return (
          <div className="card" key={nat.code} style={{marginBottom:16}}>
            <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{nat.label_ko} - Weekly Report</h3>
              <span className="badge badge-yellow" style={{marginLeft:8}}>As of {new Date().toISOString().slice(0,10)}</span></div>
            <WeeklyReportTable rows={natWeekly} />
          </div>
        );
      })}
    </div>
  );
}

// ━━━━━━━━━━━━ CANVAS PARTICLE BACKGROUND SYSTEM ━━━━━━━━━━━━
var NAT_THEMES = {
  'Malaysia': { css:'nat-MY', bg1:'#0C1445', bg2:'#1a237e',
    accent:'rgba(204,0,1,0.8)', jetC:'rgba(255,215,0,0.85)', sparkC:'rgba(251,191,36,',
    pc:['#cc0001','#ffd700','#ffffff','#3b82f6'],
    flag: function(ctx,fw,fh){ // Jalur Gemilang — 14 stripes + canton + crescent + star
      var sh=fh/14;
      for(var i=0;i<14;i++){ctx.fillStyle=i%2===0?'#cc0001':'#ffffff';ctx.fillRect(0,i*sh,fw,sh+1);}
      var cw=fw*0.5,ch=fh*7/14;
      ctx.fillStyle='#010066';ctx.fillRect(0,0,cw,ch);
      var mcx=cw*0.38,mcy=ch*0.5,mr=Math.min(cw,ch)*0.32;
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(mcx,mcy,mr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#010066';ctx.beginPath();ctx.arc(mcx+mr*0.25,mcy-mr*0.06,mr*0.8,0,Math.PI*2);ctx.fill();
      _star(ctx,cw*0.7,ch*0.5,mr*0.38,14,'#ffd700');
    }},
  'Poland': { css:'nat-PL', bg1:'#3d0c0c', bg2:'#1a0505',
    accent:'rgba(220,20,60,0.8)', jetC:'rgba(255,255,255,0.8)', sparkC:'rgba(220,20,60,',
    pc:['#dc143c','#ffffff','#ff6b6b','#fbbf24'],
    flag: function(ctx,fw,fh){ // Flaga Polski — simple white top, red bottom
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,fw,fh/2);
      ctx.fillStyle='#dc143c';ctx.fillRect(0,fh/2,fw,fh/2+1);
    }},
  'Iraq': { css:'nat-IQ', bg1:'#0a2210', bg2:'#051208',
    accent:'rgba(0,122,61,0.8)', jetC:'rgba(0,220,120,0.8)', sparkC:'rgba(0,200,100,',
    pc:['#ce1126','#007a3d','#ffffff','#00ff88'],
    flag: function(ctx,fw,fh){ // Flag of Iraq — red/white/black, green Takbir in white band
      var th=fh/3;
      ctx.fillStyle='#ce1126';ctx.fillRect(0,0,fw,th+1);
      ctx.fillStyle='#ffffff';ctx.fillRect(0,th,fw,th+1);
      ctx.fillStyle='#000000';ctx.fillRect(0,th*2,fw,th+1);
      // Takbir (stylized Kufic script representation)
      ctx.fillStyle='#007a3d';
      var tx=fw*0.15,tw=fw*0.7,ty=th+th*0.25,tbh=th*0.5;
      // Simplified geometric Kufic-style Takbir
      var bw=tw/11;
      for(var i=0;i<11;i++){
        var bx=tx+i*bw;
        var heights=[0.9,0.5,0.6,0.8,0.3,0.9,0.7,0.5,0.8,0.6,0.7];
        var hh=tbh*heights[i];
        ctx.fillRect(bx+bw*0.15,ty+tbh-hh,bw*0.7,hh);
        if(i%3===0){ctx.beginPath();ctx.arc(bx+bw*0.5,ty+tbh-hh-bw*0.2,bw*0.25,0,Math.PI*2);ctx.fill();}
      }
    }}
};

function _star(ctx,cx,cy,r,pts,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=-Math.PI/2+i*Math.PI/pts;
    var rr=i%2===0?r:r*0.55;
    i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));
  }ctx.closePath();ctx.fill();
}

function NatCanvasBg(props) {
  var code = props.code;
  var canvasRef = React.useRef(null);
  var animRef = React.useRef(null);

  React.useEffect(function() {
    var T = NAT_THEMES[code];
    if (!T) return;
    var cvs = canvasRef.current;
    if (!cvs) return;
    var par = cvs.parentElement;
    if (!par) return;
    var ctx = cvs.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var W, H, t = 0;
    // State
    var particles = [], speedLines = [], jets = [], sparks = [];

    function initState() {
      particles = []; speedLines = []; jets = []; sparks = [];
      for (var i = 0; i < 50; i++) particles.push(mkPart());
      for (var i = 0; i < 15; i++) speedLines.push({
        x: Math.random() * W * 1.5, y: Math.random() * H,
        len: 30 + Math.random() * 100, speed: 2 + Math.random() * 5,
        alpha: 0.03 + Math.random() * 0.06
      });
      spawnJet(); spawnJet();
    }
    function mkPart() {
      return { x: Math.random() * W, y: Math.random() * H,
        vx: -0.2 - Math.random() * 0.8, vy: 0, size: 0.4 + Math.random() * 1.5,
        bright: Math.random(), twinkle: 0.02 + Math.random() * 0.03,
        color: T.pc[Math.floor(Math.random() * T.pc.length)] };
    }
    function spawnJet() {
      var fromR = Math.random() > 0.3;
      var sc = Math.min(W, H) / 350 * (0.5 + Math.random() * 0.5);
      jets.push({ x: fromR ? W + 80 : -120, y: 30 + Math.random() * (H - 60),
        speed: (2 + Math.random() * 3) * (fromR ? -1 : 1), scale: sc,
        dir: fromR ? -1 : 1, tilt: (Math.random() - 0.5) * 0.12,
        trail: [], ab: 0.5 + Math.random() * 0.5, alive: true });
    }

    function drawJetBody(ctx, j) {
      ctx.save(); ctx.translate(j.x, j.y);
      ctx.scale(j.dir * j.scale, j.scale); ctx.rotate(j.tilt);
      // Afterburner
      var abL = 25 + Math.sin(t * 0.2) * 12;
      var abG = ctx.createRadialGradient(-50, 0, 2, -50 - abL, 0, abL);
      abG.addColorStop(0, T.sparkC + (j.ab * 0.9) + ')');
      abG.addColorStop(0.4, T.sparkC + (j.ab * 0.5) + ')');
      abG.addColorStop(1, T.sparkC + '0)');
      ctx.fillStyle = abG;
      ctx.beginPath(); ctx.ellipse(-50, 0, abL, 5 + Math.sin(t * 0.25) * 2, 0, 0, Math.PI * 2); ctx.fill();
      // Body
      ctx.fillStyle = T.jetC; ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(60, 0); ctx.lineTo(30, -5); ctx.lineTo(10, -18); ctx.lineTo(-10, -20);
      ctx.lineTo(-20, -12); ctx.lineTo(-45, -8); ctx.lineTo(-55, -22); ctx.lineTo(-48, -22);
      ctx.lineTo(-42, -8); ctx.lineTo(-50, -6); ctx.lineTo(-50, 6); ctx.lineTo(-42, 8);
      ctx.lineTo(-48, 22); ctx.lineTo(-55, 22); ctx.lineTo(-45, 8); ctx.lineTo(-20, 12);
      ctx.lineTo(-10, 20); ctx.lineTo(10, 18); ctx.lineTo(30, 5);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Wings
      ctx.fillStyle = T.accent;
      ctx.beginPath(); ctx.moveTo(15, -6); ctx.lineTo(-15, -38); ctx.lineTo(-30, -36); ctx.lineTo(-10, -6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(15, 6); ctx.lineTo(-15, 38); ctx.lineTo(-30, 36); ctx.lineTo(-10, 6); ctx.closePath(); ctx.fill();
      // Cockpit
      ctx.fillStyle = 'rgba(147,197,253,0.35)';
      ctx.beginPath(); ctx.ellipse(25, -2, 10, 4, -0.1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function resize() {
      var rect = par.getBoundingClientRect();
      W = Math.max(rect.width, 100); H = Math.max(rect.height, 80);
      cvs.width = W * dpr; cvs.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initState();
    }
    resize();
    var ro = window.ResizeObserver ? new ResizeObserver(resize) : null;
    if (ro) ro.observe(par);

    function render() {
      t++;
      ctx.clearRect(0, 0, W, H);
      // BG gradient
      var bg = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.9);
      bg.addColorStop(0, T.bg1); bg.addColorStop(1, T.bg2);
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      // Speed lines
      for (var s = 0; s < speedLines.length; s++) {
        var sl = speedLines[s]; sl.x -= sl.speed;
        if (sl.x + sl.len < 0) { sl.x = W + sl.len; sl.y = Math.random() * H; }
        ctx.strokeStyle = 'rgba(255,255,255,' + sl.alpha + ')'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(sl.x, sl.y); ctx.lineTo(sl.x + sl.len, sl.y); ctx.stroke();
      }

      // Flag — top-left corner, proportional, with fade
      var flagW = Math.min(W * 0.22, 200), flagH = Math.min(H * 0.7, flagW * 0.6);
      ctx.save(); ctx.globalAlpha = 0.88;
      T.flag(ctx, flagW, flagH);
      ctx.globalAlpha = 1;
      // Right fade
      var gR = ctx.createLinearGradient(flagW * 0.7, 0, flagW, 0);
      gR.addColorStop(0, 'rgba(0,0,0,0)'); gR.addColorStop(1, T.bg1);
      ctx.fillStyle = gR; ctx.fillRect(flagW * 0.7, 0, flagW * 0.3, flagH);
      // Bottom fade
      var gB = ctx.createLinearGradient(0, flagH * 0.7, 0, flagH);
      gB.addColorStop(0, 'rgba(0,0,0,0)'); gB.addColorStop(1, T.bg1);
      ctx.fillStyle = gB; ctx.fillRect(0, flagH * 0.7, flagW, flagH * 0.3);
      ctx.restore();

      // Particles
      for (var p = 0; p < particles.length; p++) {
        var pt = particles[p]; pt.x += pt.vx; pt.bright += pt.twinkle;
        var alp = 0.2 + Math.sin(pt.bright) * 0.5;
        if (pt.x < -5) { pt.x = W + 5; pt.y = Math.random() * H; }
        ctx.globalAlpha = Math.max(0, alp);
        ctx.fillStyle = pt.color;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Jets
      if (Math.random() < 0.006 && jets.length < 4) spawnJet();
      for (var ji = jets.length - 1; ji >= 0; ji--) {
        var jt = jets[ji]; jt.x += jt.speed; jt.y += Math.sin(t * 0.025 + ji) * 0.3;
        // Trail
        jt.trail.push({ x: jt.x - jt.dir * 45 * jt.scale, y: jt.y, a: 0.4 });
        if (jt.trail.length > 40) jt.trail.shift();
        for (var ti = 0; ti < jt.trail.length; ti++) {
          var tp = jt.trail[ti]; tp.a *= 0.96;
          ctx.fillStyle = 'rgba(255,255,255,' + (tp.a * 0.1) + ')';
          ctx.beginPath(); ctx.arc(tp.x, tp.y, 2 + (jt.trail.length - ti) * 0.12, 0, Math.PI * 2); ctx.fill();
        }
        drawJetBody(ctx, jt);
        // Sparks
        if (Math.random() < 0.04) {
          for (var si = 0; si < 4; si++) sparks.push({
            x: jt.x, y: jt.y, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
            life: 1, decay: 0.03 + Math.random() * 0.03 });
        }
        if ((jt.dir === 1 && jt.x > W + 200) || (jt.dir === -1 && jt.x < -200)) jets.splice(ji, 1);
      }

      // Sparks
      for (var si = sparks.length - 1; si >= 0; si--) {
        var sp = sparks[si]; sp.x += sp.vx; sp.y += sp.vy; sp.life -= sp.decay;
        if (sp.life <= 0) { sparks.splice(si, 1); continue; }
        ctx.fillStyle = T.sparkC + sp.life + ')';
        ctx.beginPath(); ctx.arc(sp.x, sp.y, 1.2 * sp.life, 0, Math.PI * 2); ctx.fill();
      }

      // Subtle HUD text
      ctx.save(); ctx.font = Math.max(9, H * 0.06) + 'px "Courier New",monospace';
      ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + Math.sin(t * 0.03) * 0.05) + ')';
      ctx.fillText('ATMS // FA-50', 10, H - 10);
      ctx.textAlign = 'right';
      ctx.fillText('MODE: TRAINING', W - 10, H - 10);
      ctx.restore();

      animRef.current = requestAnimationFrame(render);
    }

    var timer = setTimeout(function() { resize(); render(); }, 60);
    return function() {
      clearTimeout(timer);
      if (animRef.current) cancelAnimationFrame(animRef.current);
      if (ro) ro.disconnect();
    };
  }, [code]);

  return React.createElement('canvas', { ref: canvasRef, className: 'nat-canvas-bg' });
}

function getNatCss(code) {
  var info = NAT_THEMES[code];
  return info ? info.css : '';
}

// ━━━━━━━━━━━━ PASSWORD STRENGTH COMPONENT ━━━━━━━━━━━━
function PasswordStrength({ password }) {
  var strength = 'weak';
  var score = 0;
  if (password.length >= 8) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^a-zA-Z0-9]/.test(password)) score++;
  if (score >= 4) strength = 'strong';
  else if (score >= 3) strength = 'medium';

  return (
    <div>
      <div className="password-strength">
        <div className={'strength-bar ' + strength} style={{opacity: score >= 1 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 2 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 3 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 4 ? 1 : 0.3}}></div>
      </div>
      <div className={'strength-label ' + strength}>
        {strength === 'weak' && '약함 (8글자 이상, 대문자, 소문자, 숫자, 특수문자 필요)'}
        {strength === 'medium' && '중간 (안전함)'}
        {strength === 'strong' && '강함 (매우 안전함)'}
      </div>
    </div>
  );
}

    if (!autoRefresh) return;
    var iv = setInterval(function() { fetchLogs(pg, ipFilter, true); }, 5000);
    return function() { clearInterval(iv); };
  }, [autoRefresh, pg, ipFilter]);

  var handleSearch = function() { setPg(1); fetchLogs(1, ipFilter); };

                  <td><span style={{color:statusColor,fontWeight:600,fontSize:13}}>{isDisconnect ? '-' : log.status_code}</span></td>
                  <td style={{fontSize:12}}>{log.user_name || '-'}</td>

      </div>

      {totalPages > 1 && (

          <button className="btn btn-sm" disabled={pg<=1} onClick={function(){setPg(pg-1);}}>이전</button>

          })}
          <button className="btn btn-sm" disabled={pg>=totalPages} onClick={function(){setPg(pg+1);}}>다음</button>
        </div>
      )}
    </div>
  );
}
