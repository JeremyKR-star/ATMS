                  placeholder="Code (English)" value={newNatCode} onChange={function(e){setNewNatCode(e.target.value);}}/>
                <input style={{padding:'5px 10px',borderRadius:8,border:'1.5px solid var(--gray-200)',fontSize:13,width:100}}
                  placeholder="라벨 (한글)" value={newNatLabel} onChange={function(e){setNewNatLabel(e.target.value);}}/>
                <button className="btn btn-primary btn-sm" onClick={addNationality}>추가</button>
                <button className="btn btn-outline btn-sm" onClick={function(){setShowNatAdd(false);setNewNatCode('');setNewNatLabel('');}}>취소</button>
              </div>
            )}
          </div>

          {/* ── "전체" → grouped by nationality ── */}
          {natFilter==='all' && nationalities.map(function(nat){
            var groupPilots = pilots.filter(function(p){ return normalizeNat(p.nationality) === nat.code; });
            if (groupPilots.length === 0) return null;
            var gIdx = getGroupIdx(nat.code);
            return (
              <div className={'nat-section ' + getNatCss(nat.code)} key={nat.code}>
                <NatCanvasBg code={nat.code} />
                <div className="nat-section-title">
                  <h3>{nat.label_ko} Pilots</h3>
                  <span className="badge badge-blue">{groupPilots.length}명</span>
                </div>
                <div className="card" style={{marginBottom:0}}>
                  <div className="card-body">
                    <div className="pilot-carousel">
                      {groupPilots.length > 1 && <button className="carousel-nav carousel-prev" onClick={function(){goToGroup(nat.code, gIdx-1, groupPilots.length);}}>&#8249;</button>}
                      {groupPilots.length > 1 && <button className="carousel-nav carousel-next" onClick={function(){goToGroup(nat.code, gIdx+1, groupPilots.length);}}>&#8250;</button>}
                      <div className="pilot-carousel-track" style={{transform:'translateX(-'+gIdx*100+'%)'}}>
                        {groupPilots.map(function(p){
                          var done=getPilotDone(p.id); var pct=totalCourses?Math.round((done/totalCourses)*100):0;
                          var sd=getPilotSimDone(p.id); var fd=getPilotFltDone(p.id);
                          return (
                            <div className="pilot-card" key={p.id}>
                              <div className="pilot-profile">
                                <div className="pilot-photo" onClick={function(){if(isAdmin){setPhotoTarget(p.id);if(photoRef.current)photoRef.current.click();}}}>
                                  {p.photo_url ? <img src={p.photo_url} alt={p.short_name}/> :
                                    <>{(p.short_name||'?')[0]}{(p.short_name||'?').slice(-1)}</>}
                                </div>
                                <div className="pilot-name">{p.name}</div>
                                <div className="pilot-rank">{p.rank} &middot; {p.callsign||p.service_number||'N/A'}</div>
                                <div style={{margin:'0 auto',maxWidth:300}}>
                                  <div className="flex-between" style={{fontSize:12,marginBottom:4}}>
                                    <span>훈련 진도</span><span style={{fontWeight:700,color:'var(--primary)'}}>{pct}%</span></div>
                                  <div className="progress-bar" style={{height:10}}>
                                    <div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg,#2563eb,#7c3aed)'}}/></div>
                                </div>
                                <div className="pilot-stats">
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--primary)'}}>{sd}/{simCourses.length}</div>
                                    <div className="pilot-stat-lbl">SIM Sorties</div></div>
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--success)'}}>{fd}/{fltCourses.length}</div>
                                    <div className="pilot-stat-lbl">Flight Sorties</div></div>
                                  <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--warning)'}}>{done}/{totalCourses}</div>
                                    <div className="pilot-stat-lbl">Total</div></div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      {groupPilots.length > 1 && (
                        <div className="carousel-dots">
                          {groupPilots.map(function(_,i){return <div key={i} className={'carousel-dot '+(i===gIdx?'active':'')} onClick={function(){goToGroup(nat.code, i, groupPilots.length);}}/> ;})}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* ── Single nationality filter → single carousel with bg ── */}
          {natFilter!=='all' && filteredPilots.length > 0 && (
            <div className={'nat-section ' + getNatCss(natFilter)}>
              <NatCanvasBg code={natFilter} />
              <div className="nat-section-title"><h3>{natLabelMap[natFilter]||natFilter} T-50 Transition Course Pilots</h3>
                <span className="badge badge-blue">{filteredPilots.length}명</span></div>
              <div className="card" style={{marginBottom:0}}>
                <div className="card-body">
                  <div className="pilot-carousel">
                    {filteredPilots.length > 1 && <button className="carousel-nav carousel-prev" onClick={function(){goTo(activeIdx-1);}}>&#8249;</button>}
                    {filteredPilots.length > 1 && <button className="carousel-nav carousel-next" onClick={function(){goTo(activeIdx+1);}}>&#8250;</button>}
                    <div className="pilot-carousel-track" style={{transform:'translateX(-'+activeIdx*100+'%)'}}>
                      {filteredPilots.map(function(p){
                        var done=getPilotDone(p.id); var pct=totalCourses?Math.round((done/totalCourses)*100):0;
                        var sd=getPilotSimDone(p.id); var fd=getPilotFltDone(p.id);
                        return (
                          <div className="pilot-card" key={p.id}>
                            <div className="pilot-profile">
                              <div className="pilot-photo" onClick={function(){if(isAdmin){setPhotoTarget(p.id);if(photoRef.current)photoRef.current.click();}}}>
                                {p.photo_url ? <img src={p.photo_url} alt={p.short_name}/> :
                                  <>{(p.short_name||'?')[0]}{(p.short_name||'?').slice(-1)}</>}
                              </div>
                              <div className="pilot-name">{p.name}</div>
                              <div className="pilot-rank">{p.rank} &middot; {p.callsign||p.service_number||'N/A'}</div>
                              <div style={{margin:'0 auto',maxWidth:300}}>
                                <div className="flex-between" style={{fontSize:12,marginBottom:4}}>
                                  <span>훈련 진도</span><span style={{fontWeight:700,color:'var(--primary)'}}>{pct}%</span></div>
                                <div className="progress-bar" style={{height:10}}>
                                  <div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg,#2563eb,#7c3aed)'}}/></div>
                              </div>
                              <div className="pilot-stats">
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--primary)'}}>{sd}/{simCourses.length}</div>
                                  <div className="pilot-stat-lbl">SIM Sorties</div></div>
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--success)'}}>{fd}/{fltCourses.length}</div>
                                  <div className="pilot-stat-lbl">Flight Sorties</div></div>
                                <div className="pilot-stat"><div className="pilot-stat-val" style={{color:'var(--warning)'}}>{done}/{totalCourses}</div>
                                  <div className="pilot-stat-lbl">Total</div></div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {filteredPilots.length > 1 && (
                      <div className="carousel-dots">
                        {filteredPilots.map(function(_,i){return <div key={i} className={'carousel-dot '+(i===activeIdx?'active':'')} onClick={function(){goTo(i);}}/> ;})}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Empty state */}
          {natFilter!=='all' && filteredPilots.length === 0 && (
            <div className="card"><div className="card-body">
              <div className="empty-state" style={{padding:'60px 20px'}}>
                <div style={{fontSize:48,marginBottom:12}}>🌍</div>
                <div style={{fontSize:16,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>해당 국적의 조종사가 없습니다</div>
                <div style={{fontSize:13,color:'var(--gray-400)'}}>다른 국적을 선택하거나 조종사 관리 탭에서 조종사를 추가해주세요.</div>
              </div>
            </div></div>
          )}
        </div>
      )}

      {/* ── Individual Training Status ── */}
      {subTab==='individual' && (
        <div>
          <div className="filters">
            <select value={selectedPilot||''} onChange={function(e){setSelectedPilot(e.target.value?Number(e.target.value):null);}}>
              <option value="">전체 조종사</option>
              {pilots.map(function(p){return <option key={p.id} value={p.id}>{p.short_name} ({p.name})</option>;})}
            </select>
            {canEditTraining && <span style={{fontSize:12,color:'var(--gray-400)'}}>Click a cell to edit</span>}
          </div>

          {nationalities.map(function(nat){
            var natPilots;
            if (selectedPilot) {
              natPilots = pilots.filter(function(p){ return p.id===selectedPilot && normalizeNat(p.nationality)===nat.code; });
            } else {
              natPilots = pilots.filter(function(p){ return normalizeNat(p.nationality)===nat.code; });
            }
            if (natPilots.length === 0) return null;
            return (
              <div className={'nat-section ' + getNatCss(nat.code)} key={nat.code}>
                <NatCanvasBg code={nat.code} />
                <div className="nat-section-title"><h3>{nat.label_ko} - Individual Training Status</h3>
                  <span className="badge badge-blue">{natPilots.length}명</span></div>
                <div className="card" style={{marginBottom:0}}>
                  <div className="card-body"><div className="table-wrapper">
                    <table className="training-table">
                      <thead>
                        <tr>
                          <th rowSpan="2">No.</th><th colSpan="2">SIM/CPT</th><th colSpan="2">T-50</th>
                          <th rowSpan="2">Contents</th>
                          {natPilots.map(function(p){return (
                            <th key={p.id} colSpan="2" style={{background:'#1e40af'}}>{p.short_name}</th>
                          );})}
                        </tr>
                        <tr>
                          <th>No.</th><th>Subject</th><th>No.</th><th>Subject</th>
                          {natPilots.map(function(p){return (
                            <React.Fragment key={p.id}><th>Date</th><th>Time</th></React.Fragment>
                          );})}
                        </tr>
                      </thead>
                      <tbody>
                        <tr><td colSpan={6+natPilots.length*2} className="section-header">Simulator Training</td></tr>
                        {simCourses.map(function(c,ci){
                          return (
                            <tr key={c.id}>
                              <td>{c.course_no||('C-'+(ci+1).toString().padStart(2,'0'))}</td>
                              <td>{ci+1}</td><td><strong>{c.subject}</strong></td><td>-</td><td>-</td>
                              <td style={{textAlign:'left',fontSize:11}}>{c.contents||''}</td>
                              {natPilots.map(function(p){
                                var rec=(tMap[p.id]||{})[c.id];
                                return <React.Fragment key={p.id}>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.date.slice(5):'-'}</td>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.time:'-'}</td>
                                </React.Fragment>;
                              })}
                            </tr>
                          );
                        })}
                        <tr><td colSpan={6+natPilots.length*2} className="section-header">Flight Training</td></tr>
                        {fltCourses.map(function(c,ci){
                          return (
                            <tr key={c.id}>
                              <td>{c.course_no||('C-'+(simCourses.length+ci+1).toString().padStart(2,'0'))}</td>
                              <td>-</td><td>-</td><td>{ci+1}</td><td><strong>{c.subject}</strong></td>
                              <td style={{textAlign:'left',fontSize:11}}>{c.contents||''}</td>
                              {natPilots.map(function(p){
                                var rec=(tMap[p.id]||{})[c.id];
                                return <React.Fragment key={p.id}>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.date.slice(5):'-'}</td>
                                  <td className={(rec?'done':'pending')+(canEditTraining?' editable':'')}
                                    onClick={function(e){handleCellClick(e,p.id,c.id,rec&&rec.date,rec&&rec.time);}}>
                                    {rec?rec.time:'-'}</td>
                                </React.Fragment>;
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div></div>
                </div>
              </div>
            );
          })}

          {/* Cell edit popup */}
          {editingCell && <div className="cell-edit-popup" style={{left:cellPos.x,top:cellPos.y}}
            onClick={function(e){e.stopPropagation();}}>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Date</label>
                <input type="date" value={cellDate} onChange={function(e){setCellDate(e.target.value);}} autoFocus/>
              </div>
              <div style={{width:80}}>
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Time</label>
                <input type="text" value={cellTime} placeholder="H:MM" onChange={function(e){setCellTime(e.target.value);}}/>
              </div>
            </div>
            <div className="cell-btns">
              {cellDate && <button className="btn btn-danger btn-sm" onClick={deleteCell}>Delete</button>}
              <button className="btn btn-outline btn-sm" onClick={function(){setEditingCell(null);}}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={saveCell}>Save</button>
            </div>
          </div>}
        </div>
      )}

      {/* ── Weekly Report ── */}
      {subTab==='weekly' && <WeeklyReport weekly={weekly} pilots={pilots} nationalities={nationalities} normalizeNat={normalizeNat} natLabelMap={natLabelMap} />}

      {/* ── Pilot Management (Admin) ── */}
      {subTab==='manage' && isAdmin && (
        <div>
          <div className="flex-between mb-4">
            <span style={{fontSize:14,color:'var(--gray-500)'}}>Active Pilots: {pilots.length}</span>
            <button className="btn btn-primary" onClick={openCreate}>+ Add Pilot</button>
          </div>
          <div className="card"><div className="card-body">
            <div className="table-wrapper"><table>
              <thead><tr><th style={{width:50}}></th><th>Short Name</th><th>Full Name</th><th>Rank</th>
                <th>Nationality</th><th>Service No.</th><th>Callsign</th><th>Squadron</th><th style={{width:120}}></th></tr></thead>
              <tbody>{pilots.map(function(p){
                var natLabel = natLabelMap[normalizeNat(p.nationality)] || p.nationality || '-';
                return (
                <tr key={p.id}>
                  <td><Avatar src={p.photo_url} name={p.short_name} size="sm"/></td>
                  <td><strong>{p.short_name}</strong></td><td>{p.name}</td><td>{p.rank}</td>
                  <td><span className="badge badge-blue">{natLabel}</span></td>
                  <td>{p.service_number||'-'}</td><td>{p.callsign||'-'}</td><td>{p.squadron||'-'}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-outline btn-sm" onClick={function(){openEdit(p);}}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={function(){deactivatePilot(p);}}>Del</button>
                    </div>
                  </td>
                </tr>
              );})}{pilots.length===0&&<tr><td colSpan="9" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>No pilots</td></tr>}</tbody>
            </table></div>
          </div></div>
        </div>
      )}

      {/* Photo upload hidden input */}
      <input type="file" ref={photoRef} accept="image/*" style={{display:'none'}} onChange={handlePhotoUpload}/>

      {/* Pilot Create/Edit Modal */}
      {showPilotModal && <Modal title={editingPilot?`Edit: ${editingPilot.short_name}`:'Add New Pilot'} onClose={()=>setShowPilotModal(false)}
        footer={<><button className="btn btn-outline" onClick={()=>setShowPilotModal(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={savePilot}>{editingPilot?'Update':'Create'}</button></>}>
        <div className="pilot-admin-grid">
          {formField('Full Name *','name')}
          {formField('Short Name *','short_name')}
          <div className="form-group"><label>Rank</label>
            <select value={pilotForm.rank||'Major'} onChange={e=>setPilotForm({...pilotForm,rank:e.target.value})}>
              {['Major','Captain','First Lieutenant','Second Lieutenant','Colonel','Lieutenant Colonel'].map(r=>
                <option key={r} value={r}>{r}</option>)}
            </select></div>
          {formField('Service Number','service_number')}
          {formField('Callsign','callsign')}
          <div className="form-group"><label>Nationality</label>
            <div style={{display:'flex',gap:6}}>
              <select style={{flex:1}} value={pilotForm.nationality||''} onChange={function(e){setPilotForm({...pilotForm,nationality:e.target.value});}}>
                <option value="">Select</option>
                {nationalities.map(function(n){return <option key={n.id} value={n.code}>{n.label_ko} ({n.code})</option>;})}
              </select>
            </div>
          </div>
          {formField('Squadron','squadron')}
          {formField('Date of Birth','date_of_birth','date')}
          {formField('Course Class','course_class')}
          {formField('Training Start','training_start_date','date')}
          {formField('Training End','training_end_date','date')}
          {formField('Phone','phone','tel')}
          {formField('Email','email','email')}
          {formField('Sort Order','sort_order','number')}
        </div>
        <div className="form-group" style={{marginTop:12}}><label>Notes</label>
          <textarea rows="2" value={pilotForm.notes||''} onChange={e=>setPilotForm({...pilotForm,notes:e.target.value})}/></div>
      </Modal>}
    </div>
  );
}

    <div className="page-content">
      <div className="card"><div className="card-header"><h3>정비사 관리</h3></div>
        <div className="card-body">

            <div style={{fontSize:60,marginBottom:16}}>🔧</div>

// ━━━━━━━━━━━━ MAIN APP ━━━━━━━━━━━━
function App() {
  const [user, setUser] = useState(()=>{ try{return JSON.parse(localStorage.getItem('atms_user'));}catch{return null;} });
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [activeUsers, setActiveUsers] = useState(0);
  const showToast = (message,type='success') => setToast({message,type});
  const logout = () => { localStorage.removeItem('atms_token'); localStorage.removeItem('atms_user'); setUser(null); };
  const refreshUser = () => {
    api('/auth/profile').then(d => {
      const u = { id:d.data.id, employee_id:d.data.employee_id, name:d.data.name, role:d.data.role,
        title:d.data.title, department:d.data.department, email:d.data.email, photo_url:d.data.photo_url };
      localStorage.setItem('atms_user', JSON.stringify(u)); setUser(u);
    }).catch(()=>{});
  };
  const navigate = (p) => { setPage(p); setSidebarOpen(false); };
  useEffect(()=>{
    const fetchActive=()=>api('/active-users').then(function(d){setActiveUsers((d.data&&d.data.count)||0);}).catch(function(){});
    fetchActive(); const iv=setInterval(fetchActive,60000); return ()=>clearInterval(iv);
  },[]);

  if(!user) return <LoginPage onLogin={setUser}/>;

  const pilotItems = [
    {id:'pilots',label:'조종사 현황',icon:'✈️'},
  ];
  const mechanicItems = [
    {id:'mechanic',label:'정비사 현황',icon:'🔧'},
  ];
  const commonItems = [
    {id:'dashboard',label:'대시보드',icon:'📊'},
    {id:'courses',label:'과정 관리',icon:'📚'},
    {id:'schedule',label:'일정 관리',icon:'📅'},
    {id:'evaluations',label:'평가 관리',icon:'📝'},
    {id:'ojt',label:'OJT 관리',icon:'🛠️'},
    {id:'content',label:'학습 자료',icon:'📖'},
    {id:'users',label:'사용자 관리',icon:'👤',roles:['admin','ojt_admin','manager']},
    {id:'reports',label:'리포트',icon:'📈',roles:['admin','instructor','ojt_admin','manager']},
    {id:'notifications',label:'알림',icon:'🔔'},
  ];
  const pn = {dashboard:'대시보드',courses:'과정 관리',schedule:'일정 관리',evaluations:'평가 관리',
    ojt:'OJT 관리',content:'학습 자료',users:'사용자 관리',reports:'리포트',notifications:'알림',
    profile:'내 프로필',pilots:'조종사 현황',mechanic:'정비사 현황'};

  const renderPage = () => {
    switch(page){
      case 'dashboard': return <Dashboard/>;
      case 'courses': return <CoursesPage/>;
      case 'users': return <UsersPage/>;
      case 'schedule': return <SchedulePage/>;
      case 'evaluations': return <EvaluationsPage/>;
      case 'ojt': return <OJTPage/>;
      case 'content': return <ContentPage/>;
      case 'reports': return <ReportsPage/>;
      case 'notifications': return <NotificationsPage/>;
      case 'profile': return <ProfilePage/>;
      case 'pilots': return <PilotPage/>;
      case 'mechanic': return <MechanicPage/>;
      default: return <Dashboard/>;
    }
  };

  const renderNavSection = (title, items) => (
    <React.Fragment>
      <div className="nav-section">{title}</div>
      {items.filter(n=>!n.roles||n.roles.includes(user.role)).map(n=>(
        <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>navigate(n.id)}>
          <span>{n.icon}</span><span>{n.label}</span></div>
      ))}
    </React.Fragment>
  );

  return (
    <AppContext.Provider value={{user,showToast,refreshUser}}>
      <div className="app-layout">
        <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />
        <div className={`sidebar ${sidebarOpen?'open':''} ${sidebarCollapsed?'collapsed':''}`}>
          <div className="sidebar-header">
            <h2>ATMS</h2>
            <button className="sidebar-toggle" onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}
              title={sidebarCollapsed?'메뉴 펼치기':'메뉴 접기'}>
              {sidebarCollapsed ? '▶' : '◀'}
            </button>
          </div>
          {!sidebarCollapsed && (
            <div style={{padding:'0 20px'}}>
              <div className="sidebar-user" onClick={()=>navigate('profile')}>
                <Avatar src={user.photo_url} name={user.name} size="sm"/>
                <div className="user-detail"><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>{user.name}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>{user.role}</div></div>
              </div>
            </div>
          )}
          {sidebarCollapsed && (
            <div style={{padding:'12px 0',display:'flex',justifyContent:'center'}}>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={()=>navigate('profile')}/>
            </div>
          )}
          <div className="sidebar-nav">
            {renderNavSection('조종사', pilotItems)}
            {renderNavSection('정비사', mechanicItems)}
            {renderNavSection('공통', commonItems)}
          </div>
          <div className="sidebar-footer">
            <div className="nav-item" onClick={()=>navigate('profile')}><span>⚙️</span><span>내 프로필</span></div>
            <div className="nav-item" onClick={logout}><span>🚪</span><span>로그아웃</span></div>
          </div>
        </div>
        <div className={`main-content ${sidebarCollapsed?'sidebar-collapsed':''}`}>
          <div className="top-bar">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>☰</button>
              <h1>{pn[page]||'대시보드'}</h1>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div className="active-indicator"><div className="active-dot"/>{activeUsers} online</div>
              <span className="desktop-date" style={{fontSize:14,color:'var(--gray-500)'}}>{new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</span>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={()=>navigate('profile')}/>
            </div>
          </div>
          {renderPage()}
        </div>
      </div>
      {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
