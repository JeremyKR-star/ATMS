// ━━━━━━━━━━━━ NOTIFICATIONS ━━━━━━━━━━━━
function NotificationsPage() {
  const [data, setData] = useState({notifications:[],unread_count:0}); const { showToast } = useApp();
  const load = () => api('/notifications').then(d=>setData(d.data)).catch(e=>showToast(e.message,'error'));
  useEffect(()=>{load();},[]);
  const markRead = async id => { try{await api(`/notifications/${id}/read`,{method:'PUT'});load();}catch(e){showToast(e.message,'error');} };
  const markAllRead = async () => { try{await api('/notifications/read-all',{method:'PUT'});showToast('모두 읽음','success');load();}catch(e){showToast(e.message,'error');} };
  const tc = {info:'var(--info)',warning:'var(--warning)',success:'var(--success)',danger:'var(--danger)'};
  return (
    <div className="page-content">
      <div className="flex-between mb-4"><span style={{fontSize:14,color:'var(--gray-500)'}}>읽지않음: {data.unread_count}건</span>
        <button className="btn btn-outline btn-sm" onClick={markAllRead}>모두 읽음</button></div>
      <div className="card"><div className="card-body">
        {data.notifications.map(n=>(
          <div key={n.id} onClick={()=>!n.is_read&&markRead(n.id)} style={{cursor:n.is_read?'default':'pointer',padding:'14px 16px',
            borderBottom:'1px solid var(--gray-50)',background:n.is_read?'transparent':'#f0f7ff',borderRadius:8,marginBottom:4,
            display:'flex',gap:12,alignItems:'flex-start',transition:'all 0.2s'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:tc[n.notification_type]||'var(--gray-400)',marginTop:5,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:n.is_read?400:600}}>{n.title}</div>
              <div style={{fontSize:13,color:'var(--gray-500)',marginTop:4}}>{n.message}</div>
              <div style={{fontSize:11,color:'var(--gray-400)',marginTop:4}}>{n.created_at}</div>
            </div>
          </div>
        ))}{data.notifications.length===0&&<div className="empty-state">알림 없음</div>}
      </div></div>
    </div>
  );
}

function WeeklyReportTable({ rows, onPilotClick }) {
  var gFltPlan = rows.reduce(function(s,w){return s+w.fltPlan;},0);
  var gFltDone = rows.reduce(function(s,w){return s+w.fltDone;},0);
  var gSimPlan = rows.reduce(function(s,w){return s+w.simPlan;},0);
  var gSimDone = rows.reduce(function(s,w){return s+w.simDone;},0);
  return (
    <div className="card-body">
      <div style={{marginBottom:16}}>
        <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-flight-bg)',color:'var(--wr-flight)'}}>✈</div>
            <div className="stat-value" style={{color:'var(--wr-flight)'}}>{gFltDone} / {gFltPlan}</div><div className="stat-label">Flight Done / Plan (Sortie)</div></div>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-sim-bg)',color:'var(--wr-sim)'}}>🖥</div>
            <div className="stat-value" style={{color:'var(--wr-sim)'}}>{gSimDone} / {gSimPlan}</div><div className="stat-label">SIM Done / Plan</div></div>
          <div className="stat-card"><div className="stat-icon" style={{background:'var(--wr-total-bg)',color:'var(--wr-total)'}}>✓</div>
            <div className="stat-value" style={{color:'var(--wr-total)'}}>{gFltDone + gSimDone} / {gFltPlan + gSimPlan}</div><div className="stat-label">Total Done / Plan</div></div>
        </div>
      </div>
      <div className="table-wrapper"><table>
        <thead><tr><th>Pilot</th><th colSpan="3" style={{textAlign:'center',background:'var(--wr-flight-bg)',color:'var(--wr-flight-text)'}}>Flight</th>
          <th colSpan="3" style={{textAlign:'center',background:'var(--wr-sim-bg)',color:'var(--wr-sim-text)'}}>Simulator</th>
          <th colSpan="3" style={{textAlign:'center',background:'var(--wr-total-bg)',color:'var(--wr-total-text)'}}>Total</th><th>Progress</th></tr>
        <tr><th></th><th>Plan</th><th>Done</th><th>Remain</th><th>Plan</th><th>Done</th><th>Remain</th>
          <th>Plan</th><th>Done</th><th>Remain</th><th></th></tr></thead>
        <tbody>{rows.map(function(w){
          var total=w.fltPlan+w.simPlan; var done=w.fltDone+w.simDone;
          var pct=total?Math.round((done/total)*100):0;
          return (
            <tr key={w.id}>
              <td>
                {onPilotClick && w.id ? (
                  <strong style={{cursor:'pointer',color:'var(--primary)',textDecoration:'underline dotted',textUnderlineOffset:3}}
                    onClick={function(){onPilotClick(w.id, w.name);}}

                ) : <strong>{w.name}</strong>}
              </td>
              <td className="text-center">{w.fltPlan}</td><td className="text-center" style={{color:'var(--wr-flight)',fontWeight:700}}>{w.fltDone}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{w.fltRemain}</td>
              <td className="text-center">{w.simPlan}</td><td className="text-center" style={{color:'var(--wr-sim)',fontWeight:700}}>{w.simDone}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{w.simRemain}</td>
              <td className="text-center">{total}</td><td className="text-center" style={{fontWeight:700,color:'var(--wr-total)'}}>{done}</td>
              <td className="text-center" style={{color:'var(--danger)'}}>{total-done}</td>
              <td style={{width:120}}>
                <div className="flex-between" style={{fontSize:11}}><span>{pct}%</span></div>

              </td>

function WeeklyReport({ weekly, pilots, nationalities, normalizeNat, natLabelMap, onPilotClick, onAddNationality }) {
  var _showAddState = useState(false);
  var showAdd = _showAddState[0];
  var setShowAdd = _showAddState[1];
  var _codeState = useState('');
  var code = _codeState[0];
  var setCode = _codeState[1];
  var _labelState = useState('');
  var label = _labelState[0];
  var setLabel = _labelState[1];

  var handleAdd = function() {
    if (!code || !label) return;
    onAddNationality(code, label);
    setCode(''); setLabel(''); setShowAdd(false);
  };

  // All nationalities with pilots
  var hasData = false;
  return (
    <div>
      {nationalities.map(function(nat){
        var natPilotIds = {};
        pilots.forEach(function(p){ if(normalizeNat(p.nationality)===nat.code) natPilotIds[p.id]=true; });
        var natWeekly = weekly.filter(function(w){ return natPilotIds[w.id]; });
        if (natWeekly.length === 0) return null;
        hasData = true;
        return (
          <div className="card" key={nat.code} style={{marginBottom:16}}>
            <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{nat.label_ko} - Weekly Report</h3>
              <span className="badge badge-yellow" style={{marginLeft:8}}>As of {new Date().toISOString().slice(0,10)}</span></div>
            <WeeklyReportTable rows={natWeekly} onPilotClick={onPilotClick} />
          </div>
        );
      })}

      {/* Nationalities without pilots yet */}
      {nationalities.map(function(nat){
        var natPilotIds = {};
        pilots.forEach(function(p){ if(normalizeNat(p.nationality)===nat.code) natPilotIds[p.id]=true; });
        var natWeekly = weekly.filter(function(w){ return natPilotIds[w.id]; });
        if (natWeekly.length > 0) return null;
        var natPilotCount = pilots.filter(function(p){ return normalizeNat(p.nationality)===nat.code; }).length;
        if (natPilotCount === 0) return null;
        return (
          <div className="card" key={nat.code} style={{marginBottom:16,opacity:0.7}}>
            <div className="card-header"><h3 style={{margin:0,fontSize:16}}>{nat.label_ko} - Weekly Report</h3>
              <span className="badge" style={{marginLeft:8,background:'var(--gray-200)',color:'var(--gray-500)'}}>{'데이터 없음'}</span></div>
            <div className="card-body" style={{textAlign:'center',padding:24,color:'var(--gray-400)',fontSize:13}}>
              {nat.label_ko}{' 조종사 '}{natPilotCount}{'명 등록됨 — 주간보고 엑셀 업로드 시 자동 반영'}
            </div>
          </div>
        );
      })}

      {/* Add Nationality */}
      <div style={{marginTop:8}}>
        {!showAdd ? (
          <button className="btn btn-sm" style={{border:'2px dashed var(--gray-300)',background:'transparent',color:'var(--gray-500)',width:'100%',padding:12}}
            onClick={function(){setShowAdd(true);}}>
            {'+ 국적 추가'}
          </button>
        ) : (
          <div className="card" style={{padding:16}}>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <input type="text" className="form-input" placeholder="국적 코드 (예: Philippines)"
                value={code} onChange={function(e){setCode(e.target.value);}} style={{flex:1,minWidth:150}} />
              <input type="text" className="form-input" placeholder="한글명 (예: 필리핀)"
                value={label} onChange={function(e){setLabel(e.target.value);}}
                onKeyDown={function(e){if(e.key==='Enter')handleAdd();}}
                style={{flex:1,minWidth:120}} />
              <button className="btn btn-primary btn-sm" onClick={handleAdd}>{'추가'}</button>
              <button className="btn btn-sm" onClick={function(){setShowAdd(false);setCode('');setLabel('');}}>{'취소'}</button>
            </div>
            <div style={{fontSize:11,color:'var(--gray-400)',marginTop:8}}>
              {'국적을 추가하면 해당 국적의 조종사가 등록될 때 주간 보고 레이아웃이 자동 생성됩니다.'}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━ CANVAS PARTICLE BACKGROUND SYSTEM ━━━━━━━━━━━━
var NAT_THEMES = {
  'Malaysia': { css:'nat-MY', bg1:'#0C1445', bg2:'#1a237e',
    accent:'rgba(204,0,1,0.8)', jetC:'rgba(255,215,0,0.85)', sparkC:'rgba(251,191,36,',
    pc:['#cc0001','#ffd700','#ffffff','#3b82f6'],
    flag: function(ctx,fw,fh){ // Jalur Gemilang — 14 stripes + canton + crescent + star
      var sh=fh/14;
      for(var i=0;i<14;i++){ctx.fillStyle=i%2===0?'#cc0001':'#ffffff';ctx.fillRect(0,i*sh,fw,sh+1);}
      var cw=fw*0.5,ch=fh*7/14;
      ctx.fillStyle='#010066';ctx.fillRect(0,0,cw,ch);
      var mcx=cw*0.38,mcy=ch*0.5,mr=Math.min(cw,ch)*0.32;
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(mcx,mcy,mr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#010066';ctx.beginPath();ctx.arc(mcx+mr*0.25,mcy-mr*0.06,mr*0.8,0,Math.PI*2);ctx.fill();
      _star(ctx,cw*0.7,ch*0.5,mr*0.38,14,'#ffd700');
    }},
  'Poland': { css:'nat-PL', bg1:'#3d0c0c', bg2:'#1a0505',
    accent:'rgba(220,20,60,0.8)', jetC:'rgba(255,255,255,0.8)', sparkC:'rgba(220,20,60,',
    pc:['#dc143c','#ffffff','#ff6b6b','#fbbf24'],
    flag: function(ctx,fw,fh){ // Flaga Polski — simple white top, red bottom
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,fw,fh/2);
      ctx.fillStyle='#dc143c';ctx.fillRect(0,fh/2,fw,fh/2+1);
    }},
  'Iraq': { css:'nat-IQ', bg1:'#0a2210', bg2:'#051208',
    accent:'rgba(0,122,61,0.8)', jetC:'rgba(0,220,120,0.8)', sparkC:'rgba(0,200,100,',
    pc:['#ce1126','#007a3d','#ffffff','#00ff88'],
    flag: function(ctx,fw,fh){ // Flag of Iraq — red/white/black, green Takbir in white band
      var th=fh/3;
      ctx.fillStyle='#ce1126';ctx.fillRect(0,0,fw,th+1);
      ctx.fillStyle='#ffffff';ctx.fillRect(0,th,fw,th+1);
      ctx.fillStyle='#000000';ctx.fillRect(0,th*2,fw,th+1);
      // Takbir (stylized Kufic script representation)
      ctx.fillStyle='#007a3d';
      var tx=fw*0.15,tw=fw*0.7,ty=th+th*0.25,tbh=th*0.5;
      // Simplified geometric Kufic-style Takbir
      var bw=tw/11;
      for(var i=0;i<11;i++){
        var bx=tx+i*bw;
        var heights=[0.9,0.5,0.6,0.8,0.3,0.9,0.7,0.5,0.8,0.6,0.7];
        var hh=tbh*heights[i];
        ctx.fillRect(bx+bw*0.15,ty+tbh-hh,bw*0.7,hh);
        if(i%3===0){ctx.beginPath();ctx.arc(bx+bw*0.5,ty+tbh-hh-bw*0.2,bw*0.25,0,Math.PI*2);ctx.fill();}
      }
    }}
};

function _star(ctx,cx,cy,r,pts,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=-Math.PI/2+i*Math.PI/pts;
    var rr=i%2===0?r:r*0.55;
    i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));
  }ctx.closePath();ctx.fill();
}

function NatCanvasBg(props) {
  var code = props.code;
  var canvasRef = React.useRef(null);
  var animRef = React.useRef(null);

  React.useEffect(function() {
    var T = NAT_THEMES[code];
    if (!T) return;
    var cvs = canvasRef.current;
    if (!cvs) return;
    var par = cvs.parentElement;
    if (!par) return;
    var ctx = cvs.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var W, H, t = 0;
    // State
    var particles = [], speedLines = [], jets = [], sparks = [];

    function initState() {
      particles = []; speedLines = []; jets = []; sparks = [];
      for (var i = 0; i < 50; i++) particles.push(mkPart());
      for (var i = 0; i < 15; i++) speedLines.push({
        x: Math.random() * W * 1.5, y: Math.random() * H,
        len: 30 + Math.random() * 100, speed: 2 + Math.random() * 5,
        alpha: 0.03 + Math.random() * 0.06
      });
      spawnJet(); spawnJet();
    }
    function mkPart() {
      return { x: Math.random() * W, y: Math.random() * H,
        vx: -0.2 - Math.random() * 0.8, vy: 0, size: 0.4 + Math.random() * 1.5,
        bright: Math.random(), twinkle: 0.02 + Math.random() * 0.03,
        color: T.pc[Math.floor(Math.random() * T.pc.length)] };
    }
    function spawnJet() {
      var fromR = Math.random() > 0.3;
      var sc = Math.min(W, H) / 350 * (0.5 + Math.random() * 0.5);
      jets.push({ x: fromR ? W + 80 : -120, y: 30 + Math.random() * (H - 60),
        speed: (2 + Math.random() * 3) * (fromR ? -1 : 1), scale: sc,
        dir: fromR ? -1 : 1, tilt: (Math.random() - 0.5) * 0.12,
        trail: [], ab: 0.5 + Math.random() * 0.5, alive: true });
    }

    function drawJetBody(ctx, j) {
      ctx.save(); ctx.translate(j.x, j.y);
      ctx.scale(j.dir * j.scale, j.scale); ctx.rotate(j.tilt);
      // Afterburner
      var abL = 25 + Math.sin(t * 0.2) * 12;
      var abG = ctx.createRadialGradient(-50, 0, 2, -50 - abL, 0, abL);
      abG.addColorStop(0, T.sparkC + (j.ab * 0.9) + ')');
      abG.addColorStop(0.4, T.sparkC + (j.ab * 0.5) + ')');
      abG.addColorStop(1, T.sparkC + '0)');
      ctx.fillStyle = abG;
      ctx.beginPath(); ctx.ellipse(-50, 0, abL, 5 + Math.sin(t * 0.25) * 2, 0, 0, Math.PI * 2); ctx.fill();
      // Body
      ctx.fillStyle = T.jetC; ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(60, 0); ctx.lineTo(30, -5); ctx.lineTo(10, -18); ctx.lineTo(-10, -20);
      ctx.lineTo(-20, -12); ctx.lineTo(-45, -8); ctx.lineTo(-55, -22); ctx.lineTo(-48, -22);
      ctx.lineTo(-42, -8); ctx.lineTo(-50, -6); ctx.lineTo(-50, 6); ctx.lineTo(-42, 8);
      ctx.lineTo(-48, 22); ctx.lineTo(-55, 22); ctx.lineTo(-45, 8); ctx.lineTo(-20, 12);
      ctx.lineTo(-10, 20); ctx.lineTo(10, 18); ctx.lineTo(30, 5);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Wings
      ctx.fillStyle = T.accent;
      ctx.beginPath(); ctx.moveTo(15, -6); ctx.lineTo(-15, -38); ctx.lineTo(-30, -36); ctx.lineTo(-10, -6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(15, 6); ctx.lineTo(-15, 38); ctx.lineTo(-30, 36); ctx.lineTo(-10, 6); ctx.closePath(); ctx.fill();
      // Cockpit
      ctx.fillStyle = 'rgba(147,197,253,0.35)';
      ctx.beginPath(); ctx.ellipse(25, -2, 10, 4, -0.1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function resize() {
      var rect = par.getBoundingClientRect();
      W = Math.max(rect.width, 100); H = Math.max(rect.height, 80);
      cvs.width = W * dpr; cvs.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initState();
    }
    resize();
    var ro = window.ResizeObserver ? new ResizeObserver(resize) : null;
    if (ro) ro.observe(par);

    function render() {
      t++;
      ctx.clearRect(0, 0, W, H);
      // BG gradient
      var bg = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.9);
      bg.addColorStop(0, T.bg1); bg.addColorStop(1, T.bg2);
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      // Speed lines
      for (var s = 0; s < speedLines.length; s++) {
        var sl = speedLines[s]; sl.x -= sl.speed;
        if (sl.x + sl.len < 0) { sl.x = W + sl.len; sl.y = Math.random() * H; }
        ctx.strokeStyle = 'rgba(255,255,255,' + sl.alpha + ')'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(sl.x, sl.y); ctx.lineTo(sl.x + sl.len, sl.y); ctx.stroke();
      }

      // Flag — top-left corner, proportional, with fade
      var flagW = Math.min(W * 0.22, 200), flagH = Math.min(H * 0.7, flagW * 0.6);
      ctx.save(); ctx.globalAlpha = 0.88;
      T.flag(ctx, flagW, flagH);
      ctx.globalAlpha = 1;
      // Right fade
      var gR = ctx.createLinearGradient(flagW * 0.7, 0, flagW, 0);
      gR.addColorStop(0, 'rgba(0,0,0,0)'); gR.addColorStop(1, T.bg1);
      ctx.fillStyle = gR; ctx.fillRect(flagW * 0.7, 0, flagW * 0.3, flagH);
      // Bottom fade
      var gB = ctx.createLinearGradient(0, flagH * 0.7, 0, flagH);
      gB.addColorStop(0, 'rgba(0,0,0,0)'); gB.addColorStop(1, T.bg1);
      ctx.fillStyle = gB; ctx.fillRect(0, flagH * 0.7, flagW, flagH * 0.3);
      ctx.restore();

      // Particles
      for (var p = 0; p < particles.length; p++) {
        var pt = particles[p]; pt.x += pt.vx; pt.bright += pt.twinkle;
        var alp = 0.2 + Math.sin(pt.bright) * 0.5;
        if (pt.x < -5) { pt.x = W + 5; pt.y = Math.random() * H; }
        ctx.globalAlpha = Math.max(0, alp);
        ctx.fillStyle = pt.color;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Jets
      if (Math.random() < 0.006 && jets.length < 4) spawnJet();
      for (var ji = jets.length - 1; ji >= 0; ji--) {
        var jt = jets[ji]; jt.x += jt.speed; jt.y += Math.sin(t * 0.025 + ji) * 0.3;
        // Trail
        jt.trail.push({ x: jt.x - jt.dir * 45 * jt.scale, y: jt.y, a: 0.4 });
        if (jt.trail.length > 40) jt.trail.shift();
        for (var ti = 0; ti < jt.trail.length; ti++) {
          var tp = jt.trail[ti]; tp.a *= 0.96;
          ctx.fillStyle = 'rgba(255,255,255,' + (tp.a * 0.1) + ')';
          ctx.beginPath(); ctx.arc(tp.x, tp.y, 2 + (jt.trail.length - ti) * 0.12, 0, Math.PI * 2); ctx.fill();
        }
        drawJetBody(ctx, jt);
        // Sparks
        if (Math.random() < 0.04) {
          for (var si = 0; si < 4; si++) sparks.push({
            x: jt.x, y: jt.y, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
            life: 1, decay: 0.03 + Math.random() * 0.03 });
        }
        if ((jt.dir === 1 && jt.x > W + 200) || (jt.dir === -1 && jt.x < -200)) jets.splice(ji, 1);
      }

      // Sparks
      for (var si = sparks.length - 1; si >= 0; si--) {
        var sp = sparks[si]; sp.x += sp.vx; sp.y += sp.vy; sp.life -= sp.decay;
        if (sp.life <= 0) { sparks.splice(si, 1); continue; }
        ctx.fillStyle = T.sparkC + sp.life + ')';
        ctx.beginPath(); ctx.arc(sp.x, sp.y, 1.2 * sp.life, 0, Math.PI * 2); ctx.fill();
      }

      // Subtle HUD text
      ctx.save(); ctx.font = Math.max(9, H * 0.06) + 'px "Courier New",monospace';
      ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + Math.sin(t * 0.03) * 0.05) + ')';
      ctx.fillText('ATMS // FA-50', 10, H - 10);
      ctx.textAlign = 'right';
      ctx.fillText('MODE: TRAINING', W - 10, H - 10);
      ctx.restore();

      animRef.current = requestAnimationFrame(render);
    }

    var timer = setTimeout(function() { resize(); render(); }, 60);
    return function() {
      clearTimeout(timer);
      if (animRef.current) cancelAnimationFrame(animRef.current);
      if (ro) ro.disconnect();
    };
  }, [code]);

  return React.createElement('canvas', { ref: canvasRef, className: 'nat-canvas-bg' });
}

function getNatCss(code) {
  var info = NAT_THEMES[code];
  return info ? info.css : '';
}

// ━━━━━━━━━━━━ PASSWORD STRENGTH COMPONENT ━━━━━━━━━━━━
function PasswordStrength({ password }) {
  var strength = 'weak';
  var score = 0;
  if (password.length >= 8) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^a-zA-Z0-9]/.test(password)) score++;
  if (score >= 4) strength = 'strong';
  else if (score >= 3) strength = 'medium';

  return (
    <div>
      <div className="password-strength">
        <div className={'strength-bar ' + strength} style={{opacity: score >= 1 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 2 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 3 ? 1 : 0.3}}></div>
        <div className={'strength-bar ' + strength} style={{opacity: score >= 4 ? 1 : 0.3}}></div>
      </div>
      <div className={'strength-label ' + strength}>
        {strength === 'weak' && '약함 (8글자 이상, 대문자, 소문자, 숫자, 특수문자 필요)'}
        {strength === 'medium' && '중간 (안전함)'}
        {strength === 'strong' && '강함 (매우 안전함)'}
      </div>
    </div>
  );
}

                                setLogs(d.data.logs || []); setTotal(d.data.total || 0); setStats(d.data.stats || {}); setLoading(false);
                              }).catch(function(e) { showToast(e.message,'danger'); setLoading(false); });
                            }
                          }, '\uD83D\uDD0D')
                        )
                      );
                    })}
                    {ipModal.ips.length === 0 && (
                      <tr><td colSpan={6} style={{textAlign:'center',padding:30,color:'var(--gray-400)'}}>{'접속 기록이 없습니다'}</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━ PILOT PAGE (API-Driven) ━━━━━━━━━━━━
function PilotPage() {
  const [pilots, setPilots] = useState([]);
  const [courses, setCourses] = useState([]);
  const [trainingRecs, setTrainingRecs] = useState([]);
  const [weekly, setWeekly] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeIdx, setActiveIdx] = useState(0);
  const [subTab, setSubTab] = useState('profiles');
  const [selectedPilot, setSelectedPilot] = useState(null);
  const [showPilotModal, setShowPilotModal] = useState(false);
  const [editingPilot, setEditingPilot] = useState(null);
  const [pilotForm, setPilotForm] = useState({});
  const [editingCell, setEditingCell] = useState(null);
  const [cellDate, setCellDate] = useState('');
  const [cellTime, setCellTime] = useState('1:00');
  const [cellPos, setCellPos] = useState({x:0,y:0});
  const [nationalities, setNationalities] = useState([]);
  const [weeklyUploads, setWeeklyUploads] = useState([]);
  const [uploading, setUploading] = useState(false);
  var _uploadProgressState = useState(null);
  var uploadProgress = _uploadProgressState[0];
  var setUploadProgress = _uploadProgressState[1];
  const weeklyFileRef = useRef(null);
  const [natFilter, setNatFilter] = useState('all');
  const [showNatAdd, setShowNatAdd] = useState(false);
  const [newNatCode, setNewNatCode] = useState('');
  const [newNatLabel, setNewNatLabel] = useState('');
  const [idxMap, setIdxMap] = useState({});
  const [showBulkPilotImport, setShowBulkPilotImport] = useState(false);
  const [pilotImportPreview, setPilotImportPreview] = useState([]);
  const [pilotImportFile, setPilotImportFile] = useState(null);
  const pilotImportFileRef = useRef(null);
  const { user, showToast } = useApp();
  const isAdmin = ['admin','ojt_admin'].includes(user.role);
  const canEditTraining = isAdmin || user.role === 'instructor';

  // Nationality label map: code -> ko label
  var natLabelMap = {'Malaysia':'말레이시아','Poland':'폴란드','Iraq':'이라크'};
  nationalities.forEach(function(n){ natLabelMap[n.code] = n.label_ko; });

  // Compat: also map old 'Malaysian' -> Malaysia
  var normalizeNat = function(val) {
    if (val === 'Malaysian') return 'Malaysia';
    return val || '';
  };

  const loadAll = useCallback(async () => {
    try {
      const [p,c,t,w,n,wu] = await Promise.all([
        api('/pilots'), api('/pilots/courses'), api('/pilots/training'), api('/pilots/weekly'),
        api('/pilots/nationalities'), api('/pilots/weekly-uploads')
      ]);
      setPilots((p.data||[]).filter(x=>x.status==='active'));
      setCourses(c.data||[]);
      setTrainingRecs(t.data||[]);
      setWeekly(w.data||[]);
      setNationalities(n.data||[]);
      setWeeklyUploads(wu.data||[]);
    } catch(e) { showToast(e.message,'error'); }
    setLoading(false);
  }, []);
  useEffect(()=>{loadAll();},[]);

  const simCourses = courses.filter(c=>c.category==='sim');
  const fltCourses = courses.filter(c=>c.category==='flight');
  const totalCourses = courses.length;

  // Build per-pilot training map: { pilotId: { courseId: {date, time} } }
  const tMap = {};
  trainingRecs.forEach(r => {
    if(!tMap[r.pilot_id]) tMap[r.pilot_id]={};
    tMap[r.pilot_id][r.course_id] = { date: r.completed_date, time: r.completed_time||'1:00' };
  });
  // Build weekly data lookup by pilot id
  var weeklyMap = {};
  weekly.forEach(function(w){ if(w.id) weeklyMap[w.id] = w; });

  const getPilotDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return (w.fltDone||0) + (w.simDone||0);
    return Object.keys(tMap[pid]||{}).length;
  };
  const getPilotSimDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.simDone||0;
    return trainingRecs.filter(function(r){return r.pilot_id===pid && simCourses.some(function(c){return c.id===r.course_id;});}).length;
  };
  const getPilotFltDone = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.fltDone||0;
    return trainingRecs.filter(function(r){return r.pilot_id===pid && fltCourses.some(function(c){return c.id===r.course_id;});}).length;
  };
  const getPilotSimPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.simPlan||0;
    return simCourses.length;
  };
  const getPilotFltPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return w.fltPlan||0;
    return fltCourses.length;
  };
  const getPilotTotalPlan = function(pid) {
    var w = weeklyMap[pid];
    if (w) return (w.fltPlan||0) + (w.simPlan||0);
    return totalCourses;
  };

  // Pilot CRUD
  const emptyForm = {name:'',short_name:'',rank:'Major',service_number:'',callsign:'',nationality:'Malaysia',
    squadron:'',date_of_birth:'',course_class:'',training_start_date:'',training_end_date:'',phone:'',email:'',notes:'',sort_order:pilots.length};
  const openCreate = ()=>{setPilotForm(emptyForm);setEditingPilot(null);setShowPilotModal(true);};
  const openEdit = (p)=>{setPilotForm({...p});setEditingPilot(p);setShowPilotModal(true);};
  const savePilot = async ()=>{
    if(!pilotForm.name||!pilotForm.short_name) return showToast('Name and short name required','error');
    try {
      if(editingPilot) { await api(`/pilots/${editingPilot.id}`,{method:'PUT',body:JSON.stringify(pilotForm)}); showToast('Pilot updated','success'); }
      else { await api('/pilots',{method:'POST',body:JSON.stringify(pilotForm)}); showToast('Pilot created','success'); }
      setShowPilotModal(false); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };
  const deactivatePilot = async (p)=>{
    try { await api(`/pilots/${p.id}`,{method:'DELETE'}); showToast(`${p.short_name} deactivated`,'success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Photo upload
  const photoRef = useRef(null);
  const [photoTarget, setPhotoTarget] = useState(null);
  const handlePhotoUpload = async (e)=>{
    const file = e.target.files[0]; if(!file||!photoTarget) return;
    const fd = new FormData(); fd.append('photo', file);
    try {
      const token = localStorage.getItem('atms_token');
      const res = await fetch(`${API}/pilots/${photoTarget}/photo`,{method:'POST',headers:{'Authorization':`Bearer ${token}`},body:fd});
      const data = await res.json(); if(!res.ok) throw new Error(data.error);
      showToast('Photo uploaded','success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
    e.target.value='';
  };

  // Inline training edit
  const handleCellClick = (e,pilotId,courseId,currentDate,currentTime)=>{
    if(!canEditTraining) return;
    const rect = e.target.getBoundingClientRect();
    setCellPos({x:Math.min(rect.left,window.innerWidth-220),y:rect.bottom+4});
    setEditingCell({pilotId,courseId}); setCellDate(currentDate||''); setCellTime(currentTime||'1:00');
  };
  const saveCell = async ()=>{
    if(!editingCell) return;
    try {
      await api('/pilots/training',{method:'POST',body:JSON.stringify({
        pilot_id:editingCell.pilotId, course_id:editingCell.courseId,
        completed_date:cellDate||null, completed_time:cellTime||'1:00'
      })});
      setEditingCell(null); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };
  const deleteCell = async ()=>{
    if(!editingCell) return;
    try {
      await api('/pilots/training',{method:'POST',body:JSON.stringify({
        pilot_id:editingCell.pilotId, course_id:editingCell.courseId,
        completed_date:null
      })});
      setEditingCell(null); setCellDate(''); setCellTime('1:00');
      showToast('Record deleted','success'); loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Filter pilots by nationality
  var filteredPilots = natFilter === 'all' ? pilots : pilots.filter(function(p) {
    return normalizeNat(p.nationality) === natFilter;
  });

  // Reset carousel index when filter changes
  useEffect(function(){setActiveIdx(0);setIdxMap({});},[natFilter]);

  const goTo = function(idx){setActiveIdx(Math.max(0,Math.min(idx,filteredPilots.length-1)));};
  var goToGroup = function(code, idx, max) {
    var clamped = Math.max(0, Math.min(idx, max - 1));
    var newMap = {};
    for (var k in idxMap) { newMap[k] = idxMap[k]; }
    newMap[code] = clamped;
    setIdxMap(newMap);
  };
  var getGroupIdx = function(code) { return idxMap[code] || 0; };

  // Add nationality handler
  var addNationality = async function() {
    if (!newNatCode || !newNatLabel) return showToast('Code and label required','error');
    try {
      await api('/pilots/nationalities',{method:'POST',body:JSON.stringify({code:newNatCode,label_ko:newNatLabel})});
      showToast('Nationality added','success');
      setNewNatCode(''); setNewNatLabel(''); setShowNatAdd(false);
      loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Handle pilot click from weekly report → navigate to individual status tab with that pilot selected
  var handlePilotClick = function(pilotId, pilotName) {
    var pilot = pilots.find(function(p){ return p.id === pilotId; });
    if (!pilot) { showToast('Pilot not found','error'); return; }
    setSelectedPilot(pilotId);
    setSubTab('individual');
  };

  // Handle add nationality from weekly report
  var handleAddNationality = async function(code, label) {
    if (!code || !label) return showToast('Code and label required','error');
    try {
      await api('/pilots/nationalities',{method:'POST',body:JSON.stringify({code:code,label_ko:label})});
      showToast('Nationality added','success');
      loadAll();
    } catch(e) { showToast(e.message,'error'); }
  };

  // Weekly Excel upload handler
  var handleWeeklyUpload = async function(e) {
    var file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    setUploadProgress({step: 'uploading', filename: file.name, filesize: file.size});
    try {
      var fd = new FormData();
      fd.append('file', file);
      var token = localStorage.getItem('atms_token');
      setUploadProgress({step: 'parsing', filename: file.name, filesize: file.size});
      var res = await fetch(API + '/pilots/weekly-uploads?report_date=' + new Date().toISOString().slice(0,10), {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      var d = data.data || {};
      var rows = d.parsed_rows || [];
      var matched = d.matched || 0;
      var individualSynced = d.individual_synced || 0;
      var coursesCreated = d.courses_created || 0;
      var indDebug = d.ind_debug || {};
      console.log('[ATMS] Upload response ind_debug:', JSON.stringify(indDebug));
      setUploadProgress({step: 'done', filename: file.name, filesize: file.size, rows: rows, matched: matched, total: rows.length, individualSynced: individualSynced, coursesCreated: coursesCreated, indDebug: indDebug});
      await loadAll();
    } catch(err) {
      setUploadProgress({step: 'error', filename: file.name, error: err.message});
    }
    setUploading(false);
    if (weeklyFileRef.current) weeklyFileRef.current.value = '';
  };

  var handleWeeklyDelete = async function(uploadId) {
    if (!confirm('이 업로드를 삭제하시겠습니까?')) return;
    try {
      await api('/pilots/weekly-uploads/' + uploadId, { method: 'DELETE' });
      showToast('삭제 완료', 'success');
      loadAll();
    } catch(err) { showToast(err.message, 'error'); }
  };

  var handleWeeklyDownload = function(uploadId, filename) {
    var token = localStorage.getItem('atms_token');
    window.open(API + '/pilots/weekly-uploads/' + uploadId + '/download?token=' + token, '_blank');
  };

  var formatFileSize = function(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  };

  var handleBulkPilotImportFile = function(e) {
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var data = new Uint8Array(evt.target.result);
        var workbook = XLSX.read(data, {type: 'array'});
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet);
        var preview = rows.slice(0, 5);
        setPilotImportPreview(preview);
        setPilotImportFile(rows);
      } catch(err) {
        showToast('엑셀 파일 읽기 실패: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  var confirmBulkPilotImport = async function() {
    if(!pilotImportFile || pilotImportFile.length === 0) {
      showToast('가져올 데이터가 없습니다', 'error');
      return;
    }
    try {
      var imported = 0;
      var failed = 0;
      for(var i = 0; i < pilotImportFile.length; i++) {
        var row = pilotImportFile[i];
        try {
          await api('/pilots', {method: 'POST', body: JSON.stringify({
            name: row.name || '',
            short_name: row.short_name || '',
            rank: row.rank || 'Major',
            nationality: row.nationality || 'Malaysia',
            callsign: row.callsign || '',
            service_number: row.service_number || ''
          })});
          imported++;
        } catch(err) {
          failed++;
        }
      }
      showToast(`조종사 가져오기 완료: ${imported}명 성공, ${failed}명 실패`, 'success');
      setPilotImportFile(null);
      setPilotImportPreview([]);
      setShowBulkPilotImport(false);
      if(pilotImportFileRef.current) pilotImportFileRef.current.value = '';
      loadAll();
    } catch(e) {
      showToast(e.message, 'error');
    }
  };

  var downloadIndividualTraining = function() {
    var selectedPilots = selectedPilot ? pilots.filter(function(p){return p.id === selectedPilot;}) : pilots;
    var wsData = [];
    selectedPilots.forEach(function(pilot) {
      courses.forEach(function(course) {
        var rec = trainingRecs.find(function(t){return t.pilot_id === pilot.id && t.course_id === course.id;});
        wsData.push({
          조종사: pilot.short_name,
          과정: course.name,
          카테고리: course.category || '-',
          완료일: rec && rec.completed_date ? rec.completed_date : '-',
          시간: rec && rec.completed_time ? rec.completed_time : '-'
        });
      });
    });
    var ws = XLSX.utils.json_to_sheet(wsData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '개인별현황');
    XLSX.writeFile(wb, '개인별현황_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };

  var downloadWeeklyReport = function() {
    var wsData = weekly.map(function(w) {
      return {주차: w.week || '-', 조종사: w.pilot_name || '-', 비행시간: w.flight_hours || 0, 시뮬레이션: w.sim_hours || 0, 총시간: (w.flight_hours || 0) + (w.sim_hours || 0), 메모: w.notes || ''};
    });
    var ws = XLSX.utils.json_to_sheet(wsData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '주간보고');
    XLSX.writeFile(wb, '주간보고_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  };

  if(loading) return React.createElement(ATMSLoader, {label: '\uC870\uC885\uC0AC \uB370\uC774\uD130 \uB85C\uB529 \uC911...', sub: 'Pilot Database'});

  // Pilot form modal fields
  const formField = (label,key,type='text')=>(
    <div className="form-group"><label>{label}</label>
      <input type={type} value={pilotForm[key]||''} onChange={e=>setPilotForm({...pilotForm,[key]:e.target.value})}/></div>
  );

  return (

        <div className={`tab ${subTab==='uploads'?'active':''}`} onClick={function(){setSubTab('uploads');}}>업로드 관리</div>

                                  <span>훈련 진도</span><span style={{fontWeight:700,color:'var(--primary)'}}>{pct}%</span></div>

                                  <div className="progress-fill" style={{width:pct+'%',background:'linear-gradient(90deg,#2563eb,#7c3aed)'}}/></div>

        <div>
          <div style={{marginBottom: 16}}><button className="btn btn-primary btn-sm" onClick={downloadWeeklyReport}>📥 엑셀 다운로드</button></div>

        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}

            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:8}}>
                {uploadProgress.step==='uploading' ? '\uD83D\uDCE4' : uploadProgress.step==='parsing' ? '\uD83D\uDD0D' : uploadProgress.step==='done' ? '\u2705' : '\u274C'}

              <div style={{fontSize:13,color:'var(--gray-500)'}}>{uploadProgress.filename}</div>

            {(uploadProgress.step==='uploading' || uploadProgress.step==='parsing') && (

                <div className="progress-bar" style={{height:8,marginBottom:8}}>
                  <div className="progress-fill" style={{width:uploadProgress.step==='uploading'?'40%':'80%',background:'linear-gradient(90deg,#6366f1,#818cf8)',transition:'width 0.5s ease'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'center',gap:24,fontSize:12,color:'var(--gray-400)'}}>
                  <span style={{color:uploadProgress.step==='uploading'?'var(--primary)':'var(--gray-400)',fontWeight:uploadProgress.step==='uploading'?700:400}}>{'1. 업로드'}</span>
                  <span style={{color:uploadProgress.step==='parsing'?'var(--primary)':'var(--gray-400)',fontWeight:uploadProgress.step==='parsing'?700:400}}>{'2. 파싱'}</span>
                  <span style={{color:'var(--gray-400)'}}>{'3. 완료'}</span>
                </div>
              </div>
            )}

            {uploadProgress.step==='done' && (
              <div>
                <div style={{background:'var(--gray-50)',borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{display:'flex',justifyContent:'space-around',textAlign:'center'}}>
                    <div><div style={{fontSize:24,fontWeight:800,color:'var(--primary)'}}>{uploadProgress.total}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'파싱된 조종사'}</div></div>
                    <div><div style={{fontSize:24,fontWeight:800,color:'var(--success)'}}>{uploadProgress.matched}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'매칭 성공'}</div></div>
                    <div><div style={{fontSize:24,fontWeight:800,color:uploadProgress.total - uploadProgress.matched > 0 ? 'var(--danger)' : 'var(--gray-400)'}}>{uploadProgress.total - uploadProgress.matched}</div><div style={{fontSize:11,color:'var(--gray-500)'}}>{'미매칭'}</div></div>
                  </div>
                </div>
                {(uploadProgress.individualSynced > 0 || uploadProgress.coursesCreated > 0) ? (
                  <div style={{background:'#f0fdf4',borderRadius:12,padding:12,marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:22}}>{'\u2705'}</span>
                    <div style={{fontSize:13,color:'#15803d'}}>
                      <b>{'개인별 현황 동기화 완료'}</b>
                      <span style={{marginLeft:6}}>{uploadProgress.individualSynced}{'개 훈련기록'}</span>
                      {uploadProgress.coursesCreated > 0 && <span style={{marginLeft:6}}>{'/ '}{uploadProgress.coursesCreated}{'개 신규과목 생성'}</span>}

                  </div>
                ) : uploadProgress.indDebug ? (
                  <div style={{background:'#fef9c3',borderRadius:12,padding:12,marginBottom:16,fontSize:11,color:'#854d0e'}}>
                    <b>{'개인별 현황 동기화 미실행'}</b>
                    <div style={{marginTop:4,wordBreak:'break-all'}}>{JSON.stringify(uploadProgress.indDebug)}</div>
                  </div>
                ) : null}
                {uploadProgress.rows && uploadProgress.rows.length > 0 && (
                  <div style={{maxHeight:200,overflow:'auto',marginBottom:16}}>
                    <table style={{fontSize:12,width:'100%'}}>

                      <tbody>{uploadProgress.rows.map(function(r,i){
                        return React.createElement('tr', {key:i},
                          React.createElement('td', null, r.name),
                          React.createElement('td', {className:'text-center'}, r.flt_done + '/' + r.flt_plan),
                          React.createElement('td', {className:'text-center'}, r.sim_done + '/' + r.sim_plan),

                  <tbody>{weeklyUploads.map(function(u, idx){
                    return (
                      <tr key={u.id}>
                        <td>{idx + 1}</td>

                        <td>{u.uploaded_by || '-'}</td>
                        <td className="text-center"><span className="badge badge-blue">{u.row_count}명</span></td>
                        <td className="text-center">{formatFileSize(u.file_size)}</td>
                        <td style={{fontSize:12}}>{u.created_at ? new Date(u.created_at + 'Z').toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) : '-'}</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn btn-outline btn-sm" onClick={function(){handleWeeklyDownload(u.id, u.original_filename);}}>
                              다운로드</button>
                            {isAdmin && <button className="btn btn-danger btn-sm" onClick={function(){handleWeeklyDelete(u.id);}}>
                              삭제</button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}</tbody>
                </table></div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── Pilot Management (Admin) ── */}
      {subTab==='manage' && isAdmin && (
        <div>
          <div className="flex-between mb-4">
            <span style={{fontSize:14,color:'var(--gray-500)'}}>Active Pilots: {pilots.length}</span>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={openCreate}>+ Add Pilot</button>
              <button className="btn btn-primary" onClick={function(){setShowBulkPilotImport(true);}}>📤 일괄등록</button>
            </div>
          </div>
          <div className="card"><div className="card-body">
            <div className="table-wrapper"><table>
              <thead><tr><th style={{width:50}}></th><th>Short Name</th><th>Full Name</th><th>Rank</th>
                <th>Nationality</th><th>Service No.</th><th>Callsign</th><th>Squadron</th><th style={{width:120}}></th></tr></thead>
              <tbody>{pilots.map(function(p){
                var natLabel = natLabelMap[normalizeNat(p.nationality)] || p.nationality || '-';
                return (
                <tr key={p.id}>
                  <td><Avatar src={p.photo_url} name={p.short_name} size="sm"/></td>
                  <td><strong>{p.short_name}</strong></td><td>{p.name}</td><td>{p.rank}</td>
                  <td><span className="badge badge-blue">{natLabel}</span></td>
                  <td>{p.service_number||'-'}</td><td>{p.callsign||'-'}</td><td>{p.squadron||'-'}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-outline btn-sm" onClick={function(){openEdit(p);}}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={function(){deactivatePilot(p);}}>Del</button>
                    </div>
                  </td>
                </tr>
              );})}{pilots.length===0&&<tr><td colSpan="9" className="text-center" style={{padding:40,color:'var(--gray-400)'}}>No pilots</td></tr>}</tbody>
            </table></div>
          </div></div>
        </div>
      )}

      {/* Photo upload hidden input */}
      <input type="file" ref={photoRef} accept="image/*" style={{display:'none'}} onChange={handlePhotoUpload}/>

      {/* Pilot Create/Edit Modal */}
      {showPilotModal && <Modal title={editingPilot?`Edit: ${editingPilot.short_name}`:'Add New Pilot'} onClose={function(){setShowPilotModal(false);}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowPilotModal(false);}}>Cancel</button>
          <button className="btn btn-primary" onClick={savePilot}>{editingPilot?'Update':'Create'}</button></>}>
        <div className="pilot-admin-grid">
          {formField('Full Name *','name')}
          {formField('Short Name *','short_name')}
          <div className="form-group"><label>Rank</label>
            <select value={pilotForm.rank||'Major'} onChange={function(e){setPilotForm({...pilotForm,rank:e.target.value});} }>
              {['Major','Captain','First Lieutenant','Second Lieutenant','Colonel','Lieutenant Colonel'].map(function(r){
                return <option key={r} value={r}>{r}</option>;
              })}
            </select></div>
          {formField('Service Number','service_number')}
          {formField('Callsign','callsign')}
          <div className="form-group"><label>Nationality</label>
            <div style={{display:'flex',gap:6}}>
              <select style={{flex:1}} value={pilotForm.nationality||''} onChange={function(e){setPilotForm({...pilotForm,nationality:e.target.value});}}>
                <option value="">Select</option>
                {nationalities.map(function(n){return <option key={n.id} value={n.code}>{n.label_ko} ({n.code})</option>;})}
              </select>
            </div>
          </div>
          {formField('Squadron','squadron')}
          {formField('Date of Birth','date_of_birth','date')}
          {formField('Course Class','course_class')}
          {formField('Training Start','training_start_date','date')}
          {formField('Training End','training_end_date','date')}
          {formField('Phone','phone','tel')}
          {formField('Email','email','email')}
          {formField('Sort Order','sort_order','number')}
        </div>
        <div className="form-group" style={{marginTop:12}}><label>Notes</label>
          <textarea rows="2" value={pilotForm.notes||''} onChange={function(e){setPilotForm({...pilotForm,notes:e.target.value});}} /></div>
      </Modal>}

      {/* Bulk Pilot Import Modal */}
      {showBulkPilotImport&&<Modal title="조종사 일괄등록" onClose={function(){setShowBulkPilotImport(false);setPilotImportFile(null);setPilotImportPreview([]);}}
        footer={<><button className="btn btn-outline" onClick={function(){setShowBulkPilotImport(false);setPilotImportFile(null);setPilotImportPreview([]);}}>취소</button>
          {pilotImportFile && pilotImportFile.length > 0 && <button className="btn btn-success" onClick={confirmBulkPilotImport}>{pilotImportFile.length}명 가져오기</button>}</>}>
        {!pilotImportFile || pilotImportFile.length === 0 ? (
          <div>
            <div style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 12}}>엑셀 파일에 다음 열이 필요합니다: name, short_name, rank, nationality, callsign, service_number</div>
            <div className="import-area">
              <div style={{fontSize: 40, marginBottom: 8}}>📊</div>
              <div style={{fontWeight: 600, marginBottom: 4}}>엑셀 파일을 선택하세요</div>
              <div style={{fontSize: 12, color: 'var(--gray-400)'}}>(.xlsx / .xlsm 형식)</div>
              <input type="file" ref={pilotImportFileRef} onChange={handleBulkPilotImportFile} accept=".xlsx,.xls,.xlsm" style={{display: 'none'}} />
              <button className="btn btn-primary btn-sm" onClick={function(){pilotImportFileRef.current && pilotImportFileRef.current.click();}} style={{marginTop: 12}}>파일 선택</button>
            </div>
          </div>
        ) : (
          <div>
            <div style={{fontSize: 12, color: 'var(--gray-600)', marginBottom: 12}}>가져올 데이터 미리보기 ({pilotImportFile.length}명):</div>
            <div style={{maxHeight: 300, overflowY: 'auto'}}>
              {pilotImportPreview.map(function(row, idx) {
                return (
                  <div key={idx} className="preview-row" style={{borderBottom: '1px solid var(--gray-100)', padding: '8px 0', fontSize: 12}}>
                    <div><strong>{row.short_name || '-'}</strong></div>
                    <div>{row.name || '-'}</div>
                    <div>{row.rank || '-'}</div>
                    <div>{row.nationality || '-'}</div>
                    <div>{row.callsign || '-'}</div>
                    <div>{row.service_number || '-'}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Modal>}
    </div>
  );
}

// ━━━━━━━━━━━━ DIGITAL SIGNATURES (JPG 서명) ━━━━━━━━━━━━
function DigitalSignaturesPage() {
  var [sigs, setSigs] = useState([]);
  var [courses, setCourses] = useState([]);
  var [showSign, setShowSign] = useState(false);
  var [selectedCourse, setSelectedCourse] = useState('');
  var [loading, setLoading] = useState(true);
  var canvasRef = useRef(null);
  var isDrawing = useRef(false);
  var ctx2 = useApp(); var showToast = ctx2.showToast; var user = ctx2.user;

  useEffect(function(){
    Promise.all([api('/digital-signatures'),api('/courses')]).then(function(res){
      setSigs(res[0].data);setCourses(res[1].data);setLoading(false);
    }).catch(function(e){showToast(e.message,'error');setLoading(false);});
  },[]);

  var initCanvas = function() {
    setTimeout(function(){
      var canvas = canvasRef.current;
      if(!canvas) return;
      canvas.width = 400; canvas.height = 200;
      var c = canvas.getContext('2d');
      c.fillStyle = '#fff'; c.fillRect(0,0,400,200);
      c.strokeStyle = '#000'; c.lineWidth = 2; c.lineCap = 'round';
    },100);
  };

  var startDraw = function(e) {
    isDrawing.current = true;
    var c = canvasRef.current.getContext('2d');
    var rect = canvasRef.current.getBoundingClientRect();
    c.beginPath();
    c.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  };
  var draw = function(e) {
    if(!isDrawing.current) return;
    var c = canvasRef.current.getContext('2d');
    var rect = canvasRef.current.getBoundingClientRect();
    c.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    c.stroke();
  };
  var stopDraw = function() { isDrawing.current = false; };
  var clearCanvas = function() {
    var c = canvasRef.current.getContext('2d');
    c.fillStyle = '#fff'; c.fillRect(0,0,400,200);
  };
  var submitSignature = function() {
    if(!selectedCourse) return showToast('\uACFC\uC815 \uC120\uD0DD \uD544\uC218','error');
    var data = canvasRef.current.toDataURL('image/jpeg');
    api('/digital-signatures',{method:'POST',body:JSON.stringify({course_id:selectedCourse,signature_data:data,purpose:'course_completion'})})
      .then(function(){showToast('\uC11C\uBA85 \uC81C\uCD9C \uC644\uB8CC'); setShowSign(false);
        api('/digital-signatures').then(function(d){setSigs(d.data);});
      }).catch(function(e){showToast(e.message,'error');});
  };

  if(loading) return React.createElement('div',{className:'page-content'},React.createElement(ATMSLoader,{label:'\uC11C\uBA85 \uB370\uC774\uD130 \uB85C\uB529...',sub:'Digital Signatures'}));

  return React.createElement('div',{className:'page-content'},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      React.createElement('h3',{style:{fontSize:20,fontWeight:700,display:'flex',alignItems:'center',gap:8}},'\uD83D\uDD8A\uFE0F JPG \uC11C\uBA85 \uAD00\uB9AC'),
      user.role==='trainee' && React.createElement('button',{className:'btn btn-primary btn-sm',onClick:function(){setShowSign(!showSign); if(!showSign) initCanvas();}},showSign?'\uCDE8\uC18C':'\u2795 \uC11C\uBA85\uD558\uAE30')
    ),
    showSign && React.createElement('div',{className:'card',style:{marginBottom:16}},React.createElement('div',{className:'card-body'},
      React.createElement('div',{className:'form-group'},React.createElement('label',{},'\uACFC\uC815 \uC120\uD0DD'),
        React.createElement('select',{value:selectedCourse,onChange:function(e){setSelectedCourse(e.target.value);}},
          React.createElement('option',{value:''},'\uC120\uD0DD'),
          courses.map(function(c){return React.createElement('option',{key:c.id,value:c.id},c.name);})
      )),
      React.createElement('div',{style:{marginBottom:12}},
        React.createElement('label',{style:{display:'block',marginBottom:6,fontWeight:600,fontSize:13}},'\uC544\uB798\uC5D0 \uC11C\uBA85\uD558\uC138\uC694'),
        React.createElement('canvas',{ref:canvasRef,style:{border:'2px solid var(--gray-300)',borderRadius:8,cursor:'crosshair',display:'block'},
          onMouseDown:startDraw,onMouseMove:draw,onMouseUp:stopDraw,onMouseLeave:stopDraw})
      ),
      React.createElement('div',{style:{display:'flex',gap:8}},
        React.createElement('button',{className:'btn btn-outline btn-sm',onClick:clearCanvas},'\uC9C0\uC6B0\uAE30'),
        React.createElement('button',{className:'btn btn-success btn-sm',onClick:submitSignature},'\uC11C\uBA85 \uC81C\uCD9C')
      )
    )),
    React.createElement('div',{className:'card'},React.createElement('div',{className:'card-body'},React.createElement('div',{className:'table-wrapper'},React.createElement('table',{},
      React.createElement('thead',{},React.createElement('tr',{},React.createElement('th',{},'\uD6C8\uB828\uC0DD'),React.createElement('th',{},'\uACFC\uC815'),React.createElement('th',{},'\uBAA9\uC801'),React.createElement('th',{},'\uC0C1\uD0DC'),React.createElement('th',{},'\uC11C\uBA85\uC77C'),React.createElement('th',{},'\uAC80\uC99D\uC790'))),
      React.createElement('tbody',{},
        sigs.map(function(s){return React.createElement('tr',{key:s.id},
          React.createElement('td',{},React.createElement('strong',{},s.trainee_name||'-')),React.createElement('td',{},s.course_name||'-'),
          React.createElement('td',{},s.purpose||'-'),React.createElement('td',{},React.createElement(StatusBadge,{status:s.status})),
          React.createElement('td',{},s.signed_at ? s.signed_at.slice(0,10) : '-'),React.createElement('td',{},s.verifier_name||'-')
        );}),
        sigs.length===0 && React.createElement('tr',{},React.createElement('td',{colSpan:6,className:'text-center',style:{padding:40,color:'var(--gray-400)'}},'\uC11C\uBA85 \uC5C6\uC74C'))
      )
    ))))

// ━━━━━━━━━━━━ MAIN APP ━━━━━━━━━━━━
function App() {
  var [showSplash, setShowSplash] = useState(true);
  var [user, setUser] = useState(function(){try{return JSON.parse(localStorage.getItem('atms_user'));}catch(e){return null;}});
  var [page, setPage] = useState('dashboard');
  var [toast, setToast] = useState(null);
  var [sidebarOpen, setSidebarOpen] = useState(false);
  var [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  var [activeUsers, setActiveUsers] = useState(0);
  var [darkMode, setDarkMode] = useState(function(){return localStorage.getItem('atms_dark_mode')==='true';});
  var [unreadNotifications, setUnreadNotifications] = useState(0);
  var [wsConnected, setWsConnected] = useState(false);
  var [offlineQueue, setOfflineQueue] = useState([]);
  var showToast = function(message,type) { if(!type) type='success'; setToast({message:message,type:type}); };
  var logout = function() { localStorage.removeItem('atms_token'); localStorage.removeItem('atms_user'); setUser(null); };
  var refreshUser = function() {
    api('/auth/profile').then(function(d) {
      var u = { id:d.data.id, employee_id:d.data.employee_id, name:d.data.name, role:d.data.role,
        title:d.data.title, department:d.data.department, email:d.data.email, photo_url:d.data.photo_url };
      localStorage.setItem('atms_user', JSON.stringify(u)); setUser(u);
    }).catch(function(){});
  };
  var toggleDarkMode = function() {
    var newMode = !darkMode;
    setDarkMode(newMode);
    localStorage.setItem('atms_dark_mode', newMode);
    if(newMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
  };
  var navigate = function(p) { setPage(p); setSidebarOpen(false); };
  useEffect(function(){
    if(darkMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
  },[darkMode]);
  useEffect(function(){
    if(!user) return;
    var fetchActive = function() {
      api('/active-users').then(function(d){setActiveUsers((d.data&&d.data.count)||0);}).catch(function(){});
      api('/notifications').then(function(d){
        if(d.data && d.data.unread_count) setUnreadNotifications(d.data.unread_count);
      }).catch(function(){});
    };
    fetchActive();
    var iv = setInterval(fetchActive,60000);
    // ── WebSocket real-time notifications ──
    var ws = null;
    var wsReconnectTimer = null;
    var wsReconnectDelay = 1000;
    var wsMaxReconnectDelay = 30000;
    var wsConnectAttempts = 0;
    var connectWebSocket = function() {
      try {
        var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        var wsUrl = protocol + '//' + window.location.host + '/ws';
        ws = new WebSocket(wsUrl);
        ws.onopen = function() {
          wsConnectAttempts = 0;
          wsReconnectDelay = 1000;
          setWsConnected(true);
          var token = localStorage.getItem('atms_token');
          if(token) {
            ws.send(JSON.stringify({type:'auth',token:token}));
          }
          // Flush offline queue on reconnect
          setOfflineQueue(function(prevQueue) {
            if(prevQueue && prevQueue.length > 0) {
              setTimeout(function() {
                prevQueue.forEach(function(qMsg) {
                  try {
                    if(ws && ws.readyState === WebSocket.OPEN) {
                      ws.send(JSON.stringify(qMsg));
                    }
                  } catch(e) {}
                });
              }, 500);
            }
            return [];
          });
        };
        ws.onmessage = function(evt) {
          try {
            var msg = JSON.parse(evt.data);
            if(msg.type === 'notification') {
              var nd = msg.data || {};
              showToast((nd.title || '\uC0C8 \uC54C\uB9BC'), nd.notification_type === 'danger' ? 'error' : 'success');
              setUnreadNotifications(function(prev){return prev + 1;});
            } else if(msg.type === 'schedule_update') {
              var sd = msg.data || {};
              showToast('\uC77C\uC815 ' + (msg.action === 'created' ? '\uCD94\uAC00' : '\uBCC0\uACBD') + ': ' + (sd.title || ''), 'success');
            } else if(msg.type === 'ojt_enrollment') {
              showToast('OJT \uB4F1\uB85D: ' + ((msg.data && msg.data.program_name) || ''), 'success');
            } else if(msg.type === 'ojt_task_complete') {
              showToast('\uD6C8\uB828 \uC644\uB8CC: ' + ((msg.data && msg.data.task_name) || ''), 'success');
            } else if(msg.type === 'ojt_survey_submit') {
              showToast('\uC11C\uBCA0\uC774 \uC81C\uCD9C: ' + ((msg.data && msg.data.survey_title) || ''), 'success');
            } else if(msg.type === 'notification_batch') {
              var batchCount = msg.count || (msg.data && msg.data.length) || 0;
              showToast(batchCount + '\uAC74\uC758 \uC0C8 \uC54C\uB9BC', 'success');
              setUnreadNotifications(function(prev){return prev + batchCount;});
            } else if(msg.type === 'auth_error') {
              // Token invalid, don't reconnect
              return;
            }
          } catch(e) {}
        };
        ws.onclose = function() {
          ws = null;
          setWsConnected(false);
          wsConnectAttempts++;
          if(wsConnectAttempts > 5 && typeof EventSource !== 'undefined') {
            var token = localStorage.getItem('atms_token');
            if(token) {
              try {
                var sseUrl = window.location.protocol + '//' + window.location.host + '/api/sse?token=' + encodeURIComponent(token);
                var sse = new EventSource(sseUrl);
                sse.addEventListener('notification', function(evt) {
                  try {
                    var msg = JSON.parse(evt.data);
                    if(msg.type === 'notification') {
                      var nd = msg.data || {};
                      showToast((nd.title || '\uC0C8 \uC54C\uB9BC'), nd.notification_type === 'danger' ? 'error' : 'success');
                      setUnreadNotifications(function(prev){return prev + 1;});
                    } else if(msg.type === 'notification_batch') {
                      showToast((msg.count || 0) + '\uAC74\uC758 \uC0C8 \uC54C\uB9BC', 'success');
                      setUnreadNotifications(function(prev){return prev + (msg.count || 0);});
                    }
                  } catch(e) {}
                });
                sse.addEventListener('connected', function() {
                  setWsConnected(true);
                });
                sse.onerror = function() {
                  setWsConnected(false);
                };
              } catch(e) {}
              return;
            }
          }
          var delay = Math.min(wsReconnectDelay * Math.pow(1.5, wsConnectAttempts), wsMaxReconnectDelay);
          wsReconnectTimer = setTimeout(connectWebSocket, delay);
        };
        ws.onerror = function() {
          if(ws) { try { ws.close(); } catch(e) {} }
        };
      } catch(e) {}
    };
    connectWebSocket();
    // Queue-aware WS send: queues if disconnected, sends if connected
    var wsSend = function(msg) {
      if(ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify(msg)); } catch(e) {}
      } else {
        setOfflineQueue(function(prev) { return prev.concat([msg]); });
      }
    };
    // Heartbeat ping every 30s to keep connection alive
    var wsPingTimer = setInterval(function() {
      if(ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type:'ping'}));
      }
    }, 30000);
    return function() {
      clearInterval(iv);
      clearInterval(wsPingTimer);
      if(wsReconnectTimer) clearTimeout(wsReconnectTimer);
      if(ws) { try { ws.close(); } catch(e) {} }
    };
  },[user]);

  if(!user) return <LoginPage onLogin={setUser}/>;

  const pilotItems = [

    {id:'access-logs',label:'\uC811\uC18D \uB85C\uADF8',icon:'\uD83C\uDF10',roles:['admin']},
  ];
  const pn = {dashboard:'\uB300\uC2DC\uBCF4\uB4DC',courses:'\uACFC\uC815 \uAD00\uB9AC',schedule:'\uC77C\uC815 \uAD00\uB9AC',evaluations:'\uD3C9\uAC00 \uAD00\uB9AC',
    ojt:'OJT \uAD00\uB9AC',content:'\uD559\uC2B5 \uC790\uB8CC',users:'\uC0AC\uC6A9\uC790 \uAD00\uB9AC',reports:'\uB9AC\uD3EC\uD2B8',notifications:'\uC54C\uB9BC',
    profile:'\uB0B4 \uD504\uB85C\uD544',pilots:'\uC870\uC885\uC0AC \uD604\uD669',mechanic:'\uC815\uBE44\uC0AC \uD604\uD669','access-logs':'\uC811\uC18D \uB85C\uADF8',
    surveys:'\uB9CC\uC871\uB3C4\uC870\uC0AC',signatures:'JPG \uC11C\uBA85',counseling:'\uC0C1\uB2F4\uAE30\uB85D'};

  var renderPage = function() {
    switch(page){
      case 'dashboard': return React.createElement(Dashboard);
      case 'courses': return React.createElement(CoursesPage);
      case 'users': return React.createElement(UsersPage);
      case 'schedule': return React.createElement(SchedulePage);
      case 'evaluations': return React.createElement(EvaluationsPage);
      case 'ojt': return React.createElement(OJTPage);
      case 'content': return React.createElement(ContentPage);
      case 'reports': return React.createElement(ReportsPage);
      case 'notifications': return React.createElement(NotificationsPage);
      case 'profile': return React.createElement(ProfilePage);
      case 'pilots': return React.createElement(PilotPage);
      case 'mechanic': return React.createElement(MechanicPage);
      case 'access-logs': return React.createElement(AccessLogsPage);
      case 'surveys': return React.createElement(SurveyManagementPage);
      case 'signatures': return React.createElement(DigitalSignaturesPage);
      case 'counseling': return React.createElement(CounselingPage);
      default: return React.createElement(Dashboard);
    }
  };

  var renderNavSection = function(title, items) {
    return React.createElement(React.Fragment, {},
      React.createElement('div', {className:'nav-section'}, title),
      items.filter(function(n){return !n.roles||n.roles.includes(user.role);}).map(function(n){
        return React.createElement('div', {key:n.id, className:'nav-item ' + (page===n.id?'active':''),onClick:function(){navigate(n.id);}},
          React.createElement('span', {}, n.icon),
          React.createElement('span', {}, n.label),
          n.id === 'notifications' && unreadNotifications > 0 && React.createElement('div', {className:'nav-item-badge',style:{marginLeft:'auto'}}, unreadNotifications)
        );
      })
    );
  };

  return (
    <React.Fragment>
      {showSplash && <SplashScreen onDone={function() { setShowSplash(false); }} />}
      <AppContext.Provider value={{user,showToast,refreshUser}}>
        <div className="app-layout">
          <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />
          <div className={`sidebar ${sidebarOpen?'open':''} ${sidebarCollapsed?'collapsed':''}`}>
            <Sidebar3DBackground />
            <div className="sidebar-header">
            <h2>ATMS</h2>
            <button className="sidebar-toggle" onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}
              title={sidebarCollapsed?'메뉴 펼치기':'메뉴 접기'}>
              {sidebarCollapsed ? '▶' : '◀'}
            </button>
          </div>
          {!sidebarCollapsed && (
            <div style={{padding:'0 20px'}}>
              <div className="sidebar-user" onClick={()=>navigate('profile')}>
                <Avatar src={user.photo_url} name={user.name} size="sm"/>
                <div className="user-detail"><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>{user.name}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>{user.role}</div></div>
              </div>
            </div>
          )}
          {sidebarCollapsed && (
            <div style={{padding:'12px 0',display:'flex',justifyContent:'center'}}>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={()=>navigate('profile')}/>
            </div>
          )}
          <div className="sidebar-nav">
            {renderNavSection('조종사', pilotItems)}
            {renderNavSection('정비사', mechanicItems)}
            {renderNavSection('공통', commonItems)}
          </div>
          <div className="sidebar-footer">
            <div className="nav-item" onClick={()=>navigate('profile')}><span>⚙️</span><span>내 프로필</span></div>
            <div className="nav-item" onClick={logout}><span>🚪</span><span>로그아웃</span></div>
          </div>
        </div>
        <div className={`main-content ${sidebarCollapsed?'sidebar-collapsed':''}`}>
          <AnimatedBackground />
          {!wsConnected && user && React.createElement('div', {style:{background:'linear-gradient(135deg,#f59e0b,#d97706)',color:'white',padding:'6px 16px',fontSize:12,fontWeight:600,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}, '\u26A0\uFE0F ', '\uC11C\uBC84 \uC5F0\uACB0 \uB04A\uAE40 - \uC7AC\uC5F0\uACB0 \uC2DC\uB3C4 \uC911...')}
          <div className="top-bar">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button className="hamburger" onClick={function(){setSidebarOpen(!sidebarOpen);}}>☰</button>
              <h1>{pn[page]||'대시보드'}</h1>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div className="active-indicator"><div className="active-dot"/>{activeUsers} online</div>
              <span className="desktop-date" style={{fontSize:14,color:'var(--gray-500)'}}>{new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</span>
              <button className="btn-outline" style={{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:'4px 8px'}} onClick={toggleDarkMode} title="다크모드 토글">
                {darkMode ? '☀️' : '🌙'}
              </button>
              <div style={{position:'relative'}}>
                <button className="btn-outline" style={{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:'4px 8px'}} onClick={function(){navigate('notifications');}} title="알림">
                  🔔
                </button>
                {unreadNotifications > 0 && React.createElement('div', {className:'nav-item-badge'}, unreadNotifications)}
              </div>
              <Avatar src={user.photo_url} name={user.name} size="sm" onClick={function(){navigate('profile');}}/>
            </div>
          </div>
          <PageTransition pageKey={page}>{renderPage()}</PageTransition>
        </div>
        {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
      </div>
      </AppContext.Provider>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
