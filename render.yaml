services:
  - type: web
    name: atms
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RENDER
        value: "true"
    disk:
      name: atms-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
