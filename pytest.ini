[pytest]
# Pytest configuration for ATMS test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers for organizing tests
markers =
    auth: Authentication and authorization tests
    courses: Course management tests
    schedules: Schedule and attendance tests
    evaluations: Evaluation and scoring tests
    ojt: OJT program tests
    content: Content management tests
    notifications: Notification tests
    reports: Report and analytics tests
    integration: Integration tests
    slow: Slow tests
    smoke: Smoke tests
    regression: Regression tests

# Coverage options
[coverage:run]
source = .
omit =
    tests/*
    */site-packages/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
